<head>

<title>Evaluación Mixta VI — Instalación de anclajes en barrancos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.topbar{background:#374151;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.topbar h1{color:#fff;font-size:1.05rem;font-weight:700;line-height:1.2}
.topbar a{color:rgba(255,255,255,.8);font-size:.78rem;text-decoration:none;background:rgba(255,255,255,.15);padding:.35rem .8rem;border-radius:6px;white-space:nowrap}
.topbar a:hover{background:rgba(255,255,255,.25)}
.topbar-sub{color:rgba(255,255,255,.7);font-size:.75rem}
.prog-bar{background:rgba(255,255,255,.25);height:5px}
.prog-fill{height:100%;background:#fff;transition:width .4s;width:0%}
.wrap{max-width:780px;margin:0 auto;padding:1.5rem 1rem 5rem}
.stat-row{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:.65rem 1rem;font-size:.8rem;color:#64748b;flex:1;min-width:110px}
.stat strong{display:block;font-size:1.3rem;font-weight:700;color:#1e293b;line-height:1}
.qcard{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.4rem;margin-bottom:1rem;border-top:3px solid #374151}
.qmeta{display:flex;align-items:center;gap:.6rem;margin-bottom:.7rem;flex-wrap:wrap}
.qnum{font-size:.72rem;font-weight:600;color:#374151;background:#f9fafb;padding:.2rem .55rem;border-radius:4px}
.qbadge{font-size:.68rem;color:#64748b;background:#f1f5f9;padding:.2rem .55rem;border-radius:4px}
.qtxt{font-size:.95rem;line-height:1.65;color:#1e293b;margin-bottom:1rem}
.opts{display:flex;flex-direction:column;gap:.4rem}
.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.65rem .9rem;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:.87rem;line-height:1.5;text-align:left;color:#1e293b;width:100%;transition:all .12s}
.opt:hover:not(.dis){background:#f9fafb;border-color:#374151}
.opt.sel{background:#f9fafb;border-color:#374151;color:#1e293b}
.opt.ok{background:#dcfce7;border-color:#16a34a;color:#15803d;font-weight:500}
.opt.ng{background:#fee2e2;border-color:#dc2626;color:#374151}
.opt.dis{cursor:default}
.olet{font-weight:700;font-size:.75rem;opacity:.5;flex-shrink:0;padding-top:.05rem;min-width:1rem}
.fb{display:none;margin-top:.75rem;padding:.75rem 1rem;border-radius:8px;font-size:.82rem;line-height:1.6;border-left:3px solid}
.fb.ok{background:#f0fdf4;border-color:#16a34a;color:#15803d;display:block}
.fb.ng{background:#f9fafb;border-color:#dc2626;color:#374151;display:block}
.chk-btn{margin-top:.8rem;display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1.1rem;border:1.5px solid #374151;color:#374151;background:transparent;border-radius:7px;font-size:.73rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.chk-btn:hover:not(:disabled){background:#374151;color:#fff}
.chk-btn:disabled{opacity:.3;cursor:default}
.actions{text-align:center;padding:2rem 0;border-top:1px solid #e2e8f0;margin-top:.5rem}
.warn{font-size:.75rem;color:#d97706;margin-bottom:.75rem;min-height:1em;font-weight:500}
.submit-btn{padding:.8rem 2.2rem;background:#374151;color:#fff;border:none;border-radius:9px;font-size:.82rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:opacity .12s}
.submit-btn:hover{opacity:.88}
#results{display:none;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:2.5rem 2rem;text-align:center;margin-top:1.5rem}
.res-score{font-size:4.5rem;font-weight:800;color:#374151;line-height:1}
.res-pct{font-size:.9rem;color:#64748b;margin:.3rem 0 1.2rem}
.res-rat{display:inline-block;padding:.4rem 1.2rem;background:#f9fafb;color:#374151;border-radius:20px;font-weight:700;font-size:.95rem;margin-bottom:1.5rem}
.res-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.6rem;margin:1rem 0 1.5rem;text-align:left}
.res-cell{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:.65rem}
.res-cell-n{font-size:.58rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem}
.res-cell-v{font-size:1.5rem;font-weight:800;color:#1e293b}
.restart-btn{padding:.7rem 1.8rem;border:1.5px solid #374151;color:#374151;background:transparent;border-radius:8px;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.restart-btn:hover{background:#374151;color:#fff}
@media(max-width:580px){.wrap{padding:1rem .75rem 4rem}.qcard{padding:1.1rem}.res-score{font-size:3.5rem}}
</style>
</head>
<body>
<div class="topbar" style="background:#374151">
  <div>
    <div class="topbar-sub">Curso de instalación de anclajes en barrancos</div>
    <h1>Evaluación Mixta VI</h1>
  </div>
  <a href="index.html?v=202603180916">← Índice</a>
</div>
<div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
<div class="wrap">
  <div class="stat-row">
    <div class="stat"><strong id="pp">0/10</strong>Respondidas</div>
    <div class="stat"><strong>10</strong>Preguntas</div>
    <div class="stat"><strong style="font-size:.9rem;color:#64748b">Todos los temas · Nivel avanzado</strong></div>
  </div>
  <div id="quiz"></div>
  <div class="actions">
    <div class="warn" id="warn"></div>
    <button class="submit-btn" onclick="submit()">Finalizar y ver resultados →</button>
  </div>
  <div id="results">
    <div class="res-score" id="rscore"></div>
    <div class="res-pct" id="rpct"></div>
    <div class="res-rat" id="rrat"></div>
    <div class="res-grid" id="rgrid"></div>
    <button class="restart-btn" onclick="restart()">↺ Repetir</button>
  <div style="margin-top:1.5rem">
    <a href="index.html" style="display:inline-flex;align-items:center;gap:.5rem;padding:.7rem 1.8rem;border:1.5px solid #64748b;color:#64748b;border-radius:10px;font-family:inherit;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;text-decoration:none;transition:all .12s" onmouseover="this.style.borderColor='#1e293b';this.style.color='#1e293b'" onmouseout="this.style.borderColor='#64748b';this.style.color='#64748b'">← Volver al índice</a>
  </div>
  </div>
</div>
<script>
const Q=[{"id": 1, "bl": "T1", "la": "Tema 1", "tx": "Un reequipador instala anclajes correctamente y con permisos en un barranco de uso público. Dos años después, un barranquista resulta herido porque la Administración no retiró a tiempo un anclaje antiguo deteriorado que seguía en uso junto a los nuevos. ¿Quién tiene responsabilidad en este supuesto?", "op": ["Solo el reequipador, ya que instaló los nuevos anclajes sin retirar los viejos", "Solo la Administración, ya que los barrancos de uso público son de su competencia exclusiva", "Pueden concurrir responsabilidades: del reequipador si no eliminó los viejos y de la Administración por no mantener la seguridad de la instalación de uso público", "Ninguno; el barranquista asume el riesgo al practicar la actividad en el medio natural"], "co": "c", "fc": "Correcto. El Tema 1 indica que el reequipador tiene obligación de eliminar los anclajes antiguos o dañados para evitar su uso. A su vez, la Administración tiene deber constitucional (art. 51.1 CE) de garantizar la seguridad de instalaciones de uso público. Pueden concurrir ambas responsabilidades.", "fw": "Incorrecto. Respuesta correcta: C. El temario señala expresamente que el reequipador debe eliminar los anclajes viejos, y la Administración tiene el deber de velar por la seguridad de las instalaciones de uso público. Ambas responsabilidades pueden coexistir."}, {"id": 2, "bl": "T2", "la": "Tema 2", "tx": "Vas a reequipar un barranco en Canarias a 5 km de la costa, cuya roca es caliza con resistencia a compresión estimada de 35 MPa. ¿Cuál es la combinación más adecuada de tipo de roca, anclaje y material según el temario?", "op": ["Roca dura; anclaje de expansión W-FA; acero A2", "Roca frágil; anclaje químico sin expansión con resina; acero inoxidable clase GC o SCC según distancia al mar", "Roca muy frágil; anclaje de gran longitud; titanio obligatorio por normativa", "Roca frágil; anclaje autorroscante (Spit); acero galvanizado para zonas costeras"], "co": "b", "fc": "Correcto. 35 MPa → roca frágil (20-60 MPa): se desaconsejan los expansivos de fuerte expansión; se recomiendan anclajes químicos sin expansión. A 5 km de la costa hay riesgo de cloruros, por lo que se recomienda clase GC como mínimo o SCC si hay evidencia de ese riesgo.", "fw": "Incorrecto. Respuesta correcta: B. La caliza de 35 MPa es roca frágil → anclaje químico. La proximidad a la costa exige clase GC o SCC. El galvanizado y el A2 no son apropiados en entornos con presencia de cloruros."}, {"id": 3, "bl": "T3", "la": "Tema 3", "tx": "Un anclaje está marcado como 'X2CrNiMo 17-12-2' según la designación simbólica EN 10088. ¿Qué información técnica puedes extraer directamente de esa designación?", "op": ["Es un acero al carbono con 17% de manganeso y 12% de silicio, de alta dureza", "Es un acero inoxidable austenítico con aproximadamente 17% de cromo, 12% de níquel y 2% de molibdeno, equivalente al AISI 316", "Es un acero ferrítico con 17% de cromo, sin níquel, de resistencia moderada a la corrosión", "Es un acero martensítico con 17% de cromo y 12% de carbono, de alta dureza superficial"], "co": "b", "fc": "Correcto. La designación X2CrNiMo 17-12-2 se lee: X = acero inoxidable, 2 = 0,02% de C (bajo carbono = 'L'), Cr ≈ 17%, Ni ≈ 12%, Mo ≈ 2%. Es el AISI 316L (EN 1.4404), acero austenítico con molibdeno, el más usado en anclajes para entornos no extremadamente agresivos.", "fw": "Incorrecto. Respuesta correcta: B. En la designación simbólica X-C-Cr-Ni-Mo: X = inoxidable, los porcentajes de Cr, Ni y Mo se leen directamente. X2CrNiMo 17-12-2 es el AISI 316L, austenítico con Mo."}, {"id": 4, "bl": "T3", "la": "Tema 3", "tx": "Un reequipador revisa visualmente un barranco costero y los anclajes de acero inoxidable instalados hace 3 años tienen buen aspecto: no hay óxido visible ni deformaciones. ¿Qué conclusión es correcta según el temario?", "op": ["Los anclajes están en buen estado; la ausencia de óxido garantiza que no hay corrosión", "El buen aspecto visual no descarta el SCC: las fisuras suelen ser invisibles a simple vista y pueden haberse iniciado ya; solo pruebas destructivas pueden confirmarlo", "El AISI 316L es inmune al SCC en todos los entornos, por lo que no hay riesgo", "Después de 3 años sin signos visibles de corrosión, el anclaje ha superado el período crítico y puede considerarse seguro por al menos 20 años más"], "co": "b", "fc": "Correcto. El Anexo II UIAA advierte expresamente que el SCC suele ser invisible; solo las pruebas destructivas pueden confirmar su presencia o ausencia. Anclajes instalados hace pocos meses pueden ya estar afectados sin ningún signo visual.", "fw": "Incorrecto. Respuesta correcta: B. La UIAA es clara: el SCC es en gran medida invisible. El buen aspecto visual no garantiza nada. Incluso el 316L puede fallar por SCC según el proceso de fabricación."}, {"id": 5, "bl": "T4", "la": "Tema 4", "tx": "Un tensor de doble anilla sin cadena solidarizadora NO cumple la UNE-EN 959:2018 como anclaje de aseguramiento para roca. ¿Por qué, y cómo se soluciona según el temario?", "op": ["No la cumple porque la anilla no tiene la resistencia suficiente; se soluciona usando un tensor con anilla de mayor sección", "No la cumple porque son dos puntos independientes no conectados entre sí; se soluciona solidarizándolos con una cadena o sistema que los una, cumpliendo así la definición de 'anclajes conectados entre sí' de la norma", "No la cumple porque la doble anilla genera un ángulo crítico de la cuerda; se soluciona instalando una sola anilla", "Sí cumple la norma siempre que ambos tensores sean del mismo modelo y fabricante"], "co": "b", "fc": "Correcto. La UNE-EN 959:2018 define los anclajes de aseguramiento como 'conectados entre sí'. Dos tensores independientes sin unir no cumplen esta definición. La solución es solidarizarlos con una cadena, convirtiendo los dos puntos independientes en una cabecera que sí cumple la norma.", "fw": "Incorrecto. Respuesta correcta: B. La norma exige que los anclajes estén 'conectados entre sí'. Dos tensores sin unir no lo cumplen; la solidarización con cadena soluciona el problema."}, {"id": 6, "bl": "T4", "la": "Tema 4", "tx": "Estás reequipando en agosto, en un barranco de interior de Canarias a 30°C. La resina disponible es viniléster. ¿Es adecuada y por qué?", "op": ["Sí, es la más adecuada: las viniléster tienen trabajabilidad larga que compensa el calor", "No es la más adecuada: las viniléster son inadecuadas para altas temperaturas; en verano y calor se prefiere la epoxi, que tiene mejor rendimiento térmico", "Sí, es adecuada: las viniléster fraguan perfectamente a cualquier temperatura sin problema", "No importa el tipo de resina si la temperatura no supera los 40°C; ambas son equivalentes por debajo de ese umbral"], "co": "b", "fc": "Correcto. El temario indica que las viniléster son inadecuadas para altas temperaturas y perfectas para zonas frías y alta montaña. A 30°C en verano, la resina epoxi es preferible por su mejor comportamiento térmico y mayor tiempo de trabajabilidad.", "fw": "Incorrecto. Respuesta correcta: B. Las viniléster son para frío; en calor se usan epoxi. A 30°C con viniléster, el tiempo de trabajabilidad sería extremadamente corto y el fraguado puede ser incorrecto."}, {"id": 7, "bl": "T5", "la": "Tema 5", "tx": "Tras instalar un anclaje químico, el testigo de resina de uno de los agujeros ha endurecido correctamente pero el del segundo está blando. El compañero propone aceptar ambos anclajes porque 'el primero está bien y los dos juntos aguantan'. ¿Es correcto según el temario?", "op": ["Sí, si el primer anclaje ha fraguado bien, la cabecera es segura aunque el segundo tenga dudas", "Depende: si el anclaje con testigo blando es el desviador (secundario), puede aceptarse; si es el principal, debe reinstalarse", "No; cualquier anomalía en un testigo obliga a dudar del fraguado de ese anclaje, desecharlo y reinstalarlo, sin excepciones", "Sí, si se espera 48 horas adicionales el anclaje con testigo blando puede terminar de fraguar correctamente"], "co": "c", "fc": "Correcto. El Tema 5 es taxativo: si cualquier testigo falla, hay que dudar del endurecimiento de la resina y volver a instalar. No hay excepciones por posición del anclaje ni por espera adicional.", "fw": "Incorrecto. Respuesta correcta: C. El temario no admite excepciones: testigo blando = dudar del fraguado = desechar y reinstalar. Un anclaje con fraguado dudoso no debe usarse bajo ningún concepto."}, {"id": 8, "bl": "T5", "la": "Tema 5", "tx": "Un barranco muy frecuentado (alta afluencia) tiene roca basáltica dura. El reequipador duda entre instalar tensores de 10 mm o de 12 mm. ¿Qué criterio aplica el temario para esta decisión?", "op": ["Siempre se usa 10 mm; el diámetro 12 mm es exclusivo para anclajes químicos en roca frágil", "Se usa 12 mm cuando la alta afluencia de barranquistas implica mayor solicitación sobre los anclajes; a mayor uso, mayor sección", "El diámetro lo determina exclusivamente la resistencia de la roca, no la afluencia de usuarios", "Se usa 12 mm solo cuando la roca tiene resistencia a compresión inferior a 20 MPa, independientemente del uso"], "co": "b", "fc": "Correcto. El Tema 6 (Premisas del reequipamiento) indica explícitamente: 'dependiendo de la solicitación que se le requiera a los anclajes, por la alta afluencia de barranquistas, utilizaremos un anclaje de mayor sección. Si lo normal son 10 mm, en esos casos utilizaremos 12 mm.'", "fw": "Incorrecto. Respuesta correcta: B. El temario contempla expresamente que la alta afluencia de usuarios justifica aumentar la sección del anclaje de 10 mm a 12 mm, independientemente de la dureza de la roca."}, {"id": 9, "bl": "T6", "la": "Tema 6", "tx": "Durante el reequipamiento de un barranco largo, el equipo ha perforado todos los agujeros en una primera jornada. Al día siguiente, antes de inyectar la resina, el resinador detecta que en dos de los agujeros hay agua acumulada en el fondo. Con resina epoxi disponible, ¿cuál es la actuación correcta?", "op": ["Inyectar la resina epoxi igualmente; la cantidad de agua es pequeña y no afectará al fraguado", "Sustituir la resina epoxi por viniléster o resina de poliéster, que sí fraguan bajo el agua", "Secar los agujeros con el soplador antes de inyectar la resina epoxi, o valorar el uso de una resina específica para ambientes húmedos o inundados como la WIT-PE 500", "Ampliar el diámetro de los agujeros con agua para diluir la humedad y proceder con la epoxi"], "co": "a", "fc": "Correcto. La resina epoxi puede aplicarse en condiciones de humedad moderada sin comprometer el fraguado. Lo que el temario desaconseja es la resina de poliéster, que en presencia de humedad puede perder hasta el 60% de resistencia. Con epoxi disponible, la actuación correcta es proceder con la instalación.", "fw": "Incorrecto. Respuesta correcta: A. La epoxi es compatible con humedad moderada. La resina desaconsejada en barrancos por degradarse con la humedad es la poliéster, no la epoxi. Sustituir por poliéster sería peor, no mejor."}, {"id": 10, "bl": "T6", "la": "Tema 6", "tx": "Al llegar a la cabecera de un rápel a reequipar, el reequipador observa que hay un árbol sólido con raíces profundas a 80 cm del borde, perfectamente posicionado sobre la línea del rápel. ¿Qué debe hacer según las premisas del Tema 6?", "op": ["Ignorarlo e instalar los anclajes metálicos previstos, ya que los naturales no cumplen la normativa UNE-EN 959", "Priorizar el árbol como anclaje natural frente a los metálicos, ya que el temario establece que si existe posibilidad de anclajes naturales se desechará instalar anclajes metálicos", "Instalar los metálicos igualmente como seguridad adicional junto al árbol, ya que la normativa exige siempre dos anclajes metálicos homologados", "Comunicar el hallazgo al instructor y esperar instrucciones antes de tomar cualquier decisión"], "co": "b", "fc": "Correcto. El Tema 6 establece explícitamente: 'Si existe posibilidad de anclajes naturales se desechará instalar anclajes metálicos.' La prioridad del natural sobre el metálico responde tanto a criterios medioambientales como prácticos.", "fw": "Incorrecto. Respuesta correcta: B. El temario es claro: los anclajes naturales tienen prioridad sobre los metálicos. Un árbol sólido bien situado debe usarse en lugar de instalar anclajes metálicos, no junto a ellos."}];
const ans={},ver=new Set();
function build(){const c=document.getElementById('quiz');Q.forEach(q=>{const d=document.createElement('div');d.className='qcard';
d.innerHTML=`<div class="qmeta"><span class="qnum">Pregunta ${q.id}</span><span class="qbadge">${q.la}</span></div>`+
`<div class="qtxt">${q.tx}</div><div class="opts" id="o${q.id}">`+
q.op.map((t,i)=>`<button class="opt" data-v="${'abcd'[i]}" onclick="pick(${q.id},'${'abcd'[i]}')"><span class="olet">${'ABCD'[i]}</span>${t}</button>`).join('')+
`</div><div class="fb" id="f${q.id}"></div><button class="chk-btn" id="b${q.id}" onclick="check(${q.id})">▶ Comprobar</button>`;
document.getElementById('quiz').appendChild(d);});}
function pick(id,v){if(ver.has(id))return;document.querySelectorAll(`#o${id} .opt`).forEach(o=>o.classList.remove('sel'));document.querySelector(`#o${id} [data-v="${v}"]`).classList.add('sel');ans[id]=v;prog();}
function check(id){if(ver.has(id))return;if(!ans[id]){document.getElementById('warn').textContent='⚠ Selecciona una opción primero.';return;}document.getElementById('warn').textContent='';
ver.add(id);const q=Q.find(x=>x.id===id);const ok=ans[id]===q.co;
document.querySelectorAll(`#o${id} .opt`).forEach(o=>{o.classList.add('dis');if(o.dataset.v===q.co)o.classList.add('ok');else if(o.dataset.v===ans[id]&&!ok)o.classList.add('ng');});
const f=document.getElementById('f'+id);f.className='fb '+(ok?'ok':'ng');f.textContent=(ok?'✓ ':'✗ ')+(ok?q.fc:q.fw);
const b=document.getElementById('b'+id);b.disabled=true;b.textContent=ok?'✓ Correcto':'✗ Incorrecto';}
function prog(){const d=Object.keys(ans).length,p=Math.round(d/Q.length*100);
document.getElementById('pp').textContent=`${d}/${Q.length} respondidas`;document.getElementById('pf').style.width=p+'%';}
function submit(){const un=Q.filter(q=>!ans[q.id]);document.getElementById('warn').textContent=un.length?`⚠ ${un.length} pregunta(s) sin responder.`:'';
Q.forEach(q=>{if(!ver.has(q.id)&&ans[q.id])check(q.id);});
let tot=0;const bk={};Q.forEach(q=>{const ok=ans[q.id]===q.co;if(ok)tot++;bk[q.la]=bk[q.la]||[0,0];bk[q.la][1]++;if(ok)bk[q.la][0]++;});
const p=Math.round(tot/Q.length*100);document.getElementById('rscore').textContent=`${tot}/${Q.length}`;document.getElementById('rpct').textContent=`${p}% de respuestas correctas`;
const r=['❗ Necesitas repasar','📖 Suficiente','📚 Bien','👍 Notable','🏆 Sobresaliente'];
document.getElementById('rrat').textContent=r[p>=90?4:p>=75?3:p>=60?2:p>=50?1:0];
document.getElementById('rgrid').innerHTML=Object.entries(bk).map(([k,[c,t]])=>`<div class="res-cell"><div class="res-cell-n">${k}</div><div class="res-cell-v">${c}/${t}</div></div>`).join('');
document.getElementById('results').style.display='block';document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});}
function restart(){Object.keys(ans).forEach(k=>delete ans[k]);ver.clear();document.querySelectorAll('.opt').forEach(o=>o.className='opt');document.querySelectorAll('.fb').forEach(f=>{f.className='fb';f.textContent='';});document.querySelectorAll('.chk-btn').forEach(b=>{b.disabled=false;b.textContent='▶ Comprobar';});document.getElementById('warn').textContent='';document.getElementById('results').style.display='none';prog();window.scrollTo({top:0,behavior:'smooth'});}
build();prog();
</script>
</body>
</html>
