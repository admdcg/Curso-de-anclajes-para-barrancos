<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Evaluación Mixta VI — Reequipamiento de Barrancos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.topbar{background:#374151;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.topbar h1{color:#fff;font-size:1.05rem;font-weight:700;line-height:1.2}
.topbar a{color:rgba(255,255,255,.8);font-size:.78rem;text-decoration:none;background:rgba(255,255,255,.15);padding:.35rem .8rem;border-radius:6px;white-space:nowrap}
.topbar a:hover{background:rgba(255,255,255,.25)}
.topbar-sub{color:rgba(255,255,255,.7);font-size:.75rem}
.prog-bar{background:rgba(255,255,255,.25);height:5px}
.prog-fill{height:100%;background:#fff;transition:width .4s;width:0%}
.wrap{max-width:780px;margin:0 auto;padding:1.5rem 1rem 5rem}
.stat-row{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:.65rem 1rem;font-size:.8rem;color:#64748b;flex:1;min-width:110px}
.stat strong{display:block;font-size:1.3rem;font-weight:700;color:#1e293b;line-height:1}
.qcard{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.4rem;margin-bottom:1rem;border-top:3px solid #374151}
.qmeta{display:flex;align-items:center;gap:.6rem;margin-bottom:.7rem;flex-wrap:wrap}
.qnum{font-size:.72rem;font-weight:600;color:#374151;background:#f9fafb;padding:.2rem .55rem;border-radius:4px}
.qbadge{font-size:.68rem;color:#64748b;background:#f1f5f9;padding:.2rem .55rem;border-radius:4px}
.qtxt{font-size:.95rem;line-height:1.65;color:#1e293b;margin-bottom:1rem}
.opts{display:flex;flex-direction:column;gap:.4rem}
.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.65rem .9rem;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:.87rem;line-height:1.5;text-align:left;color:#1e293b;width:100%;transition:all .12s}
.opt:hover:not(.dis){background:#f9fafb;border-color:#374151}
.opt.sel{background:#f9fafb;border-color:#374151;color:#1e293b}
.opt.ok{background:#dcfce7;border-color:#16a34a;color:#15803d;font-weight:500}
.opt.ng{background:#fee2e2;border-color:#dc2626;color:#374151}
.opt.dis{cursor:default}
.olet{font-weight:700;font-size:.75rem;opacity:.5;flex-shrink:0;padding-top:.05rem;min-width:1rem}
.fb{display:none;margin-top:.75rem;padding:.75rem 1rem;border-radius:8px;font-size:.82rem;line-height:1.6;border-left:3px solid}
.fb.ok{background:#f0fdf4;border-color:#16a34a;color:#15803d;display:block}
.fb.ng{background:#f9fafb;border-color:#dc2626;color:#374151;display:block}
.chk-btn{margin-top:.8rem;display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1.1rem;border:1.5px solid #374151;color:#374151;background:transparent;border-radius:7px;font-size:.73rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.chk-btn:hover:not(:disabled){background:#374151;color:#fff}
.chk-btn:disabled{opacity:.3;cursor:default}
.actions{text-align:center;padding:2rem 0;border-top:1px solid #e2e8f0;margin-top:.5rem}
.warn{font-size:.75rem;color:#d97706;margin-bottom:.75rem;min-height:1em;font-weight:500}
.submit-btn{padding:.8rem 2.2rem;background:#374151;color:#fff;border:none;border-radius:9px;font-size:.82rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:opacity .12s}
.submit-btn:hover{opacity:.88}
#results{display:none;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:2.5rem 2rem;text-align:center;margin-top:1.5rem}
.res-score{font-size:4.5rem;font-weight:800;color:#374151;line-height:1}
.res-pct{font-size:.9rem;color:#64748b;margin:.3rem 0 1.2rem}
.res-rat{display:inline-block;padding:.4rem 1.2rem;background:#f9fafb;color:#374151;border-radius:20px;font-weight:700;font-size:.95rem;margin-bottom:1.5rem}
.res-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.6rem;margin:1rem 0 1.5rem;text-align:left}
.res-cell{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:.65rem}
.res-cell-n{font-size:.58rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem}
.res-cell-v{font-size:1.5rem;font-weight:800;color:#1e293b}
.restart-btn{padding:.7rem 1.8rem;border:1.5px solid #374151;color:#374151;background:transparent;border-radius:8px;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.restart-btn:hover{background:#374151;color:#fff}
@media(max-width:580px){.wrap{padding:1rem .75rem 4rem}.qcard{padding:1.1rem}.res-score{font-size:3.5rem}}
</style>
</head>
<body>
<div class="topbar" style="background:#374151">
  <div>
    <div class="topbar-sub">Curso de Reequipamiento de Barrancos</div>
    <h1>Evaluación Mixta VI</h1>
  </div>
  <a href="index.html">← Índice</a>
</div>
<div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
<div class="wrap">
  <div class="stat-row">
    <div class="stat"><strong id="pp">0/10</strong>Respondidas</div>
    <div class="stat"><strong>10</strong>Preguntas</div>
    <div class="stat"><strong style="font-size:.9rem;color:#64748b">Responsabilidad · Normativa · TD Barrancos</strong></div>
  </div>
  <div id="quiz"></div>
  <div class="actions">
    <div class="warn" id="warn"></div>
    <button class="submit-btn" onclick="submit()">Finalizar y ver resultados →</button>
  </div>
  <div id="results">
    <div class="res-score" id="rscore"></div>
    <div class="res-pct" id="rpct"></div>
    <div class="res-rat" id="rrat"></div>
    <div class="res-grid" id="rgrid"></div>
    <button class="restart-btn" onclick="restart()">↺ Repetir</button>
  </div>
</div>
<script>
const Q=[{"id": 1, "bl": "T1", "la": "Tema 1", "tx": "Antes de iniciar un proyecto de reequipamiento en un barranco situado dentro de un Espacio Natural Protegido, ¿cuál es el trámite administrativo imprescindible que debe realizar el reequipador?", "op": ["Comunicarlo por redes sociales para recabar voluntarios y financiación", "Notificarlo al club de barranquismo más cercano a la zona", "Solicitar la autorización previa a la Administración competente (Cabildo Insular en Canarias)", "Registrar el proyecto en el Censo de Instalaciones Deportivas antes de comenzar"], "co": "c", "fc": "Correcto. Actuar en un ENP sin la preceptiva autorización del Cabildo Insular expone al reequipador a responsabilidad administrativa y puede invalidar legalmente los trabajos realizados. Solicitar el permiso es el primer paso obligatorio.", "fw": "Incorrecto. El trámite imprescindible es solicitar la autorización previa a la Administración competente (el Cabildo Insular en Canarias), sin la cual la actuación en un ENP es ilegal."}, {"id": 2, "bl": "T1", "la": "Tema 1", "tx": "Según el Tema 1, ¿cuál de las siguientes afirmaciones sobre la Administración Pública y los barrancos deportivos es CORRECTA?", "op": ["La Administración solo responde si el barranco figura en el Censo de Instalaciones Deportivas", "La Administración queda exonerada si el accidente ocurre fuera del horario de supervisión oficial", "La Administración tiene obligación de velar por la seguridad de las instalaciones de uso público con independencia del Censo", "La responsabilidad recae exclusivamente sobre quien instaló los anclajes defectuosos"], "co": "c", "fc": "Correcto. La obligación de la Administración de garantizar la seguridad de instalaciones de uso público (art. 51.1 CE) no depende de si el barranco figura o no en el Censo.", "fw": "Incorrecto. La obligación de seguridad de la Administración existe independientemente del registro censal."}, {"id": 3, "bl": "T2", "la": "Tema 2", "tx": "Las rocas sedimentarias constituyen el 75% de las rocas existentes en el mundo y se forman principalmente por:", "op": ["El enfriamiento lento del magma en el interior de la Tierra, formando cristales grandes", "La acumulación y posterior compactación y cementación de sedimentos procedentes de otras rocas o restos orgánicos transportados por agua o aire", "La transformación de rocas preexistentes por efecto de altas presiones y temperaturas en el interior de la corteza", "La solidificación rápida de la lava en la superficie terrestre tras una erupción volcánica"], "co": "b", "fc": "Correcto. Las rocas sedimentarias se forman por la acumulación de sedimentos (fragmentos de otras rocas, restos orgánicos) que, durante largos períodos, se compactan y cementan formando roca sólida. Son las más abundantes superficialmente.", "fw": "Incorrecto. Las rocas sedimentarias se forman por acumulación, compactación y cementación de sedimentos. El enfriamiento del magma produce ígneas intrusivas; la lava enfriada produce extrusivas; la presión y temperatura producen metamórficas."}, {"id": 4, "bl": "T2", "la": "Tema 2", "tx": "El basalto es una roca magmática extrusiva muy común en Canarias. ¿Cuál es su categoría de resistencia según el Tema 2 y qué implica para la elección de anclajes?", "op": ["Roca muy frágil (< 20 MPa); solo se recomiendan anclajes de gran longitud con resina", "Roca frágil (20-60 MPa); se desaconsejan los anclajes de expansión fuertes", "Roca dura (> 60 MPa); es adecuada tanto para anclajes mecánicos de expansión como para anclajes químicos", "Roca metamórfica de alta resistencia; requiere brocas de diamante para su perforación"], "co": "c", "fc": "Correcto. El basalto es una roca dura (> 60 MPa), junto con el granito y la caliza dura. En roca dura son adecuados los anclajes mecánicos de expansión (W-FA/FAZ) y también los químicos, siendo la opción preferente estos últimos por sus mejores características.", "fw": "Incorrecto. El basalto se clasifica como roca dura (> 60 MPa), lo que lo hace apto para anclajes de expansión y también para anclajes químicos."}, {"id": 5, "bl": "T3", "la": "Tema 3", "tx": "La clase 'SCC' de la norma UIAA 123 V4 2020 es la única que:", "op": ["Garantiza que el anclaje es de titanio de grado 2", "Ha demostrado resistencia tanto a la corrosión general como a la corrosión bajo tensión (Stress Corrosion Cracking)", "Exige que el fabricante sea europeo y esté certificado por ENAC", "Permite el uso del anclaje en rocas con resistencia a compresión inferior a 400 kg/cm²"], "co": "b", "fc": "Correcto. La clase SCC es la única de las tres clases (SCC, GC, LC) que ha superado las pruebas tanto de corrosión general como de corrosión bajo tensión.", "fw": "Incorrecto. La clase SCC es la única que resiste tanto la corrosión general como el SCC."}, {"id": 6, "bl": "T3", "la": "Tema 3", "tx": "El 'tratamiento marino' (desengrasado + decapado + pasivado) es utilizado por fabricantes como Lappas Climbing, Vertical Evolution y Raumer para:", "op": ["Reducir el coste de producción de los aceros inoxidables A2", "Mejorar la resistencia a la corrosión de los anclajes especialmente en entornos marinos", "Cumplir el requisito obligatorio de la norma UNE-EN 959:2018", "Aumentar la dureza superficial y la resistencia mecánica del anclaje"], "co": "b", "fc": "Correcto. El tratamiento marino mejora la resistencia a la corrosión de los anclajes, siendo especialmente relevante para entornos con alta concentración de cloruros como los barrancos costeros.", "fw": "Incorrecto. El tratamiento marino mejora la resistencia a la corrosión, especialmente en entornos costeros."}, {"id": 7, "bl": "T4", "la": "Tema 4", "tx": "Las resinas de poliéster NO se recomiendan para anclajes de barrancos principalmente porque:", "op": ["Son demasiado viscosas para inyectarse con pistola estándar", "En condiciones de humedad o materiales alcalinos pueden degradarse y perder hasta el 60% de resistencia", "Tienen un tiempo de trabajabilidad excesivamente largo para uso en campo", "Son incompatibles químicamente con los aceros inoxidables austeníticos"], "co": "b", "fc": "Correcto. Las resinas de poliéster pueden degradarse en presencia de humedad o materiales alcalinos, llegando a perder hasta el 60% de resistencia frente al valor de una instalación seca.", "fw": "Incorrecto. Las poliéster pueden degradarse en ambientes húmedos o alcalinos, perdiendo hasta el 60% de resistencia."}, {"id": 8, "bl": "T4", "la": "Tema 4", "tx": "La norma UNE-EN 959:2018 exige para un anclaje de aseguramiento para roca una resistencia a la carga axial (extracción) de al menos:", "op": ["10 kN", "15 kN", "20 kN", "25 kN"], "co": "b", "fc": "Correcto. La UNE-EN 959:2018 exige 15 kN a extracción (axial) y 25 kN a cizalladura (radial). La UIAA 123 es más exigente: 20 kN axial y 25 kN radial.", "fw": "Incorrecto. La UNE-EN 959:2018 exige 15 kN a extracción y 25 kN a cizalladura."}, {"id": 9, "bl": "T5", "la": "Tema 5", "tx": "Los taladros a batería más utilizados en reequipamiento trabajan con un voltaje de:", "op": ["12V, por su ligereza extrema", "18V, equilibrio entre voltaje, intensidad y peso", "36V, para maximizar la fuerza de percusión", "48V, estándar actual de la industria de la construcción"], "co": "b", "fc": "Correcto. Los 18V son los más habituales en reequipamiento por ofrecer el mejor equilibrio entre voltaje, intensidad de batería y peso transportable.", "fw": "Incorrecto. Los taladros de 18V son los más comunes en reequipamiento por equilibrio entre potencia y peso."}, {"id": 10, "bl": "T6", "la": "Tema 6", "tx": "En el 'modo solidario' de una cabecera con cadena en L, la carga es soportada por:", "op": ["Solo el anclaje inferior; el superior permanece inactivo como seguro", "Ambos anclajes simultáneamente; la carga se comparte entre los dos", "El anclaje superior únicamente, siendo el inferior un refuerzo opcional", "La propia cadena que distribuye la carga según el ángulo de la cuerda"], "co": "a", "fc": "Correcto. En una cabecera solidarizada (modo reaseguro), solo el anclaje inferior soporta la carga activamente; el superior permanece inactivo como respaldo. Si el inferior falla, el superior entra en carga. A esto se le llama solidarizar la cabecera.", "fw": "Incorrecto. Respuesta correcta: A. Solidarizar una cabecera significa que si un anclaje falla el otro responde. En la cadena en L, el anclaje inferior soporta la carga y el superior actúa como seguro de respaldo."}];
const ans={},ver=new Set();
function build(){const c=document.getElementById('quiz');Q.forEach(q=>{const d=document.createElement('div');d.className='qcard';
d.innerHTML=`<div class="qmeta"><span class="qnum">Pregunta ${q.id}</span><span class="qbadge">${q.la}</span></div>`+
`<div class="qtxt">${q.tx}</div><div class="opts" id="o${q.id}">`+
q.op.map((t,i)=>`<button class="opt" data-v="${'abcd'[i]}" onclick="pick(${q.id},'${'abcd'[i]}')"><span class="olet">${'ABCD'[i]}</span>${t}</button>`).join('')+
`</div><div class="fb" id="f${q.id}"></div><button class="chk-btn" id="b${q.id}" onclick="check(${q.id})">▶ Comprobar</button>`;
document.getElementById('quiz').appendChild(d);});}
function pick(id,v){if(ver.has(id))return;document.querySelectorAll(`#o${id} .opt`).forEach(o=>o.classList.remove('sel'));document.querySelector(`#o${id} [data-v="${v}"]`).classList.add('sel');ans[id]=v;prog();}
function check(id){if(ver.has(id))return;if(!ans[id]){document.getElementById('warn').textContent='⚠ Selecciona una opción primero.';return;}document.getElementById('warn').textContent='';
ver.add(id);const q=Q.find(x=>x.id===id);const ok=ans[id]===q.co;
document.querySelectorAll(`#o${id} .opt`).forEach(o=>{o.classList.add('dis');if(o.dataset.v===q.co)o.classList.add('ok');else if(o.dataset.v===ans[id]&&!ok)o.classList.add('ng');});
const f=document.getElementById('f'+id);f.className='fb '+(ok?'ok':'ng');f.textContent=(ok?'✓ ':'✗ ')+(ok?q.fc:q.fw);
const b=document.getElementById('b'+id);b.disabled=true;b.textContent=ok?'✓ Correcto':'✗ Incorrecto';}
function prog(){const d=Object.keys(ans).length,p=Math.round(d/Q.length*100);
document.getElementById('pp').textContent=`${d}/${Q.length} respondidas`;document.getElementById('pf').style.width=p+'%';}
function submit(){const un=Q.filter(q=>!ans[q.id]);document.getElementById('warn').textContent=un.length?`⚠ ${un.length} pregunta(s) sin responder.`:'';
Q.forEach(q=>{if(!ver.has(q.id)&&ans[q.id])check(q.id);});
let tot=0;const bk={};Q.forEach(q=>{const ok=ans[q.id]===q.co;if(ok)tot++;bk[q.la]=bk[q.la]||[0,0];bk[q.la][1]++;if(ok)bk[q.la][0]++;});
const p=Math.round(tot/Q.length*100);document.getElementById('rscore').textContent=`${tot}/${Q.length}`;document.getElementById('rpct').textContent=`${p}% de respuestas correctas`;
const r=['❗ Necesitas repasar','📖 Suficiente','📚 Bien','👍 Notable','🏆 Sobresaliente'];
document.getElementById('rrat').textContent=r[p>=90?4:p>=75?3:p>=60?2:p>=50?1:0];
document.getElementById('rgrid').innerHTML=Object.entries(bk).map(([k,[c,t]])=>`<div class="res-cell"><div class="res-cell-n">${k}</div><div class="res-cell-v">${c}/${t}</div></div>`).join('');
document.getElementById('results').style.display='block';document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});}
function restart(){Object.keys(ans).forEach(k=>delete ans[k]);ver.clear();document.querySelectorAll('.opt').forEach(o=>o.className='opt');document.querySelectorAll('.fb').forEach(f=>{f.className='fb';f.textContent='';});document.querySelectorAll('.chk-btn').forEach(b=>{b.disabled=false;b.textContent='▶ Comprobar';});document.getElementById('warn').textContent='';document.getElementById('results').style.display='none';prog();window.scrollTo({top:0,behavior:'smooth'});}
build();prog();
</script>
</body>
</html>
