<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tema 3 — Aceros y Corrosión — Reequipamiento de Barrancos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.topbar{background:#7c3aed;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.topbar h1{color:#fff;font-size:1.05rem;font-weight:700;line-height:1.2}
.topbar a{color:rgba(255,255,255,.8);font-size:.78rem;text-decoration:none;background:rgba(255,255,255,.15);padding:.35rem .8rem;border-radius:6px;white-space:nowrap}
.topbar a:hover{background:rgba(255,255,255,.25)}
.topbar-sub{color:rgba(255,255,255,.7);font-size:.75rem}
.prog-bar{background:rgba(255,255,255,.25);height:5px}
.prog-fill{height:100%;background:#fff;transition:width .4s;width:0%}
.wrap{max-width:780px;margin:0 auto;padding:1.5rem 1rem 5rem}
.stat-row{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:.65rem 1rem;font-size:.8rem;color:#64748b;flex:1;min-width:110px}
.stat strong{display:block;font-size:1.3rem;font-weight:700;color:#1e293b;line-height:1}
.qcard{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.4rem;margin-bottom:1rem;border-top:3px solid #7c3aed}
.qmeta{display:flex;align-items:center;gap:.6rem;margin-bottom:.7rem;flex-wrap:wrap}
.qnum{font-size:.72rem;font-weight:600;color:#7c3aed;background:#f5f3ff;padding:.2rem .55rem;border-radius:4px}
.qbadge{font-size:.68rem;color:#64748b;background:#f1f5f9;padding:.2rem .55rem;border-radius:4px}
.qtxt{font-size:.95rem;line-height:1.65;color:#1e293b;margin-bottom:1rem}
.opts{display:flex;flex-direction:column;gap:.4rem}
.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.65rem .9rem;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:.87rem;line-height:1.5;text-align:left;color:#1e293b;width:100%;transition:all .12s}
.opt:hover:not(.dis){background:#f5f3ff;border-color:#7c3aed}
.opt.sel{background:#f5f3ff;border-color:#7c3aed;color:#1e293b}
.opt.ok{background:#dcfce7;border-color:#16a34a;color:#15803d;font-weight:500}
.opt.ng{background:#fee2e2;border-color:#dc2626;color:#b91c1c}
.opt.dis{cursor:default}
.olet{font-weight:700;font-size:.75rem;opacity:.5;flex-shrink:0;padding-top:.05rem;min-width:1rem}
.fb{display:none;margin-top:.75rem;padding:.75rem 1rem;border-radius:8px;font-size:.82rem;line-height:1.6;border-left:3px solid}
.fb.ok{background:#f0fdf4;border-color:#16a34a;color:#15803d;display:block}
.fb.ng{background:#fef2f2;border-color:#dc2626;color:#b91c1c;display:block}
.chk-btn{margin-top:.8rem;display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1.1rem;border:1.5px solid #7c3aed;color:#7c3aed;background:transparent;border-radius:7px;font-size:.73rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.chk-btn:hover:not(:disabled){background:#7c3aed;color:#fff}
.chk-btn:disabled{opacity:.3;cursor:default}
.actions{text-align:center;padding:2rem 0;border-top:1px solid #e2e8f0;margin-top:.5rem}
.warn{font-size:.75rem;color:#d97706;margin-bottom:.75rem;min-height:1em;font-weight:500}
.submit-btn{padding:.8rem 2.2rem;background:#7c3aed;color:#fff;border:none;border-radius:9px;font-size:.82rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:opacity .12s}
.submit-btn:hover{opacity:.88}
#results{display:none;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:2.5rem 2rem;text-align:center;margin-top:1.5rem}
.res-score{font-size:4.5rem;font-weight:800;color:#7c3aed;line-height:1}
.res-pct{font-size:.9rem;color:#64748b;margin:.3rem 0 1.2rem}
.res-rat{display:inline-block;padding:.4rem 1.2rem;background:#f5f3ff;color:#7c3aed;border-radius:20px;font-weight:700;font-size:.95rem;margin-bottom:1.5rem}
.res-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.6rem;margin:1rem 0 1.5rem;text-align:left}
.res-cell{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:.65rem}
.res-cell-n{font-size:.58rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem}
.res-cell-v{font-size:1.5rem;font-weight:800;color:#1e293b}
.restart-btn{padding:.7rem 1.8rem;border:1.5px solid #7c3aed;color:#7c3aed;background:transparent;border-radius:8px;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.restart-btn:hover{background:#7c3aed;color:#fff}
@media(max-width:580px){.wrap{padding:1rem .75rem 4rem}.qcard{padding:1.1rem}.res-score{font-size:3.5rem}}
</style>
</head>
<body>
<div class="topbar" style="background:#7c3aed">
  <div>
    <div class="topbar-sub">Curso de instalación de anclajes en barrancos</div>
    <h1>Tema 3 — Aceros y Corrosión</h1>
  </div>
  <a href="index.html">← Índice</a>
</div>
<div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
<div class="wrap">
  <div class="stat-row">
    <div class="stat"><strong id="pp">0/10</strong>Respondidas</div>
    <div class="stat"><strong>10</strong>Preguntas</div>
    <div class="stat"><strong style="font-size:.9rem;color:#64748b">Aleaciones · Tratamientos · Tipos de corrosión</strong></div>
  </div>
  <div id="quiz"></div>
  <div class="actions">
    <div class="warn" id="warn"></div>
    <button class="submit-btn" onclick="submit()">Finalizar y ver resultados →</button>
  </div>
  <div id="results">
    <div class="res-score" id="rscore"></div>
    <div class="res-pct" id="rpct"></div>
    <div class="res-rat" id="rrat"></div>
    <div class="res-grid" id="rgrid"></div>
    <button class="restart-btn" onclick="restart()">↺ Repetir</button>
  <div style="margin-top:1.5rem">
    <a href="index.html" style="display:inline-flex;align-items:center;gap:.5rem;padding:.7rem 1.8rem;border:1.5px solid #64748b;color:#64748b;border-radius:10px;font-family:inherit;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;text-decoration:none;transition:all .12s" onmouseover="this.style.borderColor='#1e293b';this.style.color='#1e293b'" onmouseout="this.style.borderColor='#64748b';this.style.color='#64748b'">← Volver al índice</a>
  </div>
  </div>
</div>
<script>
const Q=[{"id": 1, "bl": "T3", "la": "Tema 3", "tx": "El contenido máximo de carbono (C) que puede tener un acero para no considerarse fundición es:", "op": ["0,5%", "2,1%", "3,5%", "0,08%"], "co": "b", "fc": "Correcto. El acero es una aleación hierro-carbono con contenido de C entre 0,008% y 2,1%. Por encima se denomina fundición.", "fw": "Incorrecto. El límite superior del acero es 2,1% de carbono; por encima de ese valor se considera fundición."}, {"id": 2, "bl": "T3", "la": "Tema 3", "tx": "El tratamiento térmico de 'revenido' se aplica siempre después del temple para:", "op": ["Aumentar más la dureza conseguida mediante el temple", "Reducir la fragilidad excesiva y las tensiones internas generadas por el temple, mejorando la tenacidad", "Aumentar el contenido en carbono de la superficie del acero", "Eliminar completamente la martensita y obtener una estructura ferrítica"], "co": "b", "fc": "Correcto. El revenido reduce la fragilidad del acero templado y elimina tensiones internas, mejorando la tenacidad a costa de una ligera reducción de dureza.", "fw": "Incorrecto. El revenido reduce la fragilidad del temple y mejora la tenacidad; no aumenta la dureza."}, {"id": 3, "bl": "T3", "la": "Tema 3", "tx": "Los aceros inoxidables ferríticos se caracterizan por:", "op": ["Contener Cr y Ni, ser no magnéticos y muy usados en anclajes", "Contener Cr entre 10,5% y 30%, bajo carbono, ser magnéticos y NO usarse para fabricar anclajes", "Ser los más duros por su elevado contenido en carbono martensítico", "Tener molibdeno como elemento principal para resistir los cloruros marinos"], "co": "b", "fc": "Correcto. Los ferríticos contienen Cr 10,5-30%, C muy bajo (~0,08%), son magnéticos y no se utilizan para fabricar anclajes de escalada o barrancos.", "fw": "Incorrecto. Los aceros ferríticos contienen Cr 10,5-30%, son magnéticos y NO se usan para anclajes."}, {"id": 4, "bl": "T3", "la": "Tema 3", "tx": "El molibdeno (Mo) presente en el acero inoxidable AISI 316 (A4) tiene como función principal:", "op": ["Aumentar la dureza superficial del acero para resistir el desgaste mecánico", "Mejorar la resistencia a la corrosión por cloruros y a la corrosión por picadura", "Reducir el coste de fabricación sustituyendo parte del cromo necesario", "Aumentar el punto de fusión para facilitar el proceso de soldadura"], "co": "b", "fc": "Correcto. El Mo en el AISI 316 mejora específicamente la resistencia a los cloruros y a la corrosión por picadura, haciendo al A4 preferible al A2 en entornos marinos.", "fw": "Incorrecto. El molibdeno en el 316 mejora la resistencia a los cloruros y a la corrosión por picadura."}, {"id": 5, "bl": "T3", "la": "Tema 3", "tx": "La corrosión galvánica se produce cuando:", "op": ["La capa pasiva del acero se rompe localmente por cloruros generando picaduras", "Dos metales distintos están en contacto eléctrico en presencia de un electrolito (agua)", "Bacterias reductoras de sulfato atacan la zona entre el anclaje y la roca", "El exceso de par de apriete genera tensiones mecánicas en el acero inoxidable"], "co": "b", "fc": "Correcto. La corrosión galvánica ocurre cuando dos metales con distinto potencial electroquímico están en contacto eléctrico en presencia de un electrolito; el de menor potencial se corroe preferentemente.", "fw": "Incorrecto. La corrosión galvánica requiere dos metales distintos en contacto eléctrico con un electrolito presente."}, {"id": 6, "bl": "T3", "la": "Tema 3", "tx": "Según la actualización UIAA 123 V4 2020, ¿por qué ya NO es suficiente identificar el tipo de aleación (ej. '316L') para garantizar la resistencia a la corrosión bajo tensión (SCC)?", "op": ["Porque la nomenclatura AISI ha sido reemplazada por la nomenclatura EN", "Porque la resistencia al SCC depende del proceso de fabricación completo; algunos 316L fallan mientras otros aceros de menor resistencia teórica superan la prueba", "Porque el titanio es el único material que ha superado todas las pruebas UIAA", "Porque la norma UIAA 123 ahora exige ensayos en ambiente de sulfuros exclusivamente"], "co": "b", "fc": "Correcto. La investigación científica que sustenta la actualización UIAA 2020 demostró que el proceso de fabricación (doblado, soldadura, etc.) introduce tensiones que afectan decisivamente al SCC, independientemente de la aleación.", "fw": "Incorrecto. La UIAA 2020 establece que hay que probar el anclaje completo porque el proceso de fabricación determina la resistencia real al SCC."}, {"id": 7, "bl": "T3", "la": "Tema 3", "tx": "El tratamiento superficial 'decapado' aplicado a los aceros inoxidables tiene como objetivo:", "op": ["Eliminar contaminaciones con grasa y aceites del proceso de fabricación", "Eliminar manchas, impurezas y contaminantes de soldaduras mediante un baño ácido, obteniendo una superficie satinada y homogénea", "Formar la capa pasiva de Cr2O3 mediante contacto controlado con el oxígeno", "Aumentar el brillo superficial del acero mediante disolución anódica electroquímica"], "co": "b", "fc": "Correcto. El decapado es un tratamiento químico con baño ácido que elimina manchas de soldadura, impurezas y contaminantes, consiguiendo una superficie homogénea y libre de marcas.", "fw": "Incorrecto. El decapado usa baño ácido para eliminar manchas de soldadura y contaminantes; no elimina grasas (eso es el desengrasado)."}, {"id": 8, "bl": "T3", "la": "Tema 3", "tx": "La corrosión microbiológica (MIC) en anclajes de barrancos es producida por:", "op": ["La presencia de cloruros en el agua marina que rompen la capa pasiva", "Bacterias reductoras de sulfato (SRB) en condiciones de sulfatos, baja concentración de oxígeno y temperatura moderada", "La combinación de calor, humedad moderada y tensión mecánica en el anclaje", "La unión de metales distintos en la misma instalación (efecto galvánico)"], "co": "b", "fc": "Correcto. La MIC (Microbiologically Influenced Corrosion) la causan bacterias reductoras de sulfato (SRB) que se nutren del hierro. Requieren sulfatos, poco oxígeno y temperatura moderada.", "fw": "Incorrecto. La MIC es producida por bacterias reductoras de sulfato (SRB), no por cloruros ni por corrosión galvánica."}, {"id": 9, "bl": "T3", "la": "Tema 3", "tx": "La clase 'SCC' de la norma UIAA 123 V4 2020 es la única que:", "op": ["Garantiza que el anclaje es de titanio de grado 2", "Ha demostrado resistencia tanto a la corrosión general como a la corrosión bajo tensión (Stress Corrosion Cracking)", "Exige que el fabricante sea europeo y esté certificado por ENAC", "Permite el uso del anclaje en rocas con resistencia a compresión inferior a 400 kg/cm²"], "co": "b", "fc": "Correcto. La clase SCC es la única de las tres clases (SCC, GC, LC) que ha superado las pruebas tanto de corrosión general como de corrosión bajo tensión.", "fw": "Incorrecto. La clase SCC es la única que resiste tanto la corrosión general como el SCC."}, {"id": 10, "bl": "T3", "la": "Tema 3", "tx": "El 'tratamiento marino' (desengrasado + decapado + pasivado) es utilizado por fabricantes como Lappas Climbing, Vertical Evolution y Raumer para:", "op": ["Reducir el coste de producción de los aceros inoxidables A2", "Mejorar la resistencia a la corrosión de los anclajes especialmente en entornos marinos", "Cumplir el requisito obligatorio de la norma UNE-EN 959:2018", "Aumentar la dureza superficial y la resistencia mecánica del anclaje"], "co": "b", "fc": "Correcto. El tratamiento marino mejora la resistencia a la corrosión de los anclajes, siendo especialmente relevante para entornos con alta concentración de cloruros como los barrancos costeros.", "fw": "Incorrecto. El tratamiento marino mejora la resistencia a la corrosión, especialmente en entornos costeros."}];
const ans={},ver=new Set();
function build(){const c=document.getElementById('quiz');Q.forEach(q=>{const d=document.createElement('div');d.className='qcard';
d.innerHTML=`<div class="qmeta"><span class="qnum">Pregunta ${q.id}</span><span class="qbadge">${q.la}</span></div>`+
`<div class="qtxt">${q.tx}</div><div class="opts" id="o${q.id}">`+
q.op.map((t,i)=>`<button class="opt" data-v="${'abcd'[i]}" onclick="pick(${q.id},'${'abcd'[i]}')"><span class="olet">${'ABCD'[i]}</span>${t}</button>`).join('')+
`</div><div class="fb" id="f${q.id}"></div><button class="chk-btn" id="b${q.id}" onclick="check(${q.id})">▶ Comprobar</button>`;
document.getElementById('quiz').appendChild(d);});}
function pick(id,v){if(ver.has(id))return;document.querySelectorAll(`#o${id} .opt`).forEach(o=>o.classList.remove('sel'));document.querySelector(`#o${id} [data-v="${v}"]`).classList.add('sel');ans[id]=v;prog();}
function check(id){if(ver.has(id))return;if(!ans[id]){document.getElementById('warn').textContent='⚠ Selecciona una opción primero.';return;}document.getElementById('warn').textContent='';
ver.add(id);const q=Q.find(x=>x.id===id);const ok=ans[id]===q.co;
document.querySelectorAll(`#o${id} .opt`).forEach(o=>{o.classList.add('dis');if(o.dataset.v===q.co)o.classList.add('ok');else if(o.dataset.v===ans[id]&&!ok)o.classList.add('ng');});
const f=document.getElementById('f'+id);f.className='fb '+(ok?'ok':'ng');f.textContent=(ok?'✓ ':'✗ ')+(ok?q.fc:q.fw);
const b=document.getElementById('b'+id);b.disabled=true;b.textContent=ok?'✓ Correcto':'✗ Incorrecto';}
function prog(){const d=Object.keys(ans).length,p=Math.round(d/Q.length*100);
document.getElementById('pp').textContent=`${d}/${Q.length} respondidas`;document.getElementById('pf').style.width=p+'%';}
function submit(){const un=Q.filter(q=>!ans[q.id]);document.getElementById('warn').textContent=un.length?`⚠ ${un.length} pregunta(s) sin responder.`:'';
Q.forEach(q=>{if(!ver.has(q.id)&&ans[q.id])check(q.id);});
let tot=0;const bk={};Q.forEach(q=>{const ok=ans[q.id]===q.co;if(ok)tot++;bk[q.la]=bk[q.la]||[0,0];bk[q.la][1]++;if(ok)bk[q.la][0]++;});
const p=Math.round(tot/Q.length*100);document.getElementById('rscore').textContent=`${tot}/${Q.length}`;document.getElementById('rpct').textContent=`${p}% de respuestas correctas`;
const r=['❗ Necesitas repasar','📖 Suficiente','📚 Bien','👍 Notable','🏆 Sobresaliente'];
document.getElementById('rrat').textContent=r[p>=90?4:p>=75?3:p>=60?2:p>=50?1:0];
document.getElementById('rgrid').innerHTML=Object.entries(bk).map(([k,[c,t]])=>`<div class="res-cell"><div class="res-cell-n">${k}</div><div class="res-cell-v">${c}/${t}</div></div>`).join('');
document.getElementById('results').style.display='block';document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});}
function restart(){Object.keys(ans).forEach(k=>delete ans[k]);ver.clear();document.querySelectorAll('.opt').forEach(o=>o.className='opt');document.querySelectorAll('.fb').forEach(f=>{f.className='fb';f.textContent='';});document.querySelectorAll('.chk-btn').forEach(b=>{b.disabled=false;b.textContent='▶ Comprobar';});document.getElementById('warn').textContent='';document.getElementById('results').style.display='none';prog();window.scrollTo({top:0,behavior:'smooth'});}
build();prog();
</script>
</body>
</html>
