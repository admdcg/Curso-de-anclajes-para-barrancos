<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Evaluación Mixta II — Reequipamiento de Barrancos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.topbar{background:#374151;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.topbar h1{color:#fff;font-size:1.05rem;font-weight:700;line-height:1.2}
.topbar a{color:rgba(255,255,255,.8);font-size:.78rem;text-decoration:none;background:rgba(255,255,255,.15);padding:.35rem .8rem;border-radius:6px;white-space:nowrap}
.topbar a:hover{background:rgba(255,255,255,.25)}
.topbar-sub{color:rgba(255,255,255,.7);font-size:.75rem}
.prog-bar{background:rgba(255,255,255,.25);height:5px}
.prog-fill{height:100%;background:#fff;transition:width .4s;width:0%}
.wrap{max-width:780px;margin:0 auto;padding:1.5rem 1rem 5rem}
.stat-row{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:.65rem 1rem;font-size:.8rem;color:#64748b;flex:1;min-width:110px}
.stat strong{display:block;font-size:1.3rem;font-weight:700;color:#1e293b;line-height:1}
.qcard{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.4rem;margin-bottom:1rem;border-top:3px solid #374151}
.qmeta{display:flex;align-items:center;gap:.6rem;margin-bottom:.7rem;flex-wrap:wrap}
.qnum{font-size:.72rem;font-weight:600;color:#374151;background:#f9fafb;padding:.2rem .55rem;border-radius:4px}
.qbadge{font-size:.68rem;color:#64748b;background:#f1f5f9;padding:.2rem .55rem;border-radius:4px}
.qtxt{font-size:.95rem;line-height:1.65;color:#1e293b;margin-bottom:1rem}
.opts{display:flex;flex-direction:column;gap:.4rem}
.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.65rem .9rem;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:.87rem;line-height:1.5;text-align:left;color:#1e293b;width:100%;transition:all .12s}
.opt:hover:not(.dis){background:#f9fafb;border-color:#374151}
.opt.sel{background:#f9fafb;border-color:#374151;color:#1e293b}
.opt.ok{background:#dcfce7;border-color:#16a34a;color:#15803d;font-weight:500}
.opt.ng{background:#fee2e2;border-color:#dc2626;color:#374151}
.opt.dis{cursor:default}
.olet{font-weight:700;font-size:.75rem;opacity:.5;flex-shrink:0;padding-top:.05rem;min-width:1rem}
.fb{display:none;margin-top:.75rem;padding:.75rem 1rem;border-radius:8px;font-size:.82rem;line-height:1.6;border-left:3px solid}
.fb.ok{background:#f0fdf4;border-color:#16a34a;color:#15803d;display:block}
.fb.ng{background:#f9fafb;border-color:#dc2626;color:#374151;display:block}
.chk-btn{margin-top:.8rem;display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1.1rem;border:1.5px solid #374151;color:#374151;background:transparent;border-radius:7px;font-size:.73rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.chk-btn:hover:not(:disabled){background:#374151;color:#fff}
.chk-btn:disabled{opacity:.3;cursor:default}
.actions{text-align:center;padding:2rem 0;border-top:1px solid #e2e8f0;margin-top:.5rem}
.warn{font-size:.75rem;color:#d97706;margin-bottom:.75rem;min-height:1em;font-weight:500}
.submit-btn{padding:.8rem 2.2rem;background:#374151;color:#fff;border:none;border-radius:9px;font-size:.82rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:opacity .12s}
.submit-btn:hover{opacity:.88}
#results{display:none;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:2.5rem 2rem;text-align:center;margin-top:1.5rem}
.res-score{font-size:4.5rem;font-weight:800;color:#374151;line-height:1}
.res-pct{font-size:.9rem;color:#64748b;margin:.3rem 0 1.2rem}
.res-rat{display:inline-block;padding:.4rem 1.2rem;background:#f9fafb;color:#374151;border-radius:20px;font-weight:700;font-size:.95rem;margin-bottom:1.5rem}
.res-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.6rem;margin:1rem 0 1.5rem;text-align:left}
.res-cell{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:.65rem}
.res-cell-n{font-size:.58rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem}
.res-cell-v{font-size:1.5rem;font-weight:800;color:#1e293b}
.restart-btn{padding:.7rem 1.8rem;border:1.5px solid #374151;color:#374151;background:transparent;border-radius:8px;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.restart-btn:hover{background:#374151;color:#fff}
@media(max-width:580px){.wrap{padding:1rem .75rem 4rem}.qcard{padding:1.1rem}.res-score{font-size:3.5rem}}
</style>
</head>
<body>
<div class="topbar" style="background:#374151">
  <div>
    <div class="topbar-sub">Curso de Reequipamiento de Barrancos</div>
    <h1>Evaluación Mixta II</h1>
  </div>
  <a href="index.html">← Índice</a>
</div>
<div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
<div class="wrap">
  <div class="stat-row">
    <div class="stat"><strong id="pp">0/10</strong>Respondidas</div>
    <div class="stat"><strong>10</strong>Preguntas</div>
    <div class="stat"><strong style="font-size:.9rem;color:#64748b">Responsabilidad · Normativa · TD Barrancos</strong></div>
  </div>
  <div id="quiz"></div>
  <div class="actions">
    <div class="warn" id="warn"></div>
    <button class="submit-btn" onclick="submit()">Finalizar y ver resultados →</button>
  </div>
  <div id="results">
    <div class="res-score" id="rscore"></div>
    <div class="res-pct" id="rpct"></div>
    <div class="res-rat" id="rrat"></div>
    <div class="res-grid" id="rgrid"></div>
    <button class="restart-btn" onclick="restart()">↺ Repetir</button>
  </div>
</div>
<script>
const Q=[{"id": 1, "bl": "T1", "la": "Tema 1", "tx": "Un evento de descenso de barrancos organizado que discurre por el cauce de un barranco y afecta a un espacio natural protegido requiere:", "op": ["Solo comunicación previa al ayuntamiento del municipio afectado", "Previa autorización del Cabildo Insular, que impondrá las medidas correctoras necesarias", "Autorización del Ministerio de Medio Ambiente por tratarse de un ENP", "Ningún trámite si el evento no supera los 25 participantes"], "co": "b", "fc": "Correcto. La Ley 4/2017 (art. 80) establece que cuando un evento deportivo por el cauce de barrancos afecte a un ENP, requerirá previa autorización del Cabildo Insular, que impondrá las medidas de protección necesarias.", "fw": "Incorrecto. Respuesta correcta: B. La Ley 4/2017 exige autorización previa del Cabildo Insular para eventos en ENP, con independencia del número de participantes."}, {"id": 2, "bl": "T1", "la": "Tema 1", "tx": "Si un reequipador quiere instalar anclajes en terreno de propiedad privada para acceder a un barranco, ¿qué debe hacer antes de comenzar?", "op": ["Nada; los anclajes son instalaciones deportivas de uso público que no requieren permiso del propietario", "Solicitar cesión de uso al titular del terreno y suscribir un contrato de comodato o arrendamiento", "Obtener solo el visto bueno del club de barranquismo local", "Registrar la actividad en el Censo de Instalaciones Deportivas"], "co": "b", "fc": "Correcto. El Tema 1 indica que en propiedad privada el reequipador debe solicitar permiso al titular y suscribir un contrato de comodato (cesión gratuita) o arrendamiento (con contraprestación económica).", "fw": "Incorrecto. Respuesta correcta: B. En terreno privado hay que solicitar permiso al propietario y formalizar un comodato o arrendamiento."}, {"id": 3, "bl": "T2", "la": "Tema 2", "tx": "Las rocas metamórficas se forman a partir de:", "op": ["La acumulación y cementación de sedimentos transportados por agua o aire", "El enfriamiento rápido de la lava en la superficie terrestre", "La transformación de rocas preexistentes por efecto de altas presiones y temperaturas en el interior de la corteza", "La precipitación de minerales disueltos en soluciones acuosas"], "co": "c", "fc": "Correcto. Las rocas metamórficas se originan cuando rocas preexistentes (ígneas, sedimentarias u otras metamórficas) son sometidas a altas presiones y temperaturas en el interior de la corteza terrestre, transformando su mineralogía y textura.", "fw": "Incorrecto. Respuesta correcta: C. Las metamórficas se forman por presión y temperatura en el interior de la corteza; no por sedimentación ni por enfriamiento de lava."}, {"id": 4, "bl": "T2", "la": "Tema 2", "tx": "El proceso de litificación por el que los sedimentos se convierten en roca sedimentaria sólida implica principalmente:", "op": ["Fusión del material sedimentario a altas temperaturas seguida de enfriamiento", "Compactación (reducción de porosidad) y cementación (unión de partículas por minerales precipitados)", "Transformación química de los minerales por presión tectónica", "Cristalización directa del magma en el interior de la corteza"], "co": "b", "fc": "Correcto. La litificación transforma sedimentos en roca sólida mediante dos procesos: compactación (el peso de los sedimentos superpuestos reduce el espacio poroso) y cementación (minerales precipitados unen las partículas).", "fw": "Incorrecto. Respuesta correcta: B. La litificación se produce por compactación y cementación, no por fusión ni cristalización del magma."}, {"id": 5, "bl": "T3", "la": "Tema 3", "tx": "El tratamiento térmico de 'normalizado' aplicado a los aceros consiste en:", "op": ["Enfriar el acero muy rápidamente desde alta temperatura para obtener martensita y máxima dureza", "Calentar el acero por encima de la temperatura crítica y dejarlo enfriar al aire, afinar la estructura y eliminar tensiones internas", "Ablandar el material calentándolo lentamente y enfriándolo en el horno para facilitar su mecanizado", "Calentar a temperatura inferior al primer tratamiento para reducir la fragilidad de la martensita"], "co": "b", "fc": "Correcto. El normalizado consiste en calentar el acero entre 40-50°C por encima de la temperatura crítica y dejar enfriar al aire. Refina la estructura, elimina tensiones internas y es el tratamiento más utilizado en anclajes.", "fw": "Incorrecto. Respuesta correcta: B. El normalizado calienta el acero y lo enfría al aire para afinar la estructura. El temple enfría rápido; el recocido enfría lento en horno; el revenido reduce fragilidad del temple."}, {"id": 6, "bl": "T3", "la": "Tema 3", "tx": "Al conjunto de los tratamientos de 'temple + revenido' se le denomina:", "op": ["Normalizado", "Recocido", "Bonificado", "Cementado"], "co": "c", "fc": "Correcto. El temple más el revenido combinados se denominan bonificado. El temple aporta dureza y el revenido posterior reduce la fragilidad excesiva generada por el temple, obteniendo un material de alta resistencia y buena tenacidad.", "fw": "Incorrecto. Respuesta correcta: C — bonificado. Es la combinación de temple (dureza) + revenido (reduce fragilidad), dando como resultado un material resistente y tenaz."}, {"id": 7, "bl": "T4", "la": "Tema 4", "tx": "El cartucho de resina tipo 'side-by-side' tiene dos tubos paralelos con los componentes A y B. ¿Cómo se produce la mezcla?", "op": ["El instalador mezcla manualmente los dos componentes en un recipiente antes de inyectar", "Los dos componentes se mezclan automáticamente al pasar por la boquilla mezcladora al salir del cartucho", "La varilla del tensor rompe los tabiques internos al introducirse en el agujero", "El calor de la reacción exotérmica funde los tabiques separadores durante el fraguado"], "co": "b", "fc": "Correcto. En el cartucho side-by-side, los componentes A y B permanecen separados hasta que son forzados a través de la boquilla mezcladora, donde se combinan automáticamente antes de ser inyectados en el agujero.", "fw": "Incorrecto. Respuesta correcta: B. La mezcla se produce al pasar por la boquilla mezcladora, no manualmente ni por la varilla."}, {"id": 8, "bl": "T4", "la": "Tema 4", "tx": "La resistencia a la carga radial (cizalladura) que exige la UNE-EN 959:2018 para un anclaje de aseguramiento en roca es de:", "op": ["12 kN", "15 kN", "20 kN", "25 kN"], "co": "d", "fc": "Correcto. La UNE-EN 959:2018 exige 15 kN a extracción axial y 25 kN a carga radial (cizalladura). La UIAA 123 V4 es más exigente: 20 kN axial y 25 kN radial.", "fw": "Incorrecto. Respuesta correcta: D — 25 kN a cizalladura (carga radial). La resistencia axial exigida es 15 kN, pero la radial es 25 kN."}, {"id": 9, "bl": "T5", "la": "Tema 5", "tx": "El Pulse Petzl o anclaje de posicionamiento se incluye en la mochila de perforación principalmente para:", "op": ["Medir la resistencia de los nuevos anclajes instalados durante el resinado", "Instalar como anclaje temporal recuperable que permite trabajar con seguridad mientras se perfora", "Fijar la cuerda de rappel durante el descenso de verificación de los nuevos anclajes", "Reemplazar definitivamente un anclaje viejo mientras fragua la resina del nuevo"], "co": "b", "fc": "Correcto. El anclaje de posicionamiento (tipo Pulse Petzl) es recuperable y se usa para anclarse con seguridad mientras se trabaja en la perforación. Su función de bloqueo y fácil instalación lo hacen ideal para esta fase.", "fw": "Incorrecto. Respuesta correcta: B. El Pulse Petzl es un anclaje temporal recuperable para posicionarse con seguridad durante la perforación."}, {"id": 10, "bl": "T6", "la": "Tema 6", "tx": "En la configuración de cabecera en posición diagonal, ¿cuál es la ventaja principal respecto a la posición horizontal?", "op": ["La distribución de carga es perfectamente equitativa entre los dos anclajes", "La cuerda produce menor rozamiento y la carga principal recae sobre el anclaje superior, actuando el inferior de forma redundante y como desviador", "Permite usar cadenas en L sin riesgo de deterioro en barrancos acuáticos", "El anclaje inferior soporta toda la carga, reduciendo el desgaste del anclaje superior"], "co": "b", "fc": "Correcto. En posición diagonal la cuerda produce menor rozamiento. La carga principal recae sobre el anclaje superior (que debe estar en la vertical del rápel para la retención), y el inferior actúa de forma redundante y como desviador. Es la configuración recomendada para barrancos.", "fw": "Incorrecto. Respuesta correcta: B. La posición diagonal reduce el rozamiento; la carga principal va al anclaje superior y el inferior actúa como redundante y desviador."}];
const ans={},ver=new Set();
function build(){const c=document.getElementById('quiz');Q.forEach(q=>{const d=document.createElement('div');d.className='qcard';
d.innerHTML=`<div class="qmeta"><span class="qnum">Pregunta ${q.id}</span><span class="qbadge">${q.la}</span></div>`+
`<div class="qtxt">${q.tx}</div><div class="opts" id="o${q.id}">`+
q.op.map((t,i)=>`<button class="opt" data-v="${'abcd'[i]}" onclick="pick(${q.id},'${'abcd'[i]}')"><span class="olet">${'ABCD'[i]}</span>${t}</button>`).join('')+
`</div><div class="fb" id="f${q.id}"></div><button class="chk-btn" id="b${q.id}" onclick="check(${q.id})">▶ Comprobar</button>`;
document.getElementById('quiz').appendChild(d);});}
function pick(id,v){if(ver.has(id))return;document.querySelectorAll(`#o${id} .opt`).forEach(o=>o.classList.remove('sel'));document.querySelector(`#o${id} [data-v="${v}"]`).classList.add('sel');ans[id]=v;prog();}
function check(id){if(ver.has(id))return;if(!ans[id]){document.getElementById('warn').textContent='⚠ Selecciona una opción primero.';return;}document.getElementById('warn').textContent='';
ver.add(id);const q=Q.find(x=>x.id===id);const ok=ans[id]===q.co;
document.querySelectorAll(`#o${id} .opt`).forEach(o=>{o.classList.add('dis');if(o.dataset.v===q.co)o.classList.add('ok');else if(o.dataset.v===ans[id]&&!ok)o.classList.add('ng');});
const f=document.getElementById('f'+id);f.className='fb '+(ok?'ok':'ng');f.textContent=(ok?'✓ ':'✗ ')+(ok?q.fc:q.fw);
const b=document.getElementById('b'+id);b.disabled=true;b.textContent=ok?'✓ Correcto':'✗ Incorrecto';}
function prog(){const d=Object.keys(ans).length,p=Math.round(d/Q.length*100);
document.getElementById('pp').textContent=`${d}/${Q.length} respondidas`;document.getElementById('pf').style.width=p+'%';}
function submit(){const un=Q.filter(q=>!ans[q.id]);document.getElementById('warn').textContent=un.length?`⚠ ${un.length} pregunta(s) sin responder.`:'';
Q.forEach(q=>{if(!ver.has(q.id)&&ans[q.id])check(q.id);});
let tot=0;const bk={};Q.forEach(q=>{const ok=ans[q.id]===q.co;if(ok)tot++;bk[q.la]=bk[q.la]||[0,0];bk[q.la][1]++;if(ok)bk[q.la][0]++;});
const p=Math.round(tot/Q.length*100);document.getElementById('rscore').textContent=`${tot}/${Q.length}`;document.getElementById('rpct').textContent=`${p}% de respuestas correctas`;
const r=['❗ Necesitas repasar','📖 Suficiente','📚 Bien','👍 Notable','🏆 Sobresaliente'];
document.getElementById('rrat').textContent=r[p>=90?4:p>=75?3:p>=60?2:p>=50?1:0];
document.getElementById('rgrid').innerHTML=Object.entries(bk).map(([k,[c,t]])=>`<div class="res-cell"><div class="res-cell-n">${k}</div><div class="res-cell-v">${c}/${t}</div></div>`).join('');
document.getElementById('results').style.display='block';document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});}
function restart(){Object.keys(ans).forEach(k=>delete ans[k]);ver.clear();document.querySelectorAll('.opt').forEach(o=>o.className='opt');document.querySelectorAll('.fb').forEach(f=>{f.className='fb';f.textContent='';});document.querySelectorAll('.chk-btn').forEach(b=>{b.disabled=false;b.textContent='▶ Comprobar';});document.getElementById('warn').textContent='';document.getElementById('results').style.display='none';prog();window.scrollTo({top:0,behavior:'smooth'});}
build();prog();
</script>
</body>
</html>
