<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tema 5 — Instalación de Anclajes — Reequipamiento de Barrancos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.topbar{background:#15803d;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.topbar h1{color:#fff;font-size:1.05rem;font-weight:700;line-height:1.2}
.topbar a{color:rgba(255,255,255,.8);font-size:.78rem;text-decoration:none;background:rgba(255,255,255,.15);padding:.35rem .8rem;border-radius:6px;white-space:nowrap}
.topbar a:hover{background:rgba(255,255,255,.25)}
.topbar-sub{color:rgba(255,255,255,.7);font-size:.75rem}
.prog-bar{background:rgba(255,255,255,.25);height:5px}
.prog-fill{height:100%;background:#fff;transition:width .4s;width:0%}
.wrap{max-width:780px;margin:0 auto;padding:1.5rem 1rem 5rem}
.stat-row{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:.65rem 1rem;font-size:.8rem;color:#64748b;flex:1;min-width:110px}
.stat strong{display:block;font-size:1.3rem;font-weight:700;color:#1e293b;line-height:1}
.qcard{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.4rem;margin-bottom:1rem;border-top:3px solid #15803d}
.qmeta{display:flex;align-items:center;gap:.6rem;margin-bottom:.7rem;flex-wrap:wrap}
.qnum{font-size:.72rem;font-weight:600;color:#15803d;background:#f0fdf4;padding:.2rem .55rem;border-radius:4px}
.qbadge{font-size:.68rem;color:#64748b;background:#f1f5f9;padding:.2rem .55rem;border-radius:4px}
.qtxt{font-size:.95rem;line-height:1.65;color:#1e293b;margin-bottom:1rem}
.opts{display:flex;flex-direction:column;gap:.4rem}
.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.65rem .9rem;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:.87rem;line-height:1.5;text-align:left;color:#1e293b;width:100%;transition:all .12s}
.opt:hover:not(.dis){background:#f0fdf4;border-color:#15803d}
.opt.sel{background:#f0fdf4;border-color:#15803d;color:#1e293b}
.opt.ok{background:#dcfce7;border-color:#16a34a;color:#15803d;font-weight:500}
.opt.ng{background:#fee2e2;border-color:#dc2626;color:#b91c1c}
.opt.dis{cursor:default}
.olet{font-weight:700;font-size:.75rem;opacity:.5;flex-shrink:0;padding-top:.05rem;min-width:1rem}
.fb{display:none;margin-top:.75rem;padding:.75rem 1rem;border-radius:8px;font-size:.82rem;line-height:1.6;border-left:3px solid}
.fb.ok{background:#f0fdf4;border-color:#16a34a;color:#15803d;display:block}
.fb.ng{background:#fef2f2;border-color:#dc2626;color:#b91c1c;display:block}
.chk-btn{margin-top:.8rem;display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1.1rem;border:1.5px solid #15803d;color:#15803d;background:transparent;border-radius:7px;font-size:.73rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.chk-btn:hover:not(:disabled){background:#15803d;color:#fff}
.chk-btn:disabled{opacity:.3;cursor:default}
.actions{text-align:center;padding:2rem 0;border-top:1px solid #e2e8f0;margin-top:.5rem}
.warn{font-size:.75rem;color:#d97706;margin-bottom:.75rem;min-height:1em;font-weight:500}
.submit-btn{padding:.8rem 2.2rem;background:#15803d;color:#fff;border:none;border-radius:9px;font-size:.82rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:opacity .12s}
.submit-btn:hover{opacity:.88}
#results{display:none;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:2.5rem 2rem;text-align:center;margin-top:1.5rem}
.res-score{font-size:4.5rem;font-weight:800;color:#15803d;line-height:1}
.res-pct{font-size:.9rem;color:#64748b;margin:.3rem 0 1.2rem}
.res-rat{display:inline-block;padding:.4rem 1.2rem;background:#f0fdf4;color:#15803d;border-radius:20px;font-weight:700;font-size:.95rem;margin-bottom:1.5rem}
.res-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.6rem;margin:1rem 0 1.5rem;text-align:left}
.res-cell{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:.65rem}
.res-cell-n{font-size:.58rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem}
.res-cell-v{font-size:1.5rem;font-weight:800;color:#1e293b}
.restart-btn{padding:.7rem 1.8rem;border:1.5px solid #15803d;color:#15803d;background:transparent;border-radius:8px;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.restart-btn:hover{background:#15803d;color:#fff}
@media(max-width:580px){.wrap{padding:1rem .75rem 4rem}.qcard{padding:1.1rem}.res-score{font-size:3.5rem}}
</style>
</head>
<body>
<div class="topbar" style="background:#15803d">
  <div>
    <div class="topbar-sub">Curso de instalación de anclajes en barrancos</div>
    <h1>Tema 5 — Instalación de Anclajes</h1>
  </div>
  <a href="index.html?v=202603162154">← Índice</a>
</div>
<div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
<div class="wrap">
  <div class="stat-row">
    <div class="stat"><strong id="pp">0/10</strong>Respondidas</div>
    <div class="stat"><strong>10</strong>Preguntas</div>
    <div class="stat"><strong style="font-size:.9rem;color:#64748b">Herramientas · Instalación · Tensores</strong></div>
  </div>
  <div id="quiz"></div>
  <div class="actions">
    <div class="warn" id="warn"></div>
    <button class="submit-btn" onclick="submit()">Finalizar y ver resultados →</button>
  </div>
  <div id="results">
    <div class="res-score" id="rscore"></div>
    <div class="res-pct" id="rpct"></div>
    <div class="res-rat" id="rrat"></div>
    <div class="res-grid" id="rgrid"></div>
    <button class="restart-btn" onclick="restart()">↺ Repetir</button>
  <div style="margin-top:1.5rem">
    <a href="index.html" style="display:inline-flex;align-items:center;gap:.5rem;padding:.7rem 1.8rem;border:1.5px solid #64748b;color:#64748b;border-radius:10px;font-family:inherit;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;text-decoration:none;transition:all .12s" onmouseover="this.style.borderColor='#1e293b';this.style.color='#1e293b'" onmouseout="this.style.borderColor='#64748b';this.style.color='#64748b'">← Volver al índice</a>
  </div>
  </div>
</div>
<script>
const Q=[{"id": 1, "bl": "T5", "la": "Tema 5", "tx": "Los taladros a batería más utilizados en reequipamiento trabajan con un voltaje de:", "op": ["12V, por su ligereza extrema", "18V, equilibrio entre voltaje, intensidad y peso", "36V, para maximizar la fuerza de percusión", "48V, estándar actual de la industria de la construcción"], "co": "b", "fc": "Correcto. Los 18V son los más habituales en reequipamiento por ofrecer el mejor equilibrio entre voltaje, intensidad de batería y peso transportable.", "fw": "Incorrecto. Los taladros de 18V son los más comunes en reequipamiento por equilibrio entre potencia y peso."}, {"id": 2, "bl": "T5", "la": "Tema 5", "tx": "La escobilla para limpiar el agujero tras el taladro debe ser:", "op": ["Del mismo diámetro que el agujero, para deslizarse sin rozar las paredes", "Más delgada que el diámetro del agujero, para no atascarla", "Más gruesa que el diámetro del agujero, para que ejerza presión en las paredes y limpie bien", "De cerdas metálicas finas independientemente del diámetro del agujero"], "co": "c", "fc": "Correcto. El Tema 5 especifica que la escobilla debe ser más gruesa que el diámetro del agujero para que ejerza presión en las paredes y limpie correctamente los restos de polvo adheridos.", "fw": "Incorrecto. La escobilla debe ser MÁS GRUESA que el agujero para ejercer presión sobre las paredes y limpiar eficazmente."}, {"id": 3, "bl": "T5", "la": "Tema 5", "tx": "El taco autoperforante (Spit) Raumer TAP Art. 720 tiene las siguientes resistencias:", "op": ["15 kN a extracción y 25 kN a cizalladura", "25 kN a extracción y 15 kN a cizalladura", "31 kN a extracción y 25 kN a cizalladura", "20 kN a extracción y 20 kN a cizalladura"], "co": "c", "fc": "Correcto. El Anexo I del temario especifica para el TAP Art. 720: 31 kN a extracción y 25 kN a cizalladura.", "fw": "Incorrecto. El TAP Art. 720 tiene 31 kN a extracción y 25 kN a cizalladura según el Anexo I."}, {"id": 4, "bl": "T5", "la": "Tema 5", "tx": "El anclaje autorroscante requiere una broca de diámetro INFERIOR al del anclaje porque:", "op": ["El agujero debe quedar más holgado para poder rellenarlo de resina", "El propio anclaje crea su rosca interna al atornillarse en la roca, necesitando resistencia del material para anclarse", "El agujero reducido facilita la extracción del anclaje para reutilizarlo", "El fabricante lo exige para evitar que se dañe la rosca del anclaje durante la instalación"], "co": "b", "fc": "Correcto. El autorroscante tiene un diseño especial: al atornillarse, sus roscas cortan el material de la roca y crean una matriz interna. Por eso se perfora con broca más pequeña (ej. broca 8mm para anclaje 10mm).", "fw": "Incorrecto. La broca inferior permite que el autorroscante cree su propia rosca interna en la roca al atornillarse."}, {"id": 5, "bl": "T5", "la": "Tema 5", "tx": "Al instalar un anclaje de expansión por segmentos (parabolt), el agujero debe realizarse con:", "op": ["El mismo diámetro que el anclaje y exactamente su misma longitud", "El mismo diámetro que el anclaje y unos 2 cm más largo que la longitud del modelo elegido", "Un diámetro 2 mm mayor que el anclaje y la misma longitud", "Un diámetro 2 mm mayor y unos 5 cm más largo para garantizar el espacio de expansión"], "co": "b", "fc": "Correcto. Para parabolts: mismo diámetro que el anclaje y aproximadamente 2 cm más largo que la longitud del modelo para que el expansor tenga espacio de actuación.", "fw": "Incorrecto. El agujero para parabolt debe ser del mismo diámetro y unos 2 cm más largo que el anclaje."}, {"id": 6, "bl": "T5", "la": "Tema 5", "tx": "La llave dinamométrica se usa en la instalación de parabolts para:", "op": ["Medir la resistencia del anclaje instalado en una prueba de carga no destructiva", "No superar el par de apriete recomendado por el fabricante, evitando generar corrosión bajo tensión (SCC)", "Extraer los anclajes viejos sin dañar la roca circundante", "Comprobar el nivel de la plaqueta antes del apriete definitivo"], "co": "b", "fc": "Correcto. Trabajar dentro del par de apriete del fabricante evita someter al acero a tensiones excesivas que podrían generar corrosión bajo tensión (SCC).", "fw": "Incorrecto. La llave dinamométrica controla el par de apriete para evitar el SCC generado por el apriete excesivo."}, {"id": 7, "bl": "T5", "la": "Tema 5", "tx": "Los tensores de doble anilla se utilizan preferentemente para:", "op": ["Inicios de pasamanos, por su mayor resistencia lateral", "Puntos intermedios de pasamanos largos", "Las cabeceras de rápel, porque facilitan la recuperación de las cuerdas", "Los fraccionamientos en grandes verticales por su menor peso"], "co": "c", "fc": "Correcto. El Tema 5 indica que los tensores de doble anilla son para las cabeceras de rápel, ya que facilitan la recuperación de las cuerdas. Si son dos puntos independientes deben solidarizarse.", "fw": "Incorrecto. Los tensores de doble anilla son para cabeceras de rápel, donde facilitan la recuperación de la cuerda."}, {"id": 8, "bl": "T5", "la": "Tema 5", "tx": "La 'limpieza estándar' del agujero según el Tema 5 consiste en:", "op": ["1 soplado + 1 cepillado", "Soplado + cepillado + soplado + cepillado + soplado", "3 soplados + 3 cepillados", "1 soplado + 3 cepillados + 1 soplado final"], "co": "b", "fc": "Correcto. El Tema 5 define la limpieza estándar como 2 soplados + 2 cepillados. La recomendación óptima es 3-4 de cada operación.", "fw": "Incorrecto. La limpieza estándar es 2 soplados + 2 cepillados según el Tema 5."}, {"id": 9, "bl": "T5", "la": "Tema 5", "tx": "El extractor de anclajes mecánicos expansivos permite, a diferencia del método tradicional de corte:", "op": ["Comprobar la resistencia del anclaje sin extraerlo mediante prueba de arranque parcial", "Extraer el parabolt completo dejando el agujero libre para su posible reutilización", "Instalar anclajes químicos en agujeros previamente ocupados por mecánicos sin re-perforar", "Medir el par de apriete residual del anclaje tras años de servicio"], "co": "b", "fc": "Correcto. El extractor permite sacar el parabolt completo, dejando el agujero vacío para ser reutilizado. En el método tradicional se corta, se hunde el resto y se mimetiza sin poder reutilizar el agujero.", "fw": "Incorrecto. El extractor saca el parabolt completo, dejando el agujero libre para reutilizarlo."}, {"id": 10, "bl": "T5", "la": "Tema 5", "tx": "Si al comprobar los testigos de fraguado de un anclaje químico uno de ellos está blando, el Tema 5 indica que se debe:", "op": ["Esperar 24 horas adicionales y volver a comprobar el testigo", "Aceptar el anclaje si el otro testigo está duro, asumiendo que la instalación fue correcta", "Desconfiar del endurecimiento, desecharlo y reinstalar el anclaje", "Aplicar calor externo al anclaje para acelerar el curado incompleto"], "co": "c", "fc": "Correcto. El Tema 5 es claro: si cualquier testigo falla hay que dudar del endurecimiento de la resina; se desecha y se reinstala. No se acepta la instalación dudosa.", "fw": "Incorrecto. Cualquier anomalía en los testigos obliga a desechar y reinstalar el anclaje según el Tema 5."}];
const ans={},ver=new Set();
function build(){const c=document.getElementById('quiz');Q.forEach(q=>{const d=document.createElement('div');d.className='qcard';
d.innerHTML=`<div class="qmeta"><span class="qnum">Pregunta ${q.id}</span><span class="qbadge">${q.la}</span></div>`+
`<div class="qtxt">${q.tx}</div><div class="opts" id="o${q.id}">`+
q.op.map((t,i)=>`<button class="opt" data-v="${'abcd'[i]}" onclick="pick(${q.id},'${'abcd'[i]}')"><span class="olet">${'ABCD'[i]}</span>${t}</button>`).join('')+
`</div><div class="fb" id="f${q.id}"></div><button class="chk-btn" id="b${q.id}" onclick="check(${q.id})">▶ Comprobar</button>`;
document.getElementById('quiz').appendChild(d);});}
function pick(id,v){if(ver.has(id))return;document.querySelectorAll(`#o${id} .opt`).forEach(o=>o.classList.remove('sel'));document.querySelector(`#o${id} [data-v="${v}"]`).classList.add('sel');ans[id]=v;prog();}
function check(id){if(ver.has(id))return;if(!ans[id]){document.getElementById('warn').textContent='⚠ Selecciona una opción primero.';return;}document.getElementById('warn').textContent='';
ver.add(id);const q=Q.find(x=>x.id===id);const ok=ans[id]===q.co;
document.querySelectorAll(`#o${id} .opt`).forEach(o=>{o.classList.add('dis');if(o.dataset.v===q.co)o.classList.add('ok');else if(o.dataset.v===ans[id]&&!ok)o.classList.add('ng');});
const f=document.getElementById('f'+id);f.className='fb '+(ok?'ok':'ng');f.textContent=(ok?'✓ ':'✗ ')+(ok?q.fc:q.fw);
const b=document.getElementById('b'+id);b.disabled=true;b.textContent=ok?'✓ Correcto':'✗ Incorrecto';}
function prog(){const d=Object.keys(ans).length,p=Math.round(d/Q.length*100);
document.getElementById('pp').textContent=`${d}/${Q.length} respondidas`;document.getElementById('pf').style.width=p+'%';}
function submit(){const un=Q.filter(q=>!ans[q.id]);document.getElementById('warn').textContent=un.length?`⚠ ${un.length} pregunta(s) sin responder.`:'';
Q.forEach(q=>{if(!ver.has(q.id)&&ans[q.id])check(q.id);});
let tot=0;const bk={};Q.forEach(q=>{const ok=ans[q.id]===q.co;if(ok)tot++;bk[q.la]=bk[q.la]||[0,0];bk[q.la][1]++;if(ok)bk[q.la][0]++;});
const p=Math.round(tot/Q.length*100);document.getElementById('rscore').textContent=`${tot}/${Q.length}`;document.getElementById('rpct').textContent=`${p}% de respuestas correctas`;
const r=['❗ Necesitas repasar','📖 Suficiente','📚 Bien','👍 Notable','🏆 Sobresaliente'];
document.getElementById('rrat').textContent=r[p>=90?4:p>=75?3:p>=60?2:p>=50?1:0];
document.getElementById('rgrid').innerHTML=Object.entries(bk).map(([k,[c,t]])=>`<div class="res-cell"><div class="res-cell-n">${k}</div><div class="res-cell-v">${c}/${t}</div></div>`).join('');
document.getElementById('results').style.display='block';document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});}
function restart(){Object.keys(ans).forEach(k=>delete ans[k]);ver.clear();document.querySelectorAll('.opt').forEach(o=>o.className='opt');document.querySelectorAll('.fb').forEach(f=>{f.className='fb';f.textContent='';});document.querySelectorAll('.chk-btn').forEach(b=>{b.disabled=false;b.textContent='▶ Comprobar';});document.getElementById('warn').textContent='';document.getElementById('results').style.display='none';prog();window.scrollTo({top:0,behavior:'smooth'});}
build();prog();
</script>
</body>
</html>
