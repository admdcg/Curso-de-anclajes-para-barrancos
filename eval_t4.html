<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tema 4 — Normativa y Anclajes — Reequipamiento de Barrancos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.topbar{background:#b45309;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.topbar h1{color:#fff;font-size:1.05rem;font-weight:700;line-height:1.2}
.topbar a{color:rgba(255,255,255,.8);font-size:.78rem;text-decoration:none;background:rgba(255,255,255,.15);padding:.35rem .8rem;border-radius:6px;white-space:nowrap}
.topbar a:hover{background:rgba(255,255,255,.25)}
.topbar-sub{color:rgba(255,255,255,.7);font-size:.75rem}
.prog-bar{background:rgba(255,255,255,.25);height:5px}
.prog-fill{height:100%;background:#fff;transition:width .4s;width:0%}
.wrap{max-width:780px;margin:0 auto;padding:1.5rem 1rem 5rem}
.stat-row{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:.65rem 1rem;font-size:.8rem;color:#64748b;flex:1;min-width:110px}
.stat strong{display:block;font-size:1.3rem;font-weight:700;color:#1e293b;line-height:1}
.qcard{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.4rem;margin-bottom:1rem;border-top:3px solid #b45309}
.qmeta{display:flex;align-items:center;gap:.6rem;margin-bottom:.7rem;flex-wrap:wrap}
.qnum{font-size:.72rem;font-weight:600;color:#b45309;background:#fffbeb;padding:.2rem .55rem;border-radius:4px}
.qbadge{font-size:.68rem;color:#64748b;background:#f1f5f9;padding:.2rem .55rem;border-radius:4px}
.qtxt{font-size:.95rem;line-height:1.65;color:#1e293b;margin-bottom:1rem}
.opts{display:flex;flex-direction:column;gap:.4rem}
.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.65rem .9rem;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:.87rem;line-height:1.5;text-align:left;color:#1e293b;width:100%;transition:all .12s}
.opt:hover:not(.dis){background:#fffbeb;border-color:#b45309}
.opt.sel{background:#fffbeb;border-color:#b45309;color:#1e293b}
.opt.ok{background:#dcfce7;border-color:#16a34a;color:#15803d;font-weight:500}
.opt.ng{background:#fee2e2;border-color:#dc2626;color:#b91c1c}
.opt.dis{cursor:default}
.olet{font-weight:700;font-size:.75rem;opacity:.5;flex-shrink:0;padding-top:.05rem;min-width:1rem}
.fb{display:none;margin-top:.75rem;padding:.75rem 1rem;border-radius:8px;font-size:.82rem;line-height:1.6;border-left:3px solid}
.fb.ok{background:#f0fdf4;border-color:#16a34a;color:#15803d;display:block}
.fb.ng{background:#fef2f2;border-color:#dc2626;color:#b91c1c;display:block}
.chk-btn{margin-top:.8rem;display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1.1rem;border:1.5px solid #b45309;color:#b45309;background:transparent;border-radius:7px;font-size:.73rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.chk-btn:hover:not(:disabled){background:#b45309;color:#fff}
.chk-btn:disabled{opacity:.3;cursor:default}
.actions{text-align:center;padding:2rem 0;border-top:1px solid #e2e8f0;margin-top:.5rem}
.warn{font-size:.75rem;color:#d97706;margin-bottom:.75rem;min-height:1em;font-weight:500}
.submit-btn{padding:.8rem 2.2rem;background:#b45309;color:#fff;border:none;border-radius:9px;font-size:.82rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:opacity .12s}
.submit-btn:hover{opacity:.88}
#results{display:none;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:2.5rem 2rem;text-align:center;margin-top:1.5rem}
.res-score{font-size:4.5rem;font-weight:800;color:#b45309;line-height:1}
.res-pct{font-size:.9rem;color:#64748b;margin:.3rem 0 1.2rem}
.res-rat{display:inline-block;padding:.4rem 1.2rem;background:#fffbeb;color:#b45309;border-radius:20px;font-weight:700;font-size:.95rem;margin-bottom:1.5rem}
.res-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.6rem;margin:1rem 0 1.5rem;text-align:left}
.res-cell{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:.65rem}
.res-cell-n{font-size:.58rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem}
.res-cell-v{font-size:1.5rem;font-weight:800;color:#1e293b}
.restart-btn{padding:.7rem 1.8rem;border:1.5px solid #b45309;color:#b45309;background:transparent;border-radius:8px;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.restart-btn:hover{background:#b45309;color:#fff}
@media(max-width:580px){.wrap{padding:1rem .75rem 4rem}.qcard{padding:1.1rem}.res-score{font-size:3.5rem}}
</style>
</head>
<body>
<div class="topbar" style="background:#b45309">
  <div>
    <div class="topbar-sub">Curso de Reequipamiento de Barrancos</div>
    <h1>Tema 4 — Normativa y Anclajes</h1>
  </div>
  <a href="index.html">← Índice</a>
</div>
<div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
<div class="wrap">
  <div class="stat-row">
    <div class="stat"><strong id="pp">0/10</strong>Respondidas</div>
    <div class="stat"><strong>10</strong>Preguntas</div>
    <div class="stat"><strong style="font-size:.9rem;color:#64748b">UNE-EN 959 · UIAA 123 · ETA · Resinas</strong></div>
  </div>
  <div id="quiz"></div>
  <div class="actions">
    <div class="warn" id="warn"></div>
    <button class="submit-btn" onclick="submit()">Finalizar y ver resultados →</button>
  </div>
  <div id="results">
    <div class="res-score" id="rscore"></div>
    <div class="res-pct" id="rpct"></div>
    <div class="res-rat" id="rrat"></div>
    <div class="res-grid" id="rgrid"></div>
    <button class="restart-btn" onclick="restart()">↺ Repetir</button>
  </div>
</div>
<script>
const Q=[{"id": 1, "bl": "T4", "la": "Tema 4", "tx": "La norma UNE-EN 959:2018 exige para un anclaje de aseguramiento para roca una resistencia a la carga axial (extracción) de al menos:", "op": ["10 kN", "15 kN", "20 kN", "25 kN"], "co": "b", "fc": "Correcto. La UNE-EN 959:2018 exige 15 kN a extracción (axial) y 25 kN a cizalladura (radial). La UIAA 123 es más exigente: 20 kN axial y 25 kN radial.", "fw": "Incorrecto. La UNE-EN 959:2018 exige 15 kN a extracción y 25 kN a cizalladura."}, {"id": 2, "bl": "T4", "la": "Tema 4", "tx": "La EOTA (European Organisation for Technical Assessment) coordina la elaboración de:", "op": ["Las normas EN de obligado cumplimiento en todos los países UE", "Los Documentos de Evaluación Europeos (DEE) y la emisión de las ETA (Evaluaciones Técnicas Europeas)", "Las acreditaciones de laboratorios de ensayo en España", "Los registros de instalaciones deportivas a escala europea"], "co": "b", "fc": "Correcto. La EOTA coordina los DEE y la emisión de los ETA (antes DITE) a través de sus organismos miembros, permitiendo la comercialización de productos con marcado CE bajo este régimen.", "fw": "Incorrecto. La EOTA coordina los DEE y emite las ETA; no elabora normas EN ni acredita laboratorios."}, {"id": 3, "bl": "T4", "la": "Tema 4", "tx": "Un anclaje con ETA Opción 1 garantiza que ha sido ensayado para:", "op": ["Uso recreativo de bajo riesgo en interiores tipo rocódromo", "Riesgo real de pérdidas humanas, tanto en hormigón fisurado como no fisurado", "Obras civiles de construcción sin riesgo personal directo", "Uso exclusivo en roca natural con resistencia a compresión superior a 400 kg/cm²"], "co": "b", "fc": "Correcto. La ETA Opción 1 es la categoría más exigente: requiere ensayos en hormigón fisurado y no fisurado para aplicaciones con riesgo real de vidas humanas.", "fw": "Incorrecto. La ETA Opción 1 cubre aplicaciones con riesgo real de vidas humanas en hormigón fisurado y no fisurado."}, {"id": 4, "bl": "T4", "la": "Tema 4", "tx": "El Componente A de la formulación de una resina de anclaje químico contiene:", "op": ["Solo el endurecedor o catalizador que inicia la reacción", "La resina base junto con acelerantes del fraguado, áridos, inhibidores y pigmentos", "Exclusivamente el árido que forma el mortero de relleno", "Solo los pigmentos que determinan el color final de la mezcla"], "co": "b", "fc": "Correcto. El Componente A contiene la resina base y también acelerantes del fraguado, inhibidores, áridos que dan resistencia y pigmentos que ajustan el color final.", "fw": "Incorrecto. El Componente A contiene la resina base + acelerantes + áridos + inhibidores + pigmentos."}, {"id": 5, "bl": "T4", "la": "Tema 4", "tx": "Las resinas epoxi se recomiendan para barranquismo principalmente porque:", "op": ["Tienen tiempo de trabajabilidad corto, lo que agiliza el proceso de instalación", "Son las resinas más adherentes que existen, con nula retracción y excelentes capacidades mecánicas", "Son las más económicas del mercado y tienen tiempo de trabajabilidad largo", "Pueden aplicarse a muy bajas temperaturas mejor que cualquier otro tipo de resina"], "co": "b", "fc": "Correcto. Las resinas epoxi son las más adherentes, con nula retracción y excepcionales capacidades mecánicas, siendo la opción preferida para barranquismo.", "fw": "Incorrecto. Las epoxi son las más adherentes y con nula retracción; su tiempo de trabajabilidad es alto (no corto)."}, {"id": 6, "bl": "T4", "la": "Tema 4", "tx": "Las resinas viniléster son preferibles a las epoxi en zonas de alta montaña porque:", "op": ["Son menos viscosas y penetran mejor en rocas porosas", "Tienen tiempo de trabajabilidad corto y son perfectas para zonas frías; pueden fraguarse en ambientes húmedos o inundados", "Tienen mayor resistencia a la compresión que las epoxi", "Son más económicas y de mayor disponibilidad en zonas remotas"], "co": "b", "fc": "Correcto. Las viniléster tienen trabajabilidad corta (útil en frío donde la epoxi sería demasiado lenta), son perfectas para zonas frías y alta montaña, y pueden fraguarse en ambientes húmedos o inundados o inundados.", "fw": "Incorrecto. Las viniléster son perfectas para zonas frías y alta montaña por su comportamiento a bajas temperaturas y en condiciones húmedas."}, {"id": 7, "bl": "T4", "la": "Tema 4", "tx": "La norma UNE-EN 795:2012 regula los equipos de protección individual contra caídas. ¿Qué aspecto de los anclajes de barrancos cubre esta norma?", "op": ["Exclusivamente los arneses y conectores de barranquismo", "Los dispositivos de anclaje utilizados como EPI (equipo de protección individual) contra caídas", "Los cierres rápidos y mosquetones de barranquismo", "Solo los anclajes instalados en estructuras de hormigón armado"], "co": "b", "fc": "Correcto. La UNE-EN 795:2012 regula los dispositivos de anclaje utilizados como EPI contra caídas, siendo una de las tres normativas de referencia en el reequipamiento.", "fw": "Incorrecto. La UNE-EN 795:2012 regula los dispositivos de anclaje como EPI contra caídas."}, {"id": 8, "bl": "T4", "la": "Tema 4", "tx": "La 'ampolla' como forma de presentación de la resina de anclaje químico se caracteriza porque:", "op": ["Contiene solo la resina pre-mezclada lista para inyectar con pistola estándar", "Contiene resina y catalizador separados más un árido; se introduce en el agujero y la varilla se instala a máquina rompiendo el vidrio y mezclando; solo válida en materiales macizos", "Es el formato más recomendado para roca porosa tipo caliza", "Permite una carga inmediata tras la instalación sin esperar el fraguado"], "co": "b", "fc": "Correcto. La ampolla contiene resina + catalizador + árido en compartimentos separados; se introduce en el agujero y la varilla se instala a percusión+rotación con taladro, que rompe el vidrio y mezcla los componentes. Solo válida en materiales macizos.", "fw": "Incorrecto. La ampolla requiere taladro a percusión+rotación para romper el vidrio y mezclar; no es válida para roca porosa."}, {"id": 9, "bl": "T4", "la": "Tema 4", "tx": "¿Cuál es la resistencia a la carga axial (tracción) que exige la norma UIAA 123 V4 para los anclajes?", "op": ["12 kN", "15 kN", "20 kN", "25 kN"], "co": "c", "fc": "Correcto. La UIAA 123 V4 exige 20 kN a tracción axial y 25 kN a cizalladura, siendo más exigente que la UNE-EN 959:2018 en tracción axial (que exige 15 kN).", "fw": "Incorrecto. La UIAA 123 V4 exige 20 kN a tracción axial, valor superior a los 15 kN de la UNE-EN 959."}, {"id": 10, "bl": "T4", "la": "Tema 4", "tx": "Las resinas de poliéster NO se recomiendan para anclajes de barrancos principalmente porque:", "op": ["Son demasiado viscosas para inyectarse con pistola estándar", "En condiciones de humedad o materiales alcalinos pueden degradarse y perder hasta el 60% de resistencia", "Tienen un tiempo de trabajabilidad excesivamente largo para uso en campo", "Son incompatibles químicamente con los aceros inoxidables austeníticos"], "co": "b", "fc": "Correcto. Las resinas de poliéster pueden degradarse en presencia de humedad o materiales alcalinos, llegando a perder hasta el 60% de resistencia frente al valor de una instalación seca.", "fw": "Incorrecto. Las poliéster pueden degradarse en ambientes húmedos o alcalinos, perdiendo hasta el 60% de resistencia."}];
const ans={},ver=new Set();
function build(){const c=document.getElementById('quiz');Q.forEach(q=>{const d=document.createElement('div');d.className='qcard';
d.innerHTML=`<div class="qmeta"><span class="qnum">Pregunta ${q.id}</span><span class="qbadge">${q.la}</span></div>`+
`<div class="qtxt">${q.tx}</div><div class="opts" id="o${q.id}">`+
q.op.map((t,i)=>`<button class="opt" data-v="${'abcd'[i]}" onclick="pick(${q.id},'${'abcd'[i]}')"><span class="olet">${'ABCD'[i]}</span>${t}</button>`).join('')+
`</div><div class="fb" id="f${q.id}"></div><button class="chk-btn" id="b${q.id}" onclick="check(${q.id})">▶ Comprobar</button>`;
document.getElementById('quiz').appendChild(d);});}
function pick(id,v){if(ver.has(id))return;document.querySelectorAll(`#o${id} .opt`).forEach(o=>o.classList.remove('sel'));document.querySelector(`#o${id} [data-v="${v}"]`).classList.add('sel');ans[id]=v;prog();}
function check(id){if(ver.has(id))return;if(!ans[id]){document.getElementById('warn').textContent='⚠ Selecciona una opción primero.';return;}document.getElementById('warn').textContent='';
ver.add(id);const q=Q.find(x=>x.id===id);const ok=ans[id]===q.co;
document.querySelectorAll(`#o${id} .opt`).forEach(o=>{o.classList.add('dis');if(o.dataset.v===q.co)o.classList.add('ok');else if(o.dataset.v===ans[id]&&!ok)o.classList.add('ng');});
const f=document.getElementById('f'+id);f.className='fb '+(ok?'ok':'ng');f.textContent=(ok?'✓ ':'✗ ')+(ok?q.fc:q.fw);
const b=document.getElementById('b'+id);b.disabled=true;b.textContent=ok?'✓ Correcto':'✗ Incorrecto';}
function prog(){const d=Object.keys(ans).length,p=Math.round(d/Q.length*100);
document.getElementById('pp').textContent=`${d}/${Q.length} respondidas`;document.getElementById('pf').style.width=p+'%';}
function submit(){const un=Q.filter(q=>!ans[q.id]);document.getElementById('warn').textContent=un.length?`⚠ ${un.length} pregunta(s) sin responder.`:'';
Q.forEach(q=>{if(!ver.has(q.id)&&ans[q.id])check(q.id);});
let tot=0;const bk={};Q.forEach(q=>{const ok=ans[q.id]===q.co;if(ok)tot++;bk[q.la]=bk[q.la]||[0,0];bk[q.la][1]++;if(ok)bk[q.la][0]++;});
const p=Math.round(tot/Q.length*100);document.getElementById('rscore').textContent=`${tot}/${Q.length}`;document.getElementById('rpct').textContent=`${p}% de respuestas correctas`;
const r=['❗ Necesitas repasar','📖 Suficiente','📚 Bien','👍 Notable','🏆 Sobresaliente'];
document.getElementById('rrat').textContent=r[p>=90?4:p>=75?3:p>=60?2:p>=50?1:0];
document.getElementById('rgrid').innerHTML=Object.entries(bk).map(([k,[c,t]])=>`<div class="res-cell"><div class="res-cell-n">${k}</div><div class="res-cell-v">${c}/${t}</div></div>`).join('');
document.getElementById('results').style.display='block';document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});}
function restart(){Object.keys(ans).forEach(k=>delete ans[k]);ver.clear();document.querySelectorAll('.opt').forEach(o=>o.className='opt');document.querySelectorAll('.fb').forEach(f=>{f.className='fb';f.textContent='';});document.querySelectorAll('.chk-btn').forEach(b=>{b.disabled=false;b.textContent='▶ Comprobar';});document.getElementById('warn').textContent='';document.getElementById('results').style.display='none';prog();window.scrollTo({top:0,behavior:'smooth'});}
build();prog();
</script>
</body>
</html>
