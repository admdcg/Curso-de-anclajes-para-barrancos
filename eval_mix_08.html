<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Evaluación Mixta VIII — Reequipamiento de Barrancos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.topbar{background:#374151;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.topbar h1{color:#fff;font-size:1.05rem;font-weight:700;line-height:1.2}
.topbar a{color:rgba(255,255,255,.8);font-size:.78rem;text-decoration:none;background:rgba(255,255,255,.15);padding:.35rem .8rem;border-radius:6px;white-space:nowrap}
.topbar a:hover{background:rgba(255,255,255,.25)}
.topbar-sub{color:rgba(255,255,255,.7);font-size:.75rem}
.prog-bar{background:rgba(255,255,255,.25);height:5px}
.prog-fill{height:100%;background:#fff;transition:width .4s;width:0%}
.wrap{max-width:780px;margin:0 auto;padding:1.5rem 1rem 5rem}
.stat-row{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:.65rem 1rem;font-size:.8rem;color:#64748b;flex:1;min-width:110px}
.stat strong{display:block;font-size:1.3rem;font-weight:700;color:#1e293b;line-height:1}
.qcard{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.4rem;margin-bottom:1rem;border-top:3px solid #374151}
.qmeta{display:flex;align-items:center;gap:.6rem;margin-bottom:.7rem;flex-wrap:wrap}
.qnum{font-size:.72rem;font-weight:600;color:#374151;background:#f9fafb;padding:.2rem .55rem;border-radius:4px}
.qbadge{font-size:.68rem;color:#64748b;background:#f1f5f9;padding:.2rem .55rem;border-radius:4px}
.qtxt{font-size:.95rem;line-height:1.65;color:#1e293b;margin-bottom:1rem}
.opts{display:flex;flex-direction:column;gap:.4rem}
.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.65rem .9rem;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:.87rem;line-height:1.5;text-align:left;color:#1e293b;width:100%;transition:all .12s}
.opt:hover:not(.dis){background:#f9fafb;border-color:#374151}
.opt.sel{background:#f9fafb;border-color:#374151;color:#1e293b}
.opt.ok{background:#dcfce7;border-color:#16a34a;color:#15803d;font-weight:500}
.opt.ng{background:#fee2e2;border-color:#dc2626;color:#374151}
.opt.dis{cursor:default}
.olet{font-weight:700;font-size:.75rem;opacity:.5;flex-shrink:0;padding-top:.05rem;min-width:1rem}
.fb{display:none;margin-top:.75rem;padding:.75rem 1rem;border-radius:8px;font-size:.82rem;line-height:1.6;border-left:3px solid}
.fb.ok{background:#f0fdf4;border-color:#16a34a;color:#15803d;display:block}
.fb.ng{background:#f9fafb;border-color:#dc2626;color:#374151;display:block}
.chk-btn{margin-top:.8rem;display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1.1rem;border:1.5px solid #374151;color:#374151;background:transparent;border-radius:7px;font-size:.73rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.chk-btn:hover:not(:disabled){background:#374151;color:#fff}
.chk-btn:disabled{opacity:.3;cursor:default}
.actions{text-align:center;padding:2rem 0;border-top:1px solid #e2e8f0;margin-top:.5rem}
.warn{font-size:.75rem;color:#d97706;margin-bottom:.75rem;min-height:1em;font-weight:500}
.submit-btn{padding:.8rem 2.2rem;background:#374151;color:#fff;border:none;border-radius:9px;font-size:.82rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:opacity .12s}
.submit-btn:hover{opacity:.88}
#results{display:none;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:2.5rem 2rem;text-align:center;margin-top:1.5rem}
.res-score{font-size:4.5rem;font-weight:800;color:#374151;line-height:1}
.res-pct{font-size:.9rem;color:#64748b;margin:.3rem 0 1.2rem}
.res-rat{display:inline-block;padding:.4rem 1.2rem;background:#f9fafb;color:#374151;border-radius:20px;font-weight:700;font-size:.95rem;margin-bottom:1.5rem}
.res-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.6rem;margin:1rem 0 1.5rem;text-align:left}
.res-cell{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:.65rem}
.res-cell-n{font-size:.58rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem}
.res-cell-v{font-size:1.5rem;font-weight:800;color:#1e293b}
.restart-btn{padding:.7rem 1.8rem;border:1.5px solid #374151;color:#374151;background:transparent;border-radius:8px;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.restart-btn:hover{background:#374151;color:#fff}
@media(max-width:580px){.wrap{padding:1rem .75rem 4rem}.qcard{padding:1.1rem}.res-score{font-size:3.5rem}}
</style>
</head>
<body>
<div class="topbar" style="background:#374151">
  <div>
    <div class="topbar-sub">Curso de Reequipamiento de Barrancos</div>
    <h1>Evaluación Mixta VIII</h1>
  </div>
  <a href="index.html">← Índice</a>
</div>
<div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
<div class="wrap">
  <div class="stat-row">
    <div class="stat"><strong id="pp">0/10</strong>Respondidas</div>
    <div class="stat"><strong>10</strong>Preguntas</div>
    <div class="stat"><strong style="font-size:.9rem;color:#64748b">Responsabilidad · Normativa · TD Barrancos</strong></div>
  </div>
  <div id="quiz"></div>
  <div class="actions">
    <div class="warn" id="warn"></div>
    <button class="submit-btn" onclick="submit()">Finalizar y ver resultados →</button>
  </div>
  <div id="results">
    <div class="res-score" id="rscore"></div>
    <div class="res-pct" id="rpct"></div>
    <div class="res-rat" id="rrat"></div>
    <div class="res-grid" id="rgrid"></div>
    <button class="restart-btn" onclick="restart()">↺ Repetir</button>
  </div>
</div>
<script>
const Q=[{"id": 1, "bl": "T1", "la": "Tema 1", "tx": "El Censo de Instalaciones Deportivas es principalmente:", "op": ["Un documento que otorga el carácter de instalación deportiva al barranco", "Un registro administrativo con fines estadísticos, cuya inclusión no determina el carácter de instalación deportiva", "Una homologación técnica de seguridad emitida por la FEDME", "Un requisito previo indispensable para iniciar cualquier reequipamiento"], "co": "b", "fc": "Correcto. El Censo es un registro estadístico. Son las propias zonas de barrancos, por ser susceptibles de censarse, las que tienen carácter de instalación deportiva, con independencia de su registro.", "fw": "Incorrecto. El Censo tiene fines estadísticos y no es lo que otorga el carácter de instalación deportiva."}, {"id": 2, "bl": "T1", "la": "Tema 1", "tx": "Las normas UNE elaboradas por la Asociación Española de Normalización tienen carácter:", "op": ["Obligatorio en todo el territorio nacional desde su publicación", "Voluntario, salvo que una disposición legal las declare de obligado cumplimiento", "Obligatorio solo para fabricantes nacionales, no para importadores", "Orientativo exclusivamente para las Administraciones Públicas"], "co": "b", "fc": "Correcto. Las normas UNE son de aplicación voluntaria salvo que una ley o reglamento las haga obligatorias expresamente.", "fw": "Incorrecto. Las normas UNE son voluntarias salvo remisión legal expresa que las haga obligatorias."}, {"id": 3, "bl": "T2", "la": "Tema 2", "tx": "La meteorización física de la roca se diferencia de la química en que:", "op": ["Altera la composición química de los minerales de la roca", "Solo fragmenta mecánicamente la roca sin cambiar su composición química", "Solo actúa en zonas costeras con alta concentración de sales", "Se produce exclusivamente por la acción de organismos vivos"], "co": "b", "fc": "Correcto. La meteorización física solo disgrega mecánicamente la roca (por ciclos hielo-deshielo, variaciones térmicas, etc.) sin alterar la composición química de sus minerales.", "fw": "Incorrecto. La meteorización física fragmenta la roca mecánicamente sin alterar su composición química; la química sí altera los minerales."}, {"id": 4, "bl": "T2", "la": "Tema 2", "tx": "¿Cuál de los siguientes tipos de roca es magmática intrusiva, de grano grueso y especialmente resistente, siendo idónea para anclajes?", "op": ["Caliza", "Arenisca", "Granito", "Yeso"], "co": "c", "fc": "Correcto. El granito es una roca ígnea intrusiva de grano grueso, muy dura y resistente, y una de las más adecuadas para la instalación de anclajes.", "fw": "Incorrecto. El granito es la roca magmática intrusiva de grano grueso más adecuada para anclajes por su dureza y resistencia."}, {"id": 5, "bl": "T3", "la": "Tema 3", "tx": "La corrosión galvánica se produce cuando:", "op": ["La capa pasiva del acero se rompe localmente por cloruros generando picaduras", "Dos metales distintos están en contacto eléctrico en presencia de un electrolito (agua)", "Bacterias reductoras de sulfato atacan la zona entre el anclaje y la roca", "El exceso de par de apriete genera tensiones mecánicas en el acero inoxidable"], "co": "b", "fc": "Correcto. La corrosión galvánica ocurre cuando dos metales con distinto potencial electroquímico están en contacto eléctrico en presencia de un electrolito; el de menor potencial se corroe preferentemente.", "fw": "Incorrecto. La corrosión galvánica requiere dos metales distintos en contacto eléctrico con un electrolito presente."}, {"id": 6, "bl": "T4", "la": "Tema 4", "tx": "Las resinas viniléster son preferibles a las epoxi en zonas de alta montaña porque:", "op": ["Son menos viscosas y penetran mejor en rocas porosas", "Tienen tiempo de trabajabilidad corto y son perfectas para zonas frías; pueden fraguarse en ambientes húmedos o inundados", "Tienen mayor resistencia a la compresión que las epoxi", "Son más económicas y de mayor disponibilidad en zonas remotas"], "co": "b", "fc": "Correcto. Las viniléster tienen trabajabilidad corta (útil en frío donde la epoxi sería demasiado lenta), son perfectas para zonas frías y alta montaña, y pueden fraguarse en ambientes húmedos o inundados o inundados.", "fw": "Incorrecto. Las viniléster son perfectas para zonas frías y alta montaña por su comportamiento a bajas temperaturas y en condiciones húmedas."}, {"id": 7, "bl": "T5", "la": "Tema 5", "tx": "Los tensores de doble anilla se utilizan preferentemente para:", "op": ["Inicios de pasamanos, por su mayor resistencia lateral", "Puntos intermedios de pasamanos largos", "Las cabeceras de rápel, porque facilitan la recuperación de las cuerdas", "Los fraccionamientos en grandes verticales por su menor peso"], "co": "c", "fc": "Correcto. El Tema 5 indica que los tensores de doble anilla son para las cabeceras de rápel, ya que facilitan la recuperación de las cuerdas. Si son dos puntos independientes deben solidarizarse.", "fw": "Incorrecto. Los tensores de doble anilla son para cabeceras de rápel, donde facilitan la recuperación de la cuerda."}, {"id": 8, "bl": "T5", "la": "Tema 5", "tx": "La 'limpieza estándar' del agujero según el Tema 5 consiste en:", "op": ["1 soplado + 1 cepillado", "2 soplados + 2 cepillados", "3 soplados + 3 cepillados", "1 soplado + 3 cepillados + 1 soplado final"], "co": "b", "fc": "Correcto. El Tema 5 define la limpieza estándar como 2 soplados + 2 cepillados. La recomendación óptima es 3-4 de cada operación.", "fw": "Incorrecto. La limpieza estándar es 2 soplados + 2 cepillados según el Tema 5."}, {"id": 9, "bl": "T6", "la": "Tema 6", "tx": "En un grupo pequeño de reequipamiento, ¿cuál es la organización por jornadas recomendada para minimizar el material transportado?", "op": ["Jornada 1: perforación + resinado simultáneo; jornada 2: retirada de anclajes viejos y mimetizado", "Jornada 1: toda la perforación; jornada 2: todo el resinado; jornada 3: retirada de anclajes viejos", "Jornada única con todos los roles actuando simultáneamente en diferentes rápeles", "Jornada 1: retirada de anclajes viejos; jornada 2: perforación; jornada 3: resinado"], "co": "b", "fc": "Correcto. El Tema 6 recomienda para grupos pequeños: jornada 1 toda la perforación, jornada 2 todo el resinado, jornada 3 retirada y mimetizado. Así se minimiza el material transportado cada día.", "fw": "Incorrecto. Para grupos pequeños: jornada 1 perforación / jornada 2 resinado / jornada 3 retirada de viejos."}, {"id": 10, "bl": "T6", "la": "Tema 6", "tx": "La ficha técnica del barranco debe incluir, entre otros datos:", "op": ["El presupuesto total del reequipamiento y el nombre de los patrocinadores", "Nombre, localidad, municipio, graduación, coordenadas inicio/fin, estado de anclajes y track GPS", "El número de serie de cada anclaje instalado y su fecha de fabricación", "La lista de participantes del equipo y sus titulaciones vigentes"], "co": "b", "fc": "Correcto. El Anexo I del Tema 6 muestra la ficha del barranco que incluye nombre, localidad, municipio, graduación, descripción, coordenadas, estado de anclajes, tracks GPS y croquis.", "fw": "Incorrecto. La ficha del barranco incluye nombre, coordenadas, graduación, estado de anclajes y track GPS entre otros datos técnicos."}];
const ans={},ver=new Set();
function build(){const c=document.getElementById('quiz');Q.forEach(q=>{const d=document.createElement('div');d.className='qcard';
d.innerHTML=`<div class="qmeta"><span class="qnum">Pregunta ${q.id}</span><span class="qbadge">${q.la}</span></div>`+
`<div class="qtxt">${q.tx}</div><div class="opts" id="o${q.id}">`+
q.op.map((t,i)=>`<button class="opt" data-v="${'abcd'[i]}" onclick="pick(${q.id},'${'abcd'[i]}')"><span class="olet">${'ABCD'[i]}</span>${t}</button>`).join('')+
`</div><div class="fb" id="f${q.id}"></div><button class="chk-btn" id="b${q.id}" onclick="check(${q.id})">▶ Comprobar</button>`;
document.getElementById('quiz').appendChild(d);});}
function pick(id,v){if(ver.has(id))return;document.querySelectorAll(`#o${id} .opt`).forEach(o=>o.classList.remove('sel'));document.querySelector(`#o${id} [data-v="${v}"]`).classList.add('sel');ans[id]=v;prog();}
function check(id){if(ver.has(id))return;if(!ans[id]){document.getElementById('warn').textContent='⚠ Selecciona una opción primero.';return;}document.getElementById('warn').textContent='';
ver.add(id);const q=Q.find(x=>x.id===id);const ok=ans[id]===q.co;
document.querySelectorAll(`#o${id} .opt`).forEach(o=>{o.classList.add('dis');if(o.dataset.v===q.co)o.classList.add('ok');else if(o.dataset.v===ans[id]&&!ok)o.classList.add('ng');});
const f=document.getElementById('f'+id);f.className='fb '+(ok?'ok':'ng');f.textContent=(ok?'✓ ':'✗ ')+(ok?q.fc:q.fw);
const b=document.getElementById('b'+id);b.disabled=true;b.textContent=ok?'✓ Correcto':'✗ Incorrecto';}
function prog(){const d=Object.keys(ans).length,p=Math.round(d/Q.length*100);
document.getElementById('pp').textContent=`${d}/${Q.length} respondidas`;document.getElementById('pf').style.width=p+'%';}
function submit(){const un=Q.filter(q=>!ans[q.id]);document.getElementById('warn').textContent=un.length?`⚠ ${un.length} pregunta(s) sin responder.`:'';
Q.forEach(q=>{if(!ver.has(q.id)&&ans[q.id])check(q.id);});
let tot=0;const bk={};Q.forEach(q=>{const ok=ans[q.id]===q.co;if(ok)tot++;bk[q.la]=bk[q.la]||[0,0];bk[q.la][1]++;if(ok)bk[q.la][0]++;});
const p=Math.round(tot/Q.length*100);document.getElementById('rscore').textContent=`${tot}/${Q.length}`;document.getElementById('rpct').textContent=`${p}% de respuestas correctas`;
const r=['❗ Necesitas repasar','📖 Suficiente','📚 Bien','👍 Notable','🏆 Sobresaliente'];
document.getElementById('rrat').textContent=r[p>=90?4:p>=75?3:p>=60?2:p>=50?1:0];
document.getElementById('rgrid').innerHTML=Object.entries(bk).map(([k,[c,t]])=>`<div class="res-cell"><div class="res-cell-n">${k}</div><div class="res-cell-v">${c}/${t}</div></div>`).join('');
document.getElementById('results').style.display='block';document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});}
function restart(){Object.keys(ans).forEach(k=>delete ans[k]);ver.clear();document.querySelectorAll('.opt').forEach(o=>o.className='opt');document.querySelectorAll('.fb').forEach(f=>{f.className='fb';f.textContent='';});document.querySelectorAll('.chk-btn').forEach(b=>{b.disabled=false;b.textContent='▶ Comprobar';});document.getElementById('warn').textContent='';document.getElementById('results').style.display='none';prog();window.scrollTo({top:0,behavior:'smooth'});}
build();prog();
</script>
</body>
</html>
