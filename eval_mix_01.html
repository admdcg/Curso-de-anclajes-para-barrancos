<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Evaluación Mixta I — Instalación de anclajes en barrancos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.topbar{background:#374151;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.topbar h1{color:#fff;font-size:1.05rem;font-weight:700;line-height:1.2}
.topbar a{color:rgba(255,255,255,.8);font-size:.78rem;text-decoration:none;background:rgba(255,255,255,.15);padding:.35rem .8rem;border-radius:6px;white-space:nowrap}
.topbar a:hover{background:rgba(255,255,255,.25)}
.topbar-sub{color:rgba(255,255,255,.7);font-size:.75rem}
.prog-bar{background:rgba(255,255,255,.25);height:5px}
.prog-fill{height:100%;background:#fff;transition:width .4s;width:0%}
.wrap{max-width:780px;margin:0 auto;padding:1.5rem 1rem 5rem}
.stat-row{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:.65rem 1rem;font-size:.8rem;color:#64748b;flex:1;min-width:110px}
.stat strong{display:block;font-size:1.3rem;font-weight:700;color:#1e293b;line-height:1}
.qcard{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.4rem;margin-bottom:1rem;border-top:3px solid #374151}
.qmeta{display:flex;align-items:center;gap:.6rem;margin-bottom:.7rem;flex-wrap:wrap}
.qnum{font-size:.72rem;font-weight:600;color:#374151;background:#f9fafb;padding:.2rem .55rem;border-radius:4px}
.qbadge{font-size:.68rem;color:#64748b;background:#f1f5f9;padding:.2rem .55rem;border-radius:4px}
.qtxt{font-size:.95rem;line-height:1.65;color:#1e293b;margin-bottom:1rem}
.opts{display:flex;flex-direction:column;gap:.4rem}
.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.65rem .9rem;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:.87rem;line-height:1.5;text-align:left;color:#1e293b;width:100%;transition:all .12s}
.opt:hover:not(.dis){background:#f9fafb;border-color:#374151}
.opt.sel{background:#f9fafb;border-color:#374151;color:#1e293b}
.opt.ok{background:#dcfce7;border-color:#16a34a;color:#15803d;font-weight:500}
.opt.ng{background:#fee2e2;border-color:#dc2626;color:#374151}
.opt.dis{cursor:default}
.olet{font-weight:700;font-size:.75rem;opacity:.5;flex-shrink:0;padding-top:.05rem;min-width:1rem}
.fb{display:none;margin-top:.75rem;padding:.75rem 1rem;border-radius:8px;font-size:.82rem;line-height:1.6;border-left:3px solid}
.fb.ok{background:#f0fdf4;border-color:#16a34a;color:#15803d;display:block}
.fb.ng{background:#f9fafb;border-color:#dc2626;color:#374151;display:block}
.chk-btn{margin-top:.8rem;display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1.1rem;border:1.5px solid #374151;color:#374151;background:transparent;border-radius:7px;font-size:.73rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.chk-btn:hover:not(:disabled){background:#374151;color:#fff}
.chk-btn:disabled{opacity:.3;cursor:default}
.actions{text-align:center;padding:2rem 0;border-top:1px solid #e2e8f0;margin-top:.5rem}
.warn{font-size:.75rem;color:#d97706;margin-bottom:.75rem;min-height:1em;font-weight:500}
.submit-btn{padding:.8rem 2.2rem;background:#374151;color:#fff;border:none;border-radius:9px;font-size:.82rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:opacity .12s}
.submit-btn:hover{opacity:.88}
#results{display:none;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:2.5rem 2rem;text-align:center;margin-top:1.5rem}
.res-score{font-size:4.5rem;font-weight:800;color:#374151;line-height:1}
.res-pct{font-size:.9rem;color:#64748b;margin:.3rem 0 1.2rem}
.res-rat{display:inline-block;padding:.4rem 1.2rem;background:#f9fafb;color:#374151;border-radius:20px;font-weight:700;font-size:.95rem;margin-bottom:1.5rem}
.res-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.6rem;margin:1rem 0 1.5rem;text-align:left}
.res-cell{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:.65rem}
.res-cell-n{font-size:.58rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem}
.res-cell-v{font-size:1.5rem;font-weight:800;color:#1e293b}
.restart-btn{padding:.7rem 1.8rem;border:1.5px solid #374151;color:#374151;background:transparent;border-radius:8px;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.restart-btn:hover{background:#374151;color:#fff}
@media(max-width:580px){.wrap{padding:1rem .75rem 4rem}.qcard{padding:1.1rem}.res-score{font-size:3.5rem}}
</style>
</head>
<body>
<div class="topbar" style="background:#374151">
  <div>
    <div class="topbar-sub">Curso de instalación de anclajes en barrancos</div>
    <h1>Evaluación Mixta I</h1>
  </div>
  <a href="index.html?v=202603180856">← Índice</a>
</div>
<div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
<div class="wrap">
  <div class="stat-row">
    <div class="stat"><strong id="pp">0/10</strong>Respondidas</div>
    <div class="stat"><strong>10</strong>Preguntas</div>
    <div class="stat"><strong style="font-size:.9rem;color:#64748b">Todos los temas · 10 preguntas</strong></div>
  </div>
  <div id="quiz"></div>
  <div class="actions">
    <div class="warn" id="warn"></div>
    <button class="submit-btn" onclick="submit()">Finalizar y ver resultados →</button>
  </div>
  <div id="results">
    <div class="res-score" id="rscore"></div>
    <div class="res-pct" id="rpct"></div>
    <div class="res-rat" id="rrat"></div>
    <div class="res-grid" id="rgrid"></div>
    <button class="restart-btn" onclick="restart()">↺ Repetir</button>
  <div style="margin-top:1.5rem">
    <a href="index.html" style="display:inline-flex;align-items:center;gap:.5rem;padding:.7rem 1.8rem;border:1.5px solid #64748b;color:#64748b;border-radius:10px;font-family:inherit;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;text-decoration:none;transition:all .12s" onmouseover="this.style.borderColor='#1e293b';this.style.color='#1e293b'" onmouseout="this.style.borderColor='#64748b';this.style.color='#64748b'">← Volver al índice</a>
  </div>
  </div>
</div>
<script>
const Q=[{"id": 1, "bl": "T1", "la": "Tema 1", "tx": "La normalización, según el Tema 1, consiste en la elaboración, difusión y aplicación de normas por organismos nacionales de normalización. En España, este papel lo desempeña:", "op": ["ENAC — Entidad Nacional de Acreditación", "AENOR — Asociación Española de Normalización y Certificación", "EOTA — Organización Europea de Evaluación Técnica", "CEN — Comité Europeo de Normalización"], "co": "b", "fc": "Correcto. En España la normalización la realiza por Ley AENOR (Asociación Española de Normalización y Certificación), que elabora y publica las normas UNE. Es el equivalente español del CEN a nivel europeo.", "fw": "Incorrecto. Respuesta correcta: B — AENOR realiza la normalización en España y elabora las normas UNE. ENAC acredita laboratorios; EOTA gestiona las ETA."}, {"id": 2, "bl": "T1", "la": "Tema 1", "tx": "Un anclaje con etiqueta de seguridad UIAA indica que ha sido certificado conforme a la norma UIAA 123 y a la EN 959 por:", "op": ["El propio fabricante mediante autodeclaración de conformidad", "Un laboratorio de pruebas independiente", "La Federación Española de Deportes de Montaña (FEDME)", "El Cabildo Insular de la zona donde se va a instalar"], "co": "b", "fc": "Correcto. La etiqueta de seguridad UIAA en un anclaje indica que ha sido certificado por un laboratorio de pruebas independiente, conforme a la norma UIAA 123 y a la EN 959.", "fw": "Incorrecto. Respuesta correcta: B — la certificación UIAA la realiza un laboratorio independiente, no el fabricante ni ninguna federación."}, {"id": 3, "bl": "T2", "la": "Tema 2", "tx": "Según la Ley 4/2010 del Catálogo Canario de Especies Protegidas, una especie 'vulnerable' se define como aquella que:", "op": ["Cuya supervivencia es poco probable si los factores causales de su situación siguen actuando", "Corre el riesgo de pasar a la categoría 'en peligro de extinción' en un futuro inmediato si los factores adversos no son corregidos", "No está amenazada pero merece protección por su valor científico o singularidad", "Ha sido introducida en Canarias por intervención humana directa o indirecta"], "co": "b", "fc": "Correcto. La Ley 4/2010 define las especies vulnerables como aquellas que corren el riesgo de pasar a 'en peligro de extinción' en un futuro inmediato si los factores adversos que actúan sobre ellas no son corregidos.", "fw": "Incorrecto. Respuesta correcta: B. La definición de 'en peligro de extinción' es que su supervivencia es poco probable; la 'vulnerable' es la que puede llegar a esa situación próximamente."}, {"id": 4, "bl": "T2", "la": "Tema 2", "tx": "El Parque Nacional de Canarias se diferencia del Parque Rural principalmente en que:", "op": ["El Parque Nacional tiene mayor superficie y el Parque Rural es siempre costero", "El Parque Nacional protege espacios naturales de excepcional importancia a escala nacional, mientras que el Parque Rural incluye zonas con valores naturales que coexisten con actividades humanas tradicionales", "El Parque Nacional es gestionado por el Cabildo y el Parque Rural por el Gobierno de Canarias", "El Parque Nacional permite la instalación de anclajes sin autorización previa"], "co": "b", "fc": "Correcto. Los Parques Nacionales protegen espacios de excepcional importancia natural a escala nacional y son competencia del Estado. Los Parques Rurales son figuras autonómicas que integran zonas donde los valores naturales coexisten con actividades humanas productivas tradicionales.", "fw": "Incorrecto. Respuesta correcta: B. La diferencia clave es la escala de protección y la coexistencia con actividades humanas en los Parques Rurales."}, {"id": 5, "bl": "T3", "la": "Tema 3", "tx": "El proceso de 'pasivado' aplicado a los aceros inoxidables tiene como objetivo:", "op": ["Eliminar mediante baño ácido las manchas e impurezas de soldadura de la superficie", "Formar deliberadamente y reforzar la capa pasiva de óxido de cromo (Cr₂O₃) mediante contacto controlado con un agente oxidante", "Eliminar los restos de grasa y aceite del proceso de fabricación mediante desengrasante", "Aumentar el brillo superficial del acero mediante disolución anódica electroquímica"], "co": "b", "fc": "Correcto. El pasivado consiste en formar y reforzar deliberadamente la capa pasiva de Cr₂O₃ sobre la superficie del acero mediante contacto controlado con un agente oxidante, mejorando así su resistencia a la corrosión.", "fw": "Incorrecto. Respuesta correcta: B. El pasivado forma/refuerza la capa pasiva. El decapado elimina manchas con ácido; el desengrasado elimina grasas."}, {"id": 6, "bl": "T3", "la": "Tema 3", "tx": "Los aceros dúplex se caracterizan por tener una estructura:", "op": ["Exclusivamente ferrítica, con alto contenido en cromo y sin níquel", "Exclusivamente austenítica, no magnética y con alta resistencia a los cloruros", "Mixta austenítica-ferrítica, con mayor resistencia mecánica y buena resistencia a la corrosión que los austeníticos estándar", "Martensítica de alta dureza, usada en herramientas de corte para reequipamiento"], "co": "c", "fc": "Correcto. Los aceros dúplex tienen una microestructura mixta austenítica-ferrítica que les proporciona mayor resistencia mecánica que los austeníticos estándar y también buena resistencia a la corrosión, siendo una opción válida para entornos costeros.", "fw": "Incorrecto. Respuesta correcta: C — los dúplex son austenítico-ferríticos, con mejor resistencia mecánica que los austeníticos puros."}, {"id": 7, "bl": "T4", "la": "Tema 4", "tx": "La resina Hilti RE-500 v4 se caracteriza por:", "op": ["Color gris, tiempo de trabajabilidad largo y vida útil estimada de 50-100 años", "Color rojizo, tiempo de trabajabilidad corto y vida útil estimada de 50-100 años según su ETA", "Presentarse en dos compartimentos separados que requieren mezcla manual en proporción 3:1", "Ser de tipo viniléster, apta exclusivamente para climas fríos y alta montaña"], "co": "b", "fc": "Correcto. La Hilti RE-500 v4 tiene color rojizo y tiempo de trabajabilidad corto. Su Evaluación Técnica Europea indica una vida útil estimada de 50-100 años, aunque esto no constituye garantía del fabricante.", "fw": "Incorrecto. Respuesta correcta: B — la RE-500 v4 es de color rojizo y trabajabilidad corta. La de color gris y trabajabilidad larga es la Sika Anchorfix 3030."}, {"id": 8, "bl": "T4", "la": "Tema 4", "tx": "La Sika Anchorfix 3030 se distingue de la Hilti RE-500 v4 principalmente por:", "op": ["Ser una resina viniléster mientras que la RE-500 es epoxi", "Su color gris y su mayor tiempo de trabajabilidad, siendo ambas con vida útil estimada de 50-100 años según ETA", "Su presentación en ampolla de vidrio, a diferencia del cartucho side-by-side de la RE-500", "Su menor resistencia mecánica, compensada por el mayor tiempo de fraguado"], "co": "b", "fc": "Correcto. La Sika Anchorfix 3030 es de color gris y tiene mayor tiempo de trabajabilidad que la RE-500 v4. Ambas tienen vida útil estimada de 50-100 años según sus Evaluaciones Técnicas Europeas.", "fw": "Incorrecto. Respuesta correcta: B — la diferencia principal es el color gris y el mayor tiempo de trabajabilidad de la Anchorfix 3030 frente al color rojizo y trabajabilidad corta de la RE-500."}, {"id": 9, "bl": "T5", "la": "Tema 5", "tx": "Al instalar un anclaje mecánico, el Tema 5 indica que la instalación es correcta si:", "op": ["El anclaje supera una prueba de extracción con extractómetro de al menos 10 kN", "Se cumple el procedimiento del fabricante siendo la longitud instalada la recomendada por este", "La rosca sobresale entre 3 y 4 mm de la superficie de la roca", "El agujero tiene exactamente el doble del diámetro del anclaje para facilitar la expansión"], "co": "b", "fc": "Correcto. Para anclajes mecánicos, el Tema 5 y el Tema 6 indican que la instalación es correcta si cumple los requisitos del fabricante, siendo la longitud instalada la recomendada por este.", "fw": "Incorrecto. Respuesta correcta: B — la correcta instalación de un mecánico se verifica cumpliendo el procedimiento del fabricante con la longitud recomendada."}, {"id": 10, "bl": "T6", "la": "Tema 6", "tx": "En una cabecera de rápel con cuerda simple, el Tema 6 recomienda que el anclaje principal se sitúe por encima del anclaje secundario (desviador) porque:", "op": ["La normativa UNE-EN 959:2018 exige que el anclaje de mayor resistencia esté siempre en la posición superior", "Esta configuración reduce el rozamiento en la recuperación de la cuerda y el desviador soporta menos carga por la física de los ángulos", "Así el anclaje desviador soporta el 'ángulo crítico de la cuerda', favoreciendo la recuperación", "Esta posición facilita el acceso del reequipador para futuras revisiones periódicas"], "co": "b", "fc": "Correcto. Con el anclaje principal arriba, el rozamiento en la recuperación de la cuerda es menor y el desviador soporta menos carga (física de ángulos). Además facilita el desembrague si fuera necesario. La situación contraria (desviador arriba) genera el 'ángulo crítico de la cuerda'.", "fw": "Incorrecto. Respuesta correcta: B. Con el principal arriba, menor rozamiento y menor carga sobre el desviador. La situación B (desviador arriba) es la que genera el ángulo crítico."}];
const ans={},ver=new Set();
function build(){const c=document.getElementById('quiz');Q.forEach(q=>{const d=document.createElement('div');d.className='qcard';
d.innerHTML=`<div class="qmeta"><span class="qnum">Pregunta ${q.id}</span><span class="qbadge">${q.la}</span></div>`+
`<div class="qtxt">${q.tx}</div><div class="opts" id="o${q.id}">`+
q.op.map((t,i)=>`<button class="opt" data-v="${'abcd'[i]}" onclick="pick(${q.id},'${'abcd'[i]}')"><span class="olet">${'ABCD'[i]}</span>${t}</button>`).join('')+
`</div><div class="fb" id="f${q.id}"></div><button class="chk-btn" id="b${q.id}" onclick="check(${q.id})">▶ Comprobar</button>`;
document.getElementById('quiz').appendChild(d);});}
function pick(id,v){if(ver.has(id))return;document.querySelectorAll(`#o${id} .opt`).forEach(o=>o.classList.remove('sel'));document.querySelector(`#o${id} [data-v="${v}"]`).classList.add('sel');ans[id]=v;prog();}
function check(id){if(ver.has(id))return;if(!ans[id]){document.getElementById('warn').textContent='⚠ Selecciona una opción primero.';return;}document.getElementById('warn').textContent='';
ver.add(id);const q=Q.find(x=>x.id===id);const ok=ans[id]===q.co;
document.querySelectorAll(`#o${id} .opt`).forEach(o=>{o.classList.add('dis');if(o.dataset.v===q.co)o.classList.add('ok');else if(o.dataset.v===ans[id]&&!ok)o.classList.add('ng');});
const f=document.getElementById('f'+id);f.className='fb '+(ok?'ok':'ng');f.textContent=(ok?'✓ ':'✗ ')+(ok?q.fc:q.fw);
const b=document.getElementById('b'+id);b.disabled=true;b.textContent=ok?'✓ Correcto':'✗ Incorrecto';}
function prog(){const d=Object.keys(ans).length,p=Math.round(d/Q.length*100);
document.getElementById('pp').textContent=`${d}/${Q.length} respondidas`;document.getElementById('pf').style.width=p+'%';}
function submit(){const un=Q.filter(q=>!ans[q.id]);document.getElementById('warn').textContent=un.length?`⚠ ${un.length} pregunta(s) sin responder.`:'';
Q.forEach(q=>{if(!ver.has(q.id)&&ans[q.id])check(q.id);});
let tot=0;const bk={};Q.forEach(q=>{const ok=ans[q.id]===q.co;if(ok)tot++;bk[q.la]=bk[q.la]||[0,0];bk[q.la][1]++;if(ok)bk[q.la][0]++;});
const p=Math.round(tot/Q.length*100);document.getElementById('rscore').textContent=`${tot}/${Q.length}`;document.getElementById('rpct').textContent=`${p}% de respuestas correctas`;
const r=['❗ Necesitas repasar','📖 Suficiente','📚 Bien','👍 Notable','🏆 Sobresaliente'];
document.getElementById('rrat').textContent=r[p>=90?4:p>=75?3:p>=60?2:p>=50?1:0];
document.getElementById('rgrid').innerHTML=Object.entries(bk).map(([k,[c,t]])=>`<div class="res-cell"><div class="res-cell-n">${k}</div><div class="res-cell-v">${c}/${t}</div></div>`).join('');
document.getElementById('results').style.display='block';document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});}
function restart(){Object.keys(ans).forEach(k=>delete ans[k]);ver.clear();document.querySelectorAll('.opt').forEach(o=>o.className='opt');document.querySelectorAll('.fb').forEach(f=>{f.className='fb';f.textContent='';});document.querySelectorAll('.chk-btn').forEach(b=>{b.disabled=false;b.textContent='▶ Comprobar';});document.getElementById('warn').textContent='';document.getElementById('results').style.display='none';prog();window.scrollTo({top:0,behavior:'smooth'});}
build();prog();
</script>
</body>
</html>
