<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tema 6 — Metodología — Reequipamiento de Barrancos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.topbar{background:#0e7490;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.topbar h1{color:#fff;font-size:1.05rem;font-weight:700;line-height:1.2}
.topbar a{color:rgba(255,255,255,.8);font-size:.78rem;text-decoration:none;background:rgba(255,255,255,.15);padding:.35rem .8rem;border-radius:6px;white-space:nowrap}
.topbar a:hover{background:rgba(255,255,255,.25)}
.topbar-sub{color:rgba(255,255,255,.7);font-size:.75rem}
.prog-bar{background:rgba(255,255,255,.25);height:5px}
.prog-fill{height:100%;background:#fff;transition:width .4s;width:0%}
.wrap{max-width:780px;margin:0 auto;padding:1.5rem 1rem 5rem}
.stat-row{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:.65rem 1rem;font-size:.8rem;color:#64748b;flex:1;min-width:110px}
.stat strong{display:block;font-size:1.3rem;font-weight:700;color:#1e293b;line-height:1}
.qcard{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.4rem;margin-bottom:1rem;border-top:3px solid #0e7490}
.qmeta{display:flex;align-items:center;gap:.6rem;margin-bottom:.7rem;flex-wrap:wrap}
.qnum{font-size:.72rem;font-weight:600;color:#0e7490;background:#ecfeff;padding:.2rem .55rem;border-radius:4px}
.qbadge{font-size:.68rem;color:#64748b;background:#f1f5f9;padding:.2rem .55rem;border-radius:4px}
.qtxt{font-size:.95rem;line-height:1.65;color:#1e293b;margin-bottom:1rem}
.opts{display:flex;flex-direction:column;gap:.4rem}
.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.65rem .9rem;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:.87rem;line-height:1.5;text-align:left;color:#1e293b;width:100%;transition:all .12s}
.opt:hover:not(.dis){background:#ecfeff;border-color:#0e7490}
.opt.sel{background:#ecfeff;border-color:#0e7490;color:#1e293b}
.opt.ok{background:#dcfce7;border-color:#16a34a;color:#15803d;font-weight:500}
.opt.ng{background:#fee2e2;border-color:#dc2626;color:#b91c1c}
.opt.dis{cursor:default}
.olet{font-weight:700;font-size:.75rem;opacity:.5;flex-shrink:0;padding-top:.05rem;min-width:1rem}
.fb{display:none;margin-top:.75rem;padding:.75rem 1rem;border-radius:8px;font-size:.82rem;line-height:1.6;border-left:3px solid}
.fb.ok{background:#f0fdf4;border-color:#16a34a;color:#15803d;display:block}
.fb.ng{background:#fef2f2;border-color:#dc2626;color:#b91c1c;display:block}
.chk-btn{margin-top:.8rem;display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1.1rem;border:1.5px solid #0e7490;color:#0e7490;background:transparent;border-radius:7px;font-size:.73rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.chk-btn:hover:not(:disabled){background:#0e7490;color:#fff}
.chk-btn:disabled{opacity:.3;cursor:default}
.actions{text-align:center;padding:2rem 0;border-top:1px solid #e2e8f0;margin-top:.5rem}
.warn{font-size:.75rem;color:#d97706;margin-bottom:.75rem;min-height:1em;font-weight:500}
.submit-btn{padding:.8rem 2.2rem;background:#0e7490;color:#fff;border:none;border-radius:9px;font-size:.82rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:opacity .12s}
.submit-btn:hover{opacity:.88}
#results{display:none;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:2.5rem 2rem;text-align:center;margin-top:1.5rem}
.res-score{font-size:4.5rem;font-weight:800;color:#0e7490;line-height:1}
.res-pct{font-size:.9rem;color:#64748b;margin:.3rem 0 1.2rem}
.res-rat{display:inline-block;padding:.4rem 1.2rem;background:#ecfeff;color:#0e7490;border-radius:20px;font-weight:700;font-size:.95rem;margin-bottom:1.5rem}
.res-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.6rem;margin:1rem 0 1.5rem;text-align:left}
.res-cell{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:.65rem}
.res-cell-n{font-size:.58rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem}
.res-cell-v{font-size:1.5rem;font-weight:800;color:#1e293b}
.restart-btn{padding:.7rem 1.8rem;border:1.5px solid #0e7490;color:#0e7490;background:transparent;border-radius:8px;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.restart-btn:hover{background:#0e7490;color:#fff}
@media(max-width:580px){.wrap{padding:1rem .75rem 4rem}.qcard{padding:1.1rem}.res-score{font-size:3.5rem}}
</style>
</head>
<body>
<div class="topbar" style="background:#0e7490">
  <div>
    <div class="topbar-sub">Curso de instalación de anclajes en barrancos</div>
    <h1>Tema 6 — Metodología</h1>
  </div>
  <a href="index.html?v=202603162154">← Índice</a>
</div>
<div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
<div class="wrap">
  <div class="stat-row">
    <div class="stat"><strong id="pp">0/10</strong>Respondidas</div>
    <div class="stat"><strong>10</strong>Preguntas</div>
    <div class="stat"><strong style="font-size:.9rem;color:#64748b">Cabeceras · Planificación · Roles · Protocolo</strong></div>
  </div>
  <div id="quiz"></div>
  <div class="actions">
    <div class="warn" id="warn"></div>
    <button class="submit-btn" onclick="submit()">Finalizar y ver resultados →</button>
  </div>
  <div id="results">
    <div class="res-score" id="rscore"></div>
    <div class="res-pct" id="rpct"></div>
    <div class="res-rat" id="rrat"></div>
    <div class="res-grid" id="rgrid"></div>
    <button class="restart-btn" onclick="restart()">↺ Repetir</button>
  <div style="margin-top:1.5rem">
    <a href="index.html" style="display:inline-flex;align-items:center;gap:.5rem;padding:.7rem 1.8rem;border:1.5px solid #64748b;color:#64748b;border-radius:10px;font-family:inherit;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;text-decoration:none;transition:all .12s" onmouseover="this.style.borderColor='#1e293b';this.style.color='#1e293b'" onmouseout="this.style.borderColor='#64748b';this.style.color='#64748b'">← Volver al índice</a>
  </div>
  </div>
</div>
<script>
const Q=[{"id": 1, "bl": "T6", "la": "Tema 6", "tx": "En el reequipamiento de barrancos, el material instalado debe ser:", "op": ["Idéntico al existente para respetar la instalación original del aperturista", "Mejor que el anteriormente empleado en diseño, calidad y seguridad", "El más económico que cumpla la normativa mínima de resistencia", "El mismo tipo pero con ETA adicional que garantice 50 años de vida útil"], "co": "b", "fc": "Correcto. El Tema 6 establece expresamente que el material del reequipamiento debe ser mejor al anteriormente empleado en diseño, calidad y seguridad.", "fw": "Incorrecto. El material del reequipamiento debe ser mejor en diseño, calidad y seguridad que el sustituido."}, {"id": 2, "bl": "T6", "la": "Tema 6", "tx": "En el 'modo solidario' de una cabecera con cadena en L, la carga es soportada por:", "op": ["Solo el anclaje inferior; el superior permanece inactivo como seguro", "Ambos anclajes simultáneamente; la carga se comparte entre los dos", "El anclaje superior únicamente, siendo el inferior un refuerzo opcional", "La propia cadena que distribuye la carga según el ángulo de la cuerda"], "co": "a", "fc": "Correcto. En una cabecera solidarizada (modo reaseguro), solo el anclaje inferior soporta la carga activamente; el superior permanece inactivo como respaldo. Si el inferior falla, el superior entra en carga. A esto se le llama solidarizar la cabecera.", "fw": "Incorrecto. Respuesta correcta: A. Solidarizar una cabecera significa que si un anclaje falla el otro responde. En la cadena en L, el anclaje inferior soporta la carga y el superior actúa como seguro de respaldo."}, {"id": 3, "bl": "T6", "la": "Tema 6", "tx": "Las cadenas en 'L' están totalmente desaconsejadas en barrancos acuáticos porque:", "op": ["Son más difíciles de instalar en posición horizontal que las cadenas en V", "El material arrastrado por una crecida puede golpear o insertarse en la cadena deteriorando el conjunto", "No permiten la recuperación de la cuerda con nudo en forma de ocho", "Generan un ángulo crítico de la cuerda superior al recomendado por la norma"], "co": "b", "fc": "Correcto. El Tema 6 indica que en barrancos acuáticos, el material arrastrado por crecidas puede golpear o insertarse en la cadena en L, produciendo deterioro o debilitamiento crítico del conjunto.", "fw": "Incorrecto. En barrancos acuáticos, las crecidas pueden insertar material en la cadena en L deteriorando el conjunto."}, {"id": 4, "bl": "T6", "la": "Tema 6", "tx": "La apertura ideal entre los dos anclajes de una cabecera con cadena en V es:", "op": ["10° para maximizar la concentración de carga", "30° para un reparto equitativo de la carga entre ambos anclajes", "60° porque a ese ángulo la componente de carga se iguala perfectamente", "90° para aprovechar al máximo la geometría de la cadena"], "co": "b", "fc": "Correcto. El Tema 6 establece que la apertura ideal de la cadena en V es de aproximadamente 30°, con los anclajes en horizontal y orientados hacia la dirección de la carga.", "fw": "Incorrecto. La apertura ideal de la cadena en V es de unos 30° según el Tema 6."}, {"id": 5, "bl": "T6", "la": "Tema 6", "tx": "En el anclaje tipo U-Bolt, se debe incluir una o dos anillas antes de su instalación para:", "op": ["Facilitar el encastrado del tensor en la roca y su correcto alineamiento", "Evitar el desgaste por fricción directa de la cuerda sobre el acero del U-Bolt y añadir redundancia", "Cumplir el requisito expreso de la norma UNE-EN 959:2018", "Ajustar la dirección del anclaje tras la instalación si fuera necesario"], "co": "b", "fc": "Correcto. Las anillas protegen el U-Bolt del desgaste por fricción directa de la cuerda y añaden redundancia. Sin ellas, además, la cuerda podría salirse por el gran tamaño de la apertura del U.", "fw": "Incorrecto. Las anillas evitan el desgaste por fricción de la cuerda sobre el U-Bolt y añaden redundancia."}, {"id": 6, "bl": "T6", "la": "Tema 6", "tx": "En la planificación de un reequipamiento, el primer acto ético recomendado antes de comenzar los trabajos es:", "op": ["Publicar en redes sociales la intención de reequipar para recabar voluntarios y financiación", "Recabar información sobre los aperturistas originales y tomar contacto con ellos", "Solicitar presupuesto a varios fabricantes de anclajes homologados", "Comunicar el inicio del proyecto al club de barranquismo más cercano a la zona"], "co": "b", "fc": "Correcto. El Tema 6 señala que contactar con los aperturistas originales es un acto ético recomendado que puede ser muy productivo y evitar futuros malentendidos sobre criterios de instalación.", "fw": "Incorrecto. El acto ético prioritario es buscar y contactar con los aperturistas originales del barranco."}, {"id": 7, "bl": "T6", "la": "Tema 6", "tx": "El inicio de pasamanos se identifica visualmente por una configuración diferente a la cabecera de rápel. La que se ha extendido como identificativa es:", "op": ["Configuración en forma de 'L' con dos tensores simples: uno horizontal y otro vertical más cerca de la cabecera. El tensor horizontal podría ser de doble anilla para que la basculación facilite su recuperación desde la cabecera.", "Cadena solidarizada en forma de V orientada hacia la cabecera principal del rápel", "Dos tensores de doble anilla solidarizados con cadena en D", "Tensor simple con anilla única orientado perpendicular a la línea de rápel"], "co": "a", "fc": "Correcto. La configuración en L del inicio de pasamanos se forma con dos tensores — uno simple y otro de doble anilla a ser posible — orientados hacia la cabecera principal. Esta forma en L se ha extendido como identificativo visual para que el barranquista no confunda el inicio de pasamanos con la cabecera de rápel.", "fw": "Incorrecto. Respuesta correcta: A. La configuración en L del inicio de pasamanos usa dos tensores, no una cadena en L. La cadena en L es una configuración de cabecera de rápel, no de pasamanos."}, {"id": 8, "bl": "T6", "la": "Tema 6", "tx": "En un grupo pequeño de reequipamiento, ¿cuál es la organización por jornadas recomendada para minimizar el material transportado?", "op": ["Jornada 1: perforación + resinado simultáneo; jornada 2: retirada de anclajes viejos y mimetizado", "Jornada 1: toda la perforación; jornada 2: todo el resinado; jornada 3: retirada de anclajes viejos", "Jornada única con todos los roles actuando simultáneamente en diferentes rápeles", "Jornada 1: retirada de anclajes viejos; jornada 2: perforación; jornada 3: resinado"], "co": "b", "fc": "Correcto. El Tema 6 recomienda para grupos pequeños: jornada 1 toda la perforación, jornada 2 todo el resinado, jornada 3 retirada y mimetizado. Así se minimiza el material transportado cada día.", "fw": "Incorrecto. Para grupos pequeños: jornada 1 perforación / jornada 2 resinado / jornada 3 retirada de viejos."}, {"id": 9, "bl": "T6", "la": "Tema 6", "tx": "La ficha técnica del barranco debe incluir, entre otros datos:", "op": ["El presupuesto total del reequipamiento y el nombre de los patrocinadores", "Nombre, localidad, municipio, graduación, coordenadas inicio/fin, estado de anclajes y track GPS", "El número de serie de cada anclaje instalado y su fecha de fabricación", "La lista de participantes del equipo y sus titulaciones vigentes"], "co": "b", "fc": "Correcto. El Anexo I del Tema 6 muestra la ficha del barranco que incluye nombre, localidad, municipio, graduación, descripción, coordenadas, estado de anclajes, tracks GPS y croquis.", "fw": "Incorrecto. La ficha del barranco incluye nombre, coordenadas, graduación, estado de anclajes y track GPS entre otros datos técnicos."}, {"id": 10, "bl": "T6", "la": "Tema 6", "tx": "El rol del 'Perforador' dentro del equipo de reequipamiento consiste en:", "op": ["Inyectar la resina en los orificios e instalar los tensores según el fabricante", "Instalar las cabeceras en los anclajes viejos y transportar las cuerdas al siguiente rápel", "Realizar la perforación de los orificios donde irán instalados los nuevos anclajes", "Cumplimentar la ficha técnica del barranco y tomar datos durante el trabajo"], "co": "c", "fc": "Correcto. El Tema 6 define el rol del Perforador como la persona encargada de perforar los orificios donde irán instalados los nuevos anclajes. El Resinador inyecta la resina.", "fw": "Incorrecto. El Perforador perfora los orificios; el Resinador inyecta la resina; el Ayudante instala cabeceras y transporta cuerdas."}];
const ans={},ver=new Set();
function build(){const c=document.getElementById('quiz');Q.forEach(q=>{const d=document.createElement('div');d.className='qcard';
d.innerHTML=`<div class="qmeta"><span class="qnum">Pregunta ${q.id}</span><span class="qbadge">${q.la}</span></div>`+
`<div class="qtxt">${q.tx}</div><div class="opts" id="o${q.id}">`+
q.op.map((t,i)=>`<button class="opt" data-v="${'abcd'[i]}" onclick="pick(${q.id},'${'abcd'[i]}')"><span class="olet">${'ABCD'[i]}</span>${t}</button>`).join('')+
`</div><div class="fb" id="f${q.id}"></div><button class="chk-btn" id="b${q.id}" onclick="check(${q.id})">▶ Comprobar</button>`;
document.getElementById('quiz').appendChild(d);});}
function pick(id,v){if(ver.has(id))return;document.querySelectorAll(`#o${id} .opt`).forEach(o=>o.classList.remove('sel'));document.querySelector(`#o${id} [data-v="${v}"]`).classList.add('sel');ans[id]=v;prog();}
function check(id){if(ver.has(id))return;if(!ans[id]){document.getElementById('warn').textContent='⚠ Selecciona una opción primero.';return;}document.getElementById('warn').textContent='';
ver.add(id);const q=Q.find(x=>x.id===id);const ok=ans[id]===q.co;
document.querySelectorAll(`#o${id} .opt`).forEach(o=>{o.classList.add('dis');if(o.dataset.v===q.co)o.classList.add('ok');else if(o.dataset.v===ans[id]&&!ok)o.classList.add('ng');});
const f=document.getElementById('f'+id);f.className='fb '+(ok?'ok':'ng');f.textContent=(ok?'✓ ':'✗ ')+(ok?q.fc:q.fw);
const b=document.getElementById('b'+id);b.disabled=true;b.textContent=ok?'✓ Correcto':'✗ Incorrecto';}
function prog(){const d=Object.keys(ans).length,p=Math.round(d/Q.length*100);
document.getElementById('pp').textContent=`${d}/${Q.length} respondidas`;document.getElementById('pf').style.width=p+'%';}
function submit(){const un=Q.filter(q=>!ans[q.id]);document.getElementById('warn').textContent=un.length?`⚠ ${un.length} pregunta(s) sin responder.`:'';
Q.forEach(q=>{if(!ver.has(q.id)&&ans[q.id])check(q.id);});
let tot=0;const bk={};Q.forEach(q=>{const ok=ans[q.id]===q.co;if(ok)tot++;bk[q.la]=bk[q.la]||[0,0];bk[q.la][1]++;if(ok)bk[q.la][0]++;});
const p=Math.round(tot/Q.length*100);document.getElementById('rscore').textContent=`${tot}/${Q.length}`;document.getElementById('rpct').textContent=`${p}% de respuestas correctas`;
const r=['❗ Necesitas repasar','📖 Suficiente','📚 Bien','👍 Notable','🏆 Sobresaliente'];
document.getElementById('rrat').textContent=r[p>=90?4:p>=75?3:p>=60?2:p>=50?1:0];
document.getElementById('rgrid').innerHTML=Object.entries(bk).map(([k,[c,t]])=>`<div class="res-cell"><div class="res-cell-n">${k}</div><div class="res-cell-v">${c}/${t}</div></div>`).join('');
document.getElementById('results').style.display='block';document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});}
function restart(){Object.keys(ans).forEach(k=>delete ans[k]);ver.clear();document.querySelectorAll('.opt').forEach(o=>o.className='opt');document.querySelectorAll('.fb').forEach(f=>{f.className='fb';f.textContent='';});document.querySelectorAll('.chk-btn').forEach(b=>{b.disabled=false;b.textContent='▶ Comprobar';});document.getElementById('warn').textContent='';document.getElementById('results').style.display='none';prog();window.scrollTo({top:0,behavior:'smooth'});}
build();prog();
</script>
</body>
</html>
