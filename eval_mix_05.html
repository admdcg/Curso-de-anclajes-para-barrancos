<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Evaluación Mixta V — Reequipamiento de Barrancos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.topbar{background:#374151;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.topbar h1{color:#fff;font-size:1.05rem;font-weight:700;line-height:1.2}
.topbar a{color:rgba(255,255,255,.8);font-size:.78rem;text-decoration:none;background:rgba(255,255,255,.15);padding:.35rem .8rem;border-radius:6px;white-space:nowrap}
.topbar a:hover{background:rgba(255,255,255,.25)}
.topbar-sub{color:rgba(255,255,255,.7);font-size:.75rem}
.prog-bar{background:rgba(255,255,255,.25);height:5px}
.prog-fill{height:100%;background:#fff;transition:width .4s;width:0%}
.wrap{max-width:780px;margin:0 auto;padding:1.5rem 1rem 5rem}
.stat-row{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:.65rem 1rem;font-size:.8rem;color:#64748b;flex:1;min-width:110px}
.stat strong{display:block;font-size:1.3rem;font-weight:700;color:#1e293b;line-height:1}
.qcard{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.4rem;margin-bottom:1rem;border-top:3px solid #374151}
.qmeta{display:flex;align-items:center;gap:.6rem;margin-bottom:.7rem;flex-wrap:wrap}
.qnum{font-size:.72rem;font-weight:600;color:#374151;background:#f9fafb;padding:.2rem .55rem;border-radius:4px}
.qbadge{font-size:.68rem;color:#64748b;background:#f1f5f9;padding:.2rem .55rem;border-radius:4px}
.qtxt{font-size:.95rem;line-height:1.65;color:#1e293b;margin-bottom:1rem}
.opts{display:flex;flex-direction:column;gap:.4rem}
.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.65rem .9rem;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:.87rem;line-height:1.5;text-align:left;color:#1e293b;width:100%;transition:all .12s}
.opt:hover:not(.dis){background:#f9fafb;border-color:#374151}
.opt.sel{background:#f9fafb;border-color:#374151;color:#1e293b}
.opt.ok{background:#dcfce7;border-color:#16a34a;color:#15803d;font-weight:500}
.opt.ng{background:#fee2e2;border-color:#dc2626;color:#374151}
.opt.dis{cursor:default}
.olet{font-weight:700;font-size:.75rem;opacity:.5;flex-shrink:0;padding-top:.05rem;min-width:1rem}
.fb{display:none;margin-top:.75rem;padding:.75rem 1rem;border-radius:8px;font-size:.82rem;line-height:1.6;border-left:3px solid}
.fb.ok{background:#f0fdf4;border-color:#16a34a;color:#15803d;display:block}
.fb.ng{background:#f9fafb;border-color:#dc2626;color:#374151;display:block}
.chk-btn{margin-top:.8rem;display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1.1rem;border:1.5px solid #374151;color:#374151;background:transparent;border-radius:7px;font-size:.73rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.chk-btn:hover:not(:disabled){background:#374151;color:#fff}
.chk-btn:disabled{opacity:.3;cursor:default}
.actions{text-align:center;padding:2rem 0;border-top:1px solid #e2e8f0;margin-top:.5rem}
.warn{font-size:.75rem;color:#d97706;margin-bottom:.75rem;min-height:1em;font-weight:500}
.submit-btn{padding:.8rem 2.2rem;background:#374151;color:#fff;border:none;border-radius:9px;font-size:.82rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:opacity .12s}
.submit-btn:hover{opacity:.88}
#results{display:none;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:2.5rem 2rem;text-align:center;margin-top:1.5rem}
.res-score{font-size:4.5rem;font-weight:800;color:#374151;line-height:1}
.res-pct{font-size:.9rem;color:#64748b;margin:.3rem 0 1.2rem}
.res-rat{display:inline-block;padding:.4rem 1.2rem;background:#f9fafb;color:#374151;border-radius:20px;font-weight:700;font-size:.95rem;margin-bottom:1.5rem}
.res-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.6rem;margin:1rem 0 1.5rem;text-align:left}
.res-cell{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:.65rem}
.res-cell-n{font-size:.58rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem}
.res-cell-v{font-size:1.5rem;font-weight:800;color:#1e293b}
.restart-btn{padding:.7rem 1.8rem;border:1.5px solid #374151;color:#374151;background:transparent;border-radius:8px;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.restart-btn:hover{background:#374151;color:#fff}
@media(max-width:580px){.wrap{padding:1rem .75rem 4rem}.qcard{padding:1.1rem}.res-score{font-size:3.5rem}}
</style>
</head>
<body>
<div class="topbar" style="background:#374151">
  <div>
    <div class="topbar-sub">Curso de instalación de anclajes en barrancos</div>
    <h1>Evaluación Mixta V</h1>
  </div>
  <a href="index.html">← Índice</a>
</div>
<div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
<div class="wrap">
  <div class="stat-row">
    <div class="stat"><strong id="pp">0/10</strong>Respondidas</div>
    <div class="stat"><strong>10</strong>Preguntas</div>
    <div class="stat"><strong style="font-size:.9rem;color:#64748b">Todos los temas · 10 preguntas</strong></div>
  </div>
  <div id="quiz"></div>
  <div class="actions">
    <div class="warn" id="warn"></div>
    <button class="submit-btn" onclick="submit()">Finalizar y ver resultados →</button>
  </div>
  <div id="results">
    <div class="res-score" id="rscore"></div>
    <div class="res-pct" id="rpct"></div>
    <div class="res-rat" id="rrat"></div>
    <div class="res-grid" id="rgrid"></div>
    <button class="restart-btn" onclick="restart()">↺ Repetir</button>
  <div style="margin-top:1.5rem">
    <a href="index.html" style="display:inline-flex;align-items:center;gap:.5rem;padding:.7rem 1.8rem;border:1.5px solid #64748b;color:#64748b;border-radius:10px;font-family:inherit;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;text-decoration:none;transition:all .12s" onmouseover="this.style.borderColor='#1e293b';this.style.color='#1e293b'" onmouseout="this.style.borderColor='#64748b';this.style.color='#64748b'">← Volver al índice</a>
  </div>
  </div>
</div>
<script>
const Q=[{"id": 1, "bl": "T1", "la": "Tema 1", "tx": "Desde el punto de vista del Tema 1, los anclajes que el reequipador instala en un barranco son:", "op": ["Bienes de dominio público inalienables que pasan a ser propiedad de la Administración en el momento de su instalación", "El equipamiento de una instalación deportiva; son los recursos materiales fijos o móviles necesarios para el desarrollo del deporte en esa instalación", "Patrimonio exclusivo del reequipador que los instaló, con derecho a retirarlos en cualquier momento", "Material deportivo privado que no tiene ninguna consideración legal como instalación deportiva"], "co": "b", "fc": "Correcto. Los anclajes constituyen el equipamiento de una instalación deportiva (el barranco). Son los recursos materiales, fijos o móviles, necesarios para el desarrollo del deporte, y como tales están sujetos a la normativa de seguridad de instalaciones deportivas de uso público.", "fw": "Incorrecto. Respuesta correcta: B. Los anclajes son el equipamiento de la instalación deportiva; no pasan a ser dominio público automáticamente ni son patrimonio exclusivo del reequipador."}, {"id": 2, "bl": "T1", "la": "Tema 1", "tx": "La inclusión de un barranco en el Censo de Instalaciones Deportivas tiene como implicación práctica, según el art. 51.4 de la LDC:", "op": ["Obliga a la Administración a mantener los anclajes en perfecto estado de manera directa y permanente", "Es requisito imprescindible para la celebración de competiciones oficiales y para la concesión de subvenciones públicas en materia de deporte", "Exime al reequipador de solicitar autorizaciones administrativas previas a los trabajos", "Convierte automáticamente el barranco en dominio público de la Comunidad Autónoma"], "co": "b", "fc": "Correcto. El art. 51.4 de la LDC establece que la inclusión en el CID será requisito imprescindible para la celebración de competiciones oficiales y para la concesión de subvenciones o ayudas públicas por la consejería competente en materia de deporte.", "fw": "Incorrecto. Respuesta correcta: B. La inclusión en el CID es requisito para competiciones oficiales y subvenciones deportivas; no exime de autorizaciones ni cambia la titularidad del terreno."}, {"id": 3, "bl": "T2", "la": "Tema 2", "tx": "La resistencia y la rotura de las rocas son propiedades fundamentales para el reequipamiento. La 'resistencia' de una roca indica:", "op": ["La capacidad de la roca para resistir la perforación con broca de widia", "La capacidad de la roca para soportar esfuerzos (compresión, tracción o cizallamiento) antes de romperse", "La dureza superficial medida por el índice de rebote del esclerómetro", "El tiempo que tarda la roca en meteorizar en condiciones costeras"], "co": "b", "fc": "Correcto. La resistencia de la roca indica su capacidad para soportar esfuerzos (compresión, tracción, cizallamiento) antes de romperse. Es la propiedad fundamental para determinar qué tipo de anclaje instalar y qué longitud es necesaria.", "fw": "Incorrecto. Respuesta correcta: B. La resistencia es la capacidad de soportar esfuerzos antes de romperse; es diferente a la dureza superficial y a la resistencia a la perforación."}, {"id": 4, "bl": "T2", "la": "Tema 2", "tx": "El gabro es una roca magmática intrusiva (plutónica) de color oscuro. ¿En qué categoría de resistencia para anclajes se encuadra junto al granito y al basalto?", "op": ["Roca muy frágil (< 20 MPa); requiere anclajes de gran longitud sin expansión", "Roca frágil (20-60 MPa); desaconseja el uso de anclajes de fuerte expansión", "Roca dura (> 60 MPa); admite anclajes mecánicos de expansión y anclajes químicos", "Roca metamórfica de dureza variable según la presión sufrida durante su formación"], "co": "c", "fc": "Correcto. El gabro es una roca magmática intrusiva de grano grueso, similar al granito en resistencia. Se clasifica como roca dura (> 60 MPa), lo que la hace apta tanto para anclajes mecánicos de expansión como para anclajes químicos.", "fw": "Incorrecto. Respuesta correcta: C. El gabro, como el granito y el basalto, es una roca dura (> 60 MPa) que admite cualquier tipo de anclaje."}, {"id": 5, "bl": "T3", "la": "Tema 3", "tx": "La corrosión intersticial se produce típicamente en:", "op": ["La superficie visible del anclaje expuesta directamente al agua de lluvia", "El espacio entre la chapa y el parabolt donde el electrolito queda atrapado sin renovarse y sin acceso al oxígeno", "La zona de soldadura del tensor cuando ha sido martilleada durante la instalación", "El interior del agujero taladrado en la roca antes de inyectar la resina"], "co": "b", "fc": "Correcto. La corrosión intersticial ocurre en pequeñas hendiduras (entre chapa y parabolt, entre arandela y soporte) donde el electrolito queda atrapado. La falta de renovación del electrolito y la baja concentración de oxígeno crean condiciones ideales para este tipo de corrosión.", "fw": "Incorrecto. Respuesta correcta: B. La corrosión intersticial se da en las hendiduras entre piezas (chapa-parabolt) donde el electrolito queda estancado."}, {"id": 6, "bl": "T3", "la": "Tema 3", "tx": "Según el Anexo II UIAA, ¿en qué rango de humedad relativa es mayor el riesgo de corrosión bajo tensión (SCC) en los anclajes?", "op": ["Entre el 20% y el 70%, donde se forman depósitos de cloruros concentrados que favorecen el SCC", "Por encima del 90%, porque el agua líquida en la superficie acelera la corrosión generalizada", "Por debajo del 10%, porque la ausencia de humedad concentra las sales en la capa pasiva", "El riesgo de SCC es independiente de la humedad relativa; solo depende de la temperatura"], "co": "a", "fc": "Correcto. El Anexo II UIAA indica que el rango de 20%-70% de humedad relativa es el más peligroso para el SCC: el ambiente no está lo suficientemente húmedo para diluir los cloruros, ni lo suficientemente seco para impedir su deposición, lo que favorece la formación de depósitos concentrados sobre el anclaje.", "fw": "Incorrecto. Respuesta correcta: A. La zona de mayor riesgo de SCC es la humedad relativa intermedia (20-70%). Ambos extremos —muy seco o casi saturado— son menos peligrosos porque o no hay depósito de cloruros o estos quedan muy diluidos."}, {"id": 7, "bl": "T4", "la": "Tema 4", "tx": "El marcado CE en un anclaje para roca indica que:", "op": ["El anclaje ha sido fabricado en un país miembro de la Unión Europea", "El anclaje cumple los requisitos esenciales de la normativa europea aplicable y puede comercializarse libremente en el Espacio Económico Europeo", "El anclaje ha sido certificado específicamente por ENAC para su uso en escalada deportiva", "El anclaje ha superado las pruebas más exigentes de la UIAA incluyendo la clase SCC"], "co": "b", "fc": "Correcto. El marcado CE declara que el producto cumple los requisitos esenciales de las directivas europeas aplicables, permitiendo su libre comercialización en el EEE. No implica que sea fabricado en Europa ni que haya superado las pruebas UIAA.", "fw": "Incorrecto. Respuesta correcta: B. El marcado CE es una declaración de conformidad con las directivas europeas; no indica origen de fabricación ni certificación UIAA."}, {"id": 8, "bl": "T4", "la": "Tema 4", "tx": "La Sikadur 31 es una resina de dos componentes presentada en compartimentos separados. ¿Por qué está desaconsejada para el reequipamiento de barrancos?", "op": ["Porque no fragua a temperaturas por debajo de los 15°C, siendo inutilizable en montaña", "Porque la mezcla manual en proporción 3:1 introduce el factor humano, y si las proporciones no son exactas el fraguado puede ser incorrecto", "Porque no cumple la ETA Opción 1 y por tanto no está homologada para instalaciones con riesgo para vidas humanas", "Porque su tiempo de trabajabilidad es demasiado corto para instalaciones en pared vertical"], "co": "b", "fc": "Correcto. La Sikadur 31 requiere mezcla manual en proporción 3:1, lo que introduce el factor humano: si las proporciones no salen iguales existe riesgo de que la mezcla y el fraguado posterior no sean correctos. Por eso el Tema 5 desaconseja su uso.", "fw": "Incorrecto. Respuesta correcta: B. El problema de la Sikadur 31 es la mezcla manual en proporción 3:1, que depende del operario y puede resultar en un fraguado incorrecto."}, {"id": 9, "bl": "T5", "la": "Tema 5", "tx": "Según el Tema 5, ¿por qué se recomienda no acabar el cartucho de resina hasta el final durante la instalación?", "op": ["Porque el final del cartucho contiene una mayor concentración de catalizador que puede quemar la roca", "Porque la relación de mezcla puede descompensarse al final del cartucho, comprometiendo la calidad del fraguado", "Porque la resina del fondo del cartucho tiene peor trabajabilidad al estar más fría", "Es solo una recomendación económica para aprovechar mejor el cartucho en la siguiente jornada"], "co": "b", "fc": "Correcto. Al final del cartucho la proporción de los dos componentes puede descompensarse, alterando la relación de mezcla y comprometiendo la calidad del fraguado. El Tema 5 recomienda no apurar el cartucho hasta el final por esta razón técnica.", "fw": "Incorrecto. Respuesta correcta: B. Al final del cartucho la relación de mezcla puede descompensarse y el fraguado resultante ser deficiente."}, {"id": 10, "bl": "T6", "la": "Tema 6", "tx": "¿Por qué el Tema 6 recomienda instalar los anclajes de cabecera lo más alto posible respecto al borde del rápel?", "op": ["Para que el reequipador pueda alcanzarlos más fácilmente desde la pared en futuras revisiones", "Para favorecer la recuperación de la cuerda, minimizar los roces y evitar el factor de caída 2", "Para reducir el efecto de la corrosión al alejar los anclajes del activo (vena de agua)", "Para cumplir con la distancia mínima al borde exigida por la norma UNE-EN 959:2018"], "co": "b", "fc": "Correcto. El Tema 6 indica que los anclajes deben instalarse lo más alto posible por tres razones: favorece la recuperación de la cuerda desde la base, minimiza los roces y, lo más importante, evita el factor de caída 2, que ocurre cuando nos anclamos a la cabecera y caemos antes de iniciar el rápel.", "fw": "Incorrecto. Respuesta correcta: B. La altura de instalación busca facilitar la recuperación de la cuerda, minimizar roces y evitar el factor de caída 2."}];
const ans={},ver=new Set();
function build(){const c=document.getElementById('quiz');Q.forEach(q=>{const d=document.createElement('div');d.className='qcard';
d.innerHTML=`<div class="qmeta"><span class="qnum">Pregunta ${q.id}</span><span class="qbadge">${q.la}</span></div>`+
`<div class="qtxt">${q.tx}</div><div class="opts" id="o${q.id}">`+
q.op.map((t,i)=>`<button class="opt" data-v="${'abcd'[i]}" onclick="pick(${q.id},'${'abcd'[i]}')"><span class="olet">${'ABCD'[i]}</span>${t}</button>`).join('')+
`</div><div class="fb" id="f${q.id}"></div><button class="chk-btn" id="b${q.id}" onclick="check(${q.id})">▶ Comprobar</button>`;
document.getElementById('quiz').appendChild(d);});}
function pick(id,v){if(ver.has(id))return;document.querySelectorAll(`#o${id} .opt`).forEach(o=>o.classList.remove('sel'));document.querySelector(`#o${id} [data-v="${v}"]`).classList.add('sel');ans[id]=v;prog();}
function check(id){if(ver.has(id))return;if(!ans[id]){document.getElementById('warn').textContent='⚠ Selecciona una opción primero.';return;}document.getElementById('warn').textContent='';
ver.add(id);const q=Q.find(x=>x.id===id);const ok=ans[id]===q.co;
document.querySelectorAll(`#o${id} .opt`).forEach(o=>{o.classList.add('dis');if(o.dataset.v===q.co)o.classList.add('ok');else if(o.dataset.v===ans[id]&&!ok)o.classList.add('ng');});
const f=document.getElementById('f'+id);f.className='fb '+(ok?'ok':'ng');f.textContent=(ok?'✓ ':'✗ ')+(ok?q.fc:q.fw);
const b=document.getElementById('b'+id);b.disabled=true;b.textContent=ok?'✓ Correcto':'✗ Incorrecto';}
function prog(){const d=Object.keys(ans).length,p=Math.round(d/Q.length*100);
document.getElementById('pp').textContent=`${d}/${Q.length} respondidas`;document.getElementById('pf').style.width=p+'%';}
function submit(){const un=Q.filter(q=>!ans[q.id]);document.getElementById('warn').textContent=un.length?`⚠ ${un.length} pregunta(s) sin responder.`:'';
Q.forEach(q=>{if(!ver.has(q.id)&&ans[q.id])check(q.id);});
let tot=0;const bk={};Q.forEach(q=>{const ok=ans[q.id]===q.co;if(ok)tot++;bk[q.la]=bk[q.la]||[0,0];bk[q.la][1]++;if(ok)bk[q.la][0]++;});
const p=Math.round(tot/Q.length*100);document.getElementById('rscore').textContent=`${tot}/${Q.length}`;document.getElementById('rpct').textContent=`${p}% de respuestas correctas`;
const r=['❗ Necesitas repasar','📖 Suficiente','📚 Bien','👍 Notable','🏆 Sobresaliente'];
document.getElementById('rrat').textContent=r[p>=90?4:p>=75?3:p>=60?2:p>=50?1:0];
document.getElementById('rgrid').innerHTML=Object.entries(bk).map(([k,[c,t]])=>`<div class="res-cell"><div class="res-cell-n">${k}</div><div class="res-cell-v">${c}/${t}</div></div>`).join('');
document.getElementById('results').style.display='block';document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});}
function restart(){Object.keys(ans).forEach(k=>delete ans[k]);ver.clear();document.querySelectorAll('.opt').forEach(o=>o.className='opt');document.querySelectorAll('.fb').forEach(f=>{f.className='fb';f.textContent='';});document.querySelectorAll('.chk-btn').forEach(b=>{b.disabled=false;b.textContent='▶ Comprobar';});document.getElementById('warn').textContent='';document.getElementById('results').style.display='none';prog();window.scrollTo({top:0,behavior:'smooth'});}
build();prog();
</script>
</body>
</html>
