<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Evaluación Mixta IV — Reequipamiento de Barrancos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.topbar{background:#374151;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.topbar h1{color:#fff;font-size:1.05rem;font-weight:700;line-height:1.2}
.topbar a{color:rgba(255,255,255,.8);font-size:.78rem;text-decoration:none;background:rgba(255,255,255,.15);padding:.35rem .8rem;border-radius:6px;white-space:nowrap}
.topbar a:hover{background:rgba(255,255,255,.25)}
.topbar-sub{color:rgba(255,255,255,.7);font-size:.75rem}
.prog-bar{background:rgba(255,255,255,.25);height:5px}
.prog-fill{height:100%;background:#fff;transition:width .4s;width:0%}
.wrap{max-width:780px;margin:0 auto;padding:1.5rem 1rem 5rem}
.stat-row{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:.65rem 1rem;font-size:.8rem;color:#64748b;flex:1;min-width:110px}
.stat strong{display:block;font-size:1.3rem;font-weight:700;color:#1e293b;line-height:1}
.qcard{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.4rem;margin-bottom:1rem;border-top:3px solid #374151}
.qmeta{display:flex;align-items:center;gap:.6rem;margin-bottom:.7rem;flex-wrap:wrap}
.qnum{font-size:.72rem;font-weight:600;color:#374151;background:#f9fafb;padding:.2rem .55rem;border-radius:4px}
.qbadge{font-size:.68rem;color:#64748b;background:#f1f5f9;padding:.2rem .55rem;border-radius:4px}
.qtxt{font-size:.95rem;line-height:1.65;color:#1e293b;margin-bottom:1rem}
.opts{display:flex;flex-direction:column;gap:.4rem}
.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.65rem .9rem;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:.87rem;line-height:1.5;text-align:left;color:#1e293b;width:100%;transition:all .12s}
.opt:hover:not(.dis){background:#f9fafb;border-color:#374151}
.opt.sel{background:#f9fafb;border-color:#374151;color:#1e293b}
.opt.ok{background:#dcfce7;border-color:#16a34a;color:#15803d;font-weight:500}
.opt.ng{background:#fee2e2;border-color:#dc2626;color:#374151}
.opt.dis{cursor:default}
.olet{font-weight:700;font-size:.75rem;opacity:.5;flex-shrink:0;padding-top:.05rem;min-width:1rem}
.fb{display:none;margin-top:.75rem;padding:.75rem 1rem;border-radius:8px;font-size:.82rem;line-height:1.6;border-left:3px solid}
.fb.ok{background:#f0fdf4;border-color:#16a34a;color:#15803d;display:block}
.fb.ng{background:#f9fafb;border-color:#dc2626;color:#374151;display:block}
.chk-btn{margin-top:.8rem;display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1.1rem;border:1.5px solid #374151;color:#374151;background:transparent;border-radius:7px;font-size:.73rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.chk-btn:hover:not(:disabled){background:#374151;color:#fff}
.chk-btn:disabled{opacity:.3;cursor:default}
.actions{text-align:center;padding:2rem 0;border-top:1px solid #e2e8f0;margin-top:.5rem}
.warn{font-size:.75rem;color:#d97706;margin-bottom:.75rem;min-height:1em;font-weight:500}
.submit-btn{padding:.8rem 2.2rem;background:#374151;color:#fff;border:none;border-radius:9px;font-size:.82rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:opacity .12s}
.submit-btn:hover{opacity:.88}
#results{display:none;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:2.5rem 2rem;text-align:center;margin-top:1.5rem}
.res-score{font-size:4.5rem;font-weight:800;color:#374151;line-height:1}
.res-pct{font-size:.9rem;color:#64748b;margin:.3rem 0 1.2rem}
.res-rat{display:inline-block;padding:.4rem 1.2rem;background:#f9fafb;color:#374151;border-radius:20px;font-weight:700;font-size:.95rem;margin-bottom:1.5rem}
.res-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.6rem;margin:1rem 0 1.5rem;text-align:left}
.res-cell{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:.65rem}
.res-cell-n{font-size:.58rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem}
.res-cell-v{font-size:1.5rem;font-weight:800;color:#1e293b}
.restart-btn{padding:.7rem 1.8rem;border:1.5px solid #374151;color:#374151;background:transparent;border-radius:8px;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.restart-btn:hover{background:#374151;color:#fff}
@media(max-width:580px){.wrap{padding:1rem .75rem 4rem}.qcard{padding:1.1rem}.res-score{font-size:3.5rem}}
</style>
</head>
<body>
<div class="topbar" style="background:#374151">
  <div>
    <div class="topbar-sub">Curso de Reequipamiento de Barrancos</div>
    <h1>Evaluación Mixta IV</h1>
  </div>
  <a href="index.html">← Índice</a>
</div>
<div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
<div class="wrap">
  <div class="stat-row">
    <div class="stat"><strong id="pp">0/10</strong>Respondidas</div>
    <div class="stat"><strong>10</strong>Preguntas</div>
    <div class="stat"><strong style="font-size:.9rem;color:#64748b">Responsabilidad · Normativa · TD Barrancos</strong></div>
  </div>
  <div id="quiz"></div>
  <div class="actions">
    <div class="warn" id="warn"></div>
    <button class="submit-btn" onclick="submit()">Finalizar y ver resultados →</button>
  </div>
  <div id="results">
    <div class="res-score" id="rscore"></div>
    <div class="res-pct" id="rpct"></div>
    <div class="res-rat" id="rrat"></div>
    <div class="res-grid" id="rgrid"></div>
    <button class="restart-btn" onclick="restart()">↺ Repetir</button>
  </div>
</div>
<script>
const Q=[{"id": 1, "bl": "T1", "la": "Tema 1", "tx": "La FEDME (Federación Española de Deportes de Montaña y Escalada) tiene como objetivo, en su punto 2.4 de Estatutos, relacionado con el reequipamiento:", "op": ["Certificar la resistencia de los anclajes fabricados por empresas nacionales", "Trabajar y colaborar en la protección del medio natural con el objetivo prioritario de preservarlo y facilitar el acceso al mismo para la práctica deportiva", "Gestionar el Registro Nacional de Reequipadores y expedir las titulaciones de TD Barrancos", "Homologar los materiales de reequipamiento antes de su comercialización en España"], "co": "b", "fc": "Correcto. El punto 2.4 de los Estatutos de la FEDME establece que su actividad busca trabajar y colaborar en la protección del medio natural con el objetivo de preservarlo de acciones que modifiquen su estado y facilitar el acceso al mismo para la práctica deportiva.", "fw": "Incorrecto. Respuesta correcta: B. La FEDME trabaja en la protección del medio natural y facilita el acceso para la práctica deportiva; no certifica materiales ni gestiona el registro de reequipadores."}, {"id": 2, "bl": "T1", "la": "Tema 1", "tx": "El art. 43.3 de la Constitución Española establece que los poderes públicos fomentarán:", "op": ["La defensa de consumidores y usuarios protegiéndoles de instalaciones peligrosas", "La educación sanitaria, la educación física y el deporte, facilitando la adecuada utilización del ocio", "La protección del medio ambiente sancionando a quienes lo deterioren", "Las competencias exclusivas del Estado sobre legislación básica medioambiental"], "co": "b", "fc": "Correcto. El art. 43.3 CE establece que los poderes públicos fomentarán la educación sanitaria, la educación física y el deporte. Asimismo, facilitarán la adecuada utilización del ocio.", "fw": "Incorrecto. Respuesta correcta: B — art. 43.3 CE fomenta la educación física, el deporte y el ocio. El art. 51 protege consumidores; el art. 45 protege el medioambiente."}, {"id": 3, "bl": "T2", "la": "Tema 2", "tx": "Las rocas ígneas intrusivas (plutónicas) como el granito se forman cuando:", "op": ["La lava se enfría rápidamente en la superficie dando lugar a cristales muy pequeños", "El magma se enfría lentamente en el interior de la Tierra, permitiendo la formación de cristales grandes y visibles", "Los sedimentos se acumulan y compactan en el fondo de mares o ríos", "Rocas preexistentes son sometidas a alta presión y temperatura sin llegar a fundirse"], "co": "b", "fc": "Correcto. Las rocas ígneas intrusivas se forman cuando el magma se enfría lentamente en el interior de la Tierra. El enfriamiento lento permite la migración de iones y la formación de cristales grandes, como los que se pueden apreciar a simple vista en el granito.", "fw": "Incorrecto. Respuesta correcta: B. El enfriamiento lento en el interior produce cristales grandes (intrusivas). El enfriamiento rápido en superficie produce cristales pequeños (extrusivas)."}, {"id": 4, "bl": "T2", "la": "Tema 2", "tx": "Desde el punto de vista del reequipamiento, la caliza y la dolomita presentan un riesgo adicional de corrosión en los anclajes de acero inoxidable porque:", "op": ["Son rocas muy porosas que absorben el agua y favorecen el óxido generalizado", "Contienen iones calcio y magnesio que pueden promover la corrosión bajo tensión (SCC) en los anclajes", "Son rocas blandas que no sujetan bien el anclaje, generando micro-movimientos que dañan la capa pasiva", "Al ser sedimentarias tienen estratos que crean corrientes galvánicas con el metal del anclaje"], "co": "b", "fc": "Correcto. El Anexo II UIAA señala que la caliza y la dolomita (karst) son entornos especialmente agresivos porque la roca misma puede contener iones de calcio y magnesio que, junto con la humedad, promueven la corrosión bajo tensión en los anclajes.", "fw": "Incorrecto. Respuesta correcta: B. La caliza y dolomita contienen iones que promueven el SCC. Por eso en estos entornos se recomienda titanio o acero inoxidable de alta resistencia a la corrosión."}, {"id": 5, "bl": "T3", "la": "Tema 3", "tx": "Los aceros inoxidables martensíticos (AISI 410, 420) se caracterizan por:", "op": ["Tener Cr y Ni, ser no magnéticos y ser los más usados en anclajes de exterior", "Tener Cr del 10,5 al 18%, alta dureza por su contenido en carbono, y NO utilizarse para fabricar anclajes", "Tener alta resistencia a la corrosión en ambientes marinos y usarse en zonas costeras", "Ser aceros dúplex con estructura mixta austenítica-ferrítica de alta resistencia mecánica"], "co": "b", "fc": "Correcto. Los martensíticos tienen Cr del 10,5 al 18% y alto contenido en carbono (hasta 1,2%), lo que les confiere alta dureza pero moderada resistencia a la corrosión. No se utilizan para fabricar anclajes de escalada o barrancos.", "fw": "Incorrecto. Respuesta correcta: B. Los martensíticos son duros pero de moderada resistencia a la corrosión; no se usan para anclajes. Los austeníticos (316L, 304) sí se usan."}, {"id": 6, "bl": "T3", "la": "Tema 3", "tx": "La 'capa pasiva' del acero inoxidable es una delgada película de óxido de cromo (Cr₂O₃) que se forma en contacto con el oxígeno del aire. Su característica más importante es que:", "op": ["Es muy gruesa y visible, lo que permite detectar visualmente su deterioro antes de que el metal se corroa", "Es auto-reparable en presencia de oxígeno si sufre un daño mecánico o químico leve", "Es permanente y no puede romperse bajo ninguna circunstancia en entorno marino", "Solo se forma en los aceros con más del 20% de cromo en su composición"], "co": "b", "fc": "Correcto. La capa pasiva es transparente y muy fina, pero tiene la propiedad de ser auto-reparable: si sufre un daño leve (mecánico o químico), vuelve a formarse en presencia de oxígeno. Esta propiedad es la que confiere su resistencia a la corrosión al inoxidable.", "fw": "Incorrecto. Respuesta correcta: B. La capa pasiva es transparente y auto-reparable en presencia de oxígeno. Sí puede romperse (cloruros, SCC); y se forma con un mínimo del 10,5% de Cr."}, {"id": 7, "bl": "T4", "la": "Tema 4", "tx": "¿Cuál es el principal inconveniente de las resinas epoxi frente a las viniléster para instalaciones en zonas de montaña con temperaturas muy bajas?", "op": ["Las epoxi tienen mayor retracción y pueden soltar el anclaje al contraerse con el frío", "Las epoxi son inadecuadas para bajas temperaturas; su tiempo de trabajabilidad se alarga tanto que el fraguado puede ser incompleto", "Las epoxi son más costosas y de difícil suministro en zonas remotas de alta montaña", "Las epoxi no adhieren correctamente al acero inoxidable por debajo de los 10°C"], "co": "b", "fc": "Correcto. Las resinas epoxi son inadecuadas para bajas temperaturas: el frío alarga enormemente su tiempo de trabajabilidad y puede impedir un fraguado correcto. En zonas frías y alta montaña se prefieren las viniléster, que son perfectas para esas condiciones.", "fw": "Incorrecto. Respuesta correcta: B. Las epoxi no fraguan bien a bajas temperaturas. Las viniléster están diseñadas precisamente para zonas frías y alta montaña."}, {"id": 8, "bl": "T4", "la": "Tema 4", "tx": "La norma de referencia UNE-EN 959:2021 se aplica a:", "op": ["Equipos de protección individual contra caídas: arneses y conectores", "Equipos de alpinismo y escalada: anclajes para roca, requisitos de seguridad y métodos de ensayo", "Dispositivos de anclaje utilizados como EPI contra caídas en trabajos en altura", "Resinas y adhesivos para la fijación de anclajes en soportes de hormigón y roca"], "co": "b", "fc": "Correcto. La UNE-EN 959:2021 regula específicamente los equipos de alpinismo y escalada — anclajes para roca — estableciendo los requisitos de seguridad y métodos de ensayo para los anclajes usados en el aseguramiento.", "fw": "Incorrecto. Respuesta correcta: B. La UNE-EN 959 regula los anclajes para roca. La UNE-EN 795 regula los EPI contra caídas; los arneses tienen su propia normativa."}, {"id": 9, "bl": "T5", "la": "Tema 5", "tx": "¿Qué significa que un anclaje autorroscante 'no permite reutilizar el agujero con un modelo de anclaje diferente' al que lo creó?", "op": ["Que el agujero queda dañado y hay que rellenarlo con resina antes de reutilizarlo", "Que cada marca diseña su propio paso de rosca, y la matriz interna creada en la roca solo encaja con el mismo modelo; para otro modelo habría que perforar con broca de mayor diámetro", "Que la normativa UNE-EN 959 prohíbe reutilizar agujeros por razones de seguridad", "Que los agujeros de autorroscantes son siempre de diámetro único y no admiten anclajes de otras medidas"], "co": "b", "fc": "Correcto. Cada fabricante diseña un paso de rosca propio, de modo que la matriz interna grabada en la roca solo encaja con el mismo modelo. Para instalar un anclaje diferente en ese agujero habría que ampliarlo con una broca de mayor diámetro.", "fw": "Incorrecto. Respuesta correcta: B. El paso de rosca es exclusivo de cada modelo/fabricante. Para otro modelo hay que reperforar con broca mayor."}, {"id": 10, "bl": "T6", "la": "Tema 6", "tx": "El sobreequipamiento en barrancos está desaconsejado porque:", "op": ["Aumenta excesivamente el coste del reequipamiento sin mejora real de la seguridad", "Implica instalar más anclajes metálicos de los necesarios, aumentando el impacto medioambiental sin reducir la seguridad", "Hace más difícil la recuperación de la cuerda al haber más puntos de roce", "Incumple la norma UNE-EN 959:2018 que limita el número máximo de anclajes por cabecera"], "co": "b", "fc": "Correcto. El Tema 6 indica que hay que velar por el mínimo impacto medioambiental sin reducir la seguridad. El sobreequipamiento instala más anclajes metálicos de los necesarios, aumentando el impacto visual y ambiental sin aportar mayor seguridad.", "fw": "Incorrecto. Respuesta correcta: B. El sobreequipamiento aumenta el impacto medioambiental innecesariamente. La norma no limita el número de anclajes; es un criterio de buena práctica."}];
const ans={},ver=new Set();
function build(){const c=document.getElementById('quiz');Q.forEach(q=>{const d=document.createElement('div');d.className='qcard';
d.innerHTML=`<div class="qmeta"><span class="qnum">Pregunta ${q.id}</span><span class="qbadge">${q.la}</span></div>`+
`<div class="qtxt">${q.tx}</div><div class="opts" id="o${q.id}">`+
q.op.map((t,i)=>`<button class="opt" data-v="${'abcd'[i]}" onclick="pick(${q.id},'${'abcd'[i]}')"><span class="olet">${'ABCD'[i]}</span>${t}</button>`).join('')+
`</div><div class="fb" id="f${q.id}"></div><button class="chk-btn" id="b${q.id}" onclick="check(${q.id})">▶ Comprobar</button>`;
document.getElementById('quiz').appendChild(d);});}
function pick(id,v){if(ver.has(id))return;document.querySelectorAll(`#o${id} .opt`).forEach(o=>o.classList.remove('sel'));document.querySelector(`#o${id} [data-v="${v}"]`).classList.add('sel');ans[id]=v;prog();}
function check(id){if(ver.has(id))return;if(!ans[id]){document.getElementById('warn').textContent='⚠ Selecciona una opción primero.';return;}document.getElementById('warn').textContent='';
ver.add(id);const q=Q.find(x=>x.id===id);const ok=ans[id]===q.co;
document.querySelectorAll(`#o${id} .opt`).forEach(o=>{o.classList.add('dis');if(o.dataset.v===q.co)o.classList.add('ok');else if(o.dataset.v===ans[id]&&!ok)o.classList.add('ng');});
const f=document.getElementById('f'+id);f.className='fb '+(ok?'ok':'ng');f.textContent=(ok?'✓ ':'✗ ')+(ok?q.fc:q.fw);
const b=document.getElementById('b'+id);b.disabled=true;b.textContent=ok?'✓ Correcto':'✗ Incorrecto';}
function prog(){const d=Object.keys(ans).length,p=Math.round(d/Q.length*100);
document.getElementById('pp').textContent=`${d}/${Q.length} respondidas`;document.getElementById('pf').style.width=p+'%';}
function submit(){const un=Q.filter(q=>!ans[q.id]);document.getElementById('warn').textContent=un.length?`⚠ ${un.length} pregunta(s) sin responder.`:'';
Q.forEach(q=>{if(!ver.has(q.id)&&ans[q.id])check(q.id);});
let tot=0;const bk={};Q.forEach(q=>{const ok=ans[q.id]===q.co;if(ok)tot++;bk[q.la]=bk[q.la]||[0,0];bk[q.la][1]++;if(ok)bk[q.la][0]++;});
const p=Math.round(tot/Q.length*100);document.getElementById('rscore').textContent=`${tot}/${Q.length}`;document.getElementById('rpct').textContent=`${p}% de respuestas correctas`;
const r=['❗ Necesitas repasar','📖 Suficiente','📚 Bien','👍 Notable','🏆 Sobresaliente'];
document.getElementById('rrat').textContent=r[p>=90?4:p>=75?3:p>=60?2:p>=50?1:0];
document.getElementById('rgrid').innerHTML=Object.entries(bk).map(([k,[c,t]])=>`<div class="res-cell"><div class="res-cell-n">${k}</div><div class="res-cell-v">${c}/${t}</div></div>`).join('');
document.getElementById('results').style.display='block';document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});}
function restart(){Object.keys(ans).forEach(k=>delete ans[k]);ver.clear();document.querySelectorAll('.opt').forEach(o=>o.className='opt');document.querySelectorAll('.fb').forEach(f=>{f.className='fb';f.textContent='';});document.querySelectorAll('.chk-btn').forEach(b=>{b.disabled=false;b.textContent='▶ Comprobar';});document.getElementById('warn').textContent='';document.getElementById('results').style.display='none';prog();window.scrollTo({top:0,behavior:'smooth'});}
build();prog();
</script>
</body>
</html>
