<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Evaluación Mixta III — Reequipamiento de Barrancos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.topbar{background:#374151;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.topbar h1{color:#fff;font-size:1.05rem;font-weight:700;line-height:1.2}
.topbar a{color:rgba(255,255,255,.8);font-size:.78rem;text-decoration:none;background:rgba(255,255,255,.15);padding:.35rem .8rem;border-radius:6px;white-space:nowrap}
.topbar a:hover{background:rgba(255,255,255,.25)}
.topbar-sub{color:rgba(255,255,255,.7);font-size:.75rem}
.prog-bar{background:rgba(255,255,255,.25);height:5px}
.prog-fill{height:100%;background:#fff;transition:width .4s;width:0%}
.wrap{max-width:780px;margin:0 auto;padding:1.5rem 1rem 5rem}
.stat-row{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:.65rem 1rem;font-size:.8rem;color:#64748b;flex:1;min-width:110px}
.stat strong{display:block;font-size:1.3rem;font-weight:700;color:#1e293b;line-height:1}
.qcard{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.4rem;margin-bottom:1rem;border-top:3px solid #374151}
.qmeta{display:flex;align-items:center;gap:.6rem;margin-bottom:.7rem;flex-wrap:wrap}
.qnum{font-size:.72rem;font-weight:600;color:#374151;background:#f9fafb;padding:.2rem .55rem;border-radius:4px}
.qbadge{font-size:.68rem;color:#64748b;background:#f1f5f9;padding:.2rem .55rem;border-radius:4px}
.qtxt{font-size:.95rem;line-height:1.65;color:#1e293b;margin-bottom:1rem}
.opts{display:flex;flex-direction:column;gap:.4rem}
.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.65rem .9rem;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:.87rem;line-height:1.5;text-align:left;color:#1e293b;width:100%;transition:all .12s}
.opt:hover:not(.dis){background:#f9fafb;border-color:#374151}
.opt.sel{background:#f9fafb;border-color:#374151;color:#1e293b}
.opt.ok{background:#dcfce7;border-color:#16a34a;color:#15803d;font-weight:500}
.opt.ng{background:#fee2e2;border-color:#dc2626;color:#374151}
.opt.dis{cursor:default}
.olet{font-weight:700;font-size:.75rem;opacity:.5;flex-shrink:0;padding-top:.05rem;min-width:1rem}
.fb{display:none;margin-top:.75rem;padding:.75rem 1rem;border-radius:8px;font-size:.82rem;line-height:1.6;border-left:3px solid}
.fb.ok{background:#f0fdf4;border-color:#16a34a;color:#15803d;display:block}
.fb.ng{background:#f9fafb;border-color:#dc2626;color:#374151;display:block}
.chk-btn{margin-top:.8rem;display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1.1rem;border:1.5px solid #374151;color:#374151;background:transparent;border-radius:7px;font-size:.73rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.chk-btn:hover:not(:disabled){background:#374151;color:#fff}
.chk-btn:disabled{opacity:.3;cursor:default}
.actions{text-align:center;padding:2rem 0;border-top:1px solid #e2e8f0;margin-top:.5rem}
.warn{font-size:.75rem;color:#d97706;margin-bottom:.75rem;min-height:1em;font-weight:500}
.submit-btn{padding:.8rem 2.2rem;background:#374151;color:#fff;border:none;border-radius:9px;font-size:.82rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:opacity .12s}
.submit-btn:hover{opacity:.88}
#results{display:none;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:2.5rem 2rem;text-align:center;margin-top:1.5rem}
.res-score{font-size:4.5rem;font-weight:800;color:#374151;line-height:1}
.res-pct{font-size:.9rem;color:#64748b;margin:.3rem 0 1.2rem}
.res-rat{display:inline-block;padding:.4rem 1.2rem;background:#f9fafb;color:#374151;border-radius:20px;font-weight:700;font-size:.95rem;margin-bottom:1.5rem}
.res-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.6rem;margin:1rem 0 1.5rem;text-align:left}
.res-cell{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:.65rem}
.res-cell-n{font-size:.58rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem}
.res-cell-v{font-size:1.5rem;font-weight:800;color:#1e293b}
.restart-btn{padding:.7rem 1.8rem;border:1.5px solid #374151;color:#374151;background:transparent;border-radius:8px;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.restart-btn:hover{background:#374151;color:#fff}
@media(max-width:580px){.wrap{padding:1rem .75rem 4rem}.qcard{padding:1.1rem}.res-score{font-size:3.5rem}}
</style>
</head>
<body>
<div class="topbar" style="background:#374151">
  <div>
    <div class="topbar-sub">Curso de instalación de anclajes en barrancos</div>
    <h1>Evaluación Mixta III</h1>
  </div>
  <a href="index.html">← Índice</a>
</div>
<div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
<div class="wrap">
  <div class="stat-row">
    <div class="stat"><strong id="pp">0/10</strong>Respondidas</div>
    <div class="stat"><strong>10</strong>Preguntas</div>
    <div class="stat"><strong style="font-size:.9rem;color:#64748b">Todos los temas · 10 preguntas</strong></div>
  </div>
  <div id="quiz"></div>
  <div class="actions">
    <div class="warn" id="warn"></div>
    <button class="submit-btn" onclick="submit()">Finalizar y ver resultados →</button>
  </div>
  <div id="results">
    <div class="res-score" id="rscore"></div>
    <div class="res-pct" id="rpct"></div>
    <div class="res-rat" id="rrat"></div>
    <div class="res-grid" id="rgrid"></div>
    <button class="restart-btn" onclick="restart()">↺ Repetir</button>
  <div style="margin-top:1.5rem">
    <a href="index.html" style="display:inline-flex;align-items:center;gap:.5rem;padding:.7rem 1.8rem;border:1.5px solid #64748b;color:#64748b;border-radius:10px;font-family:inherit;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;text-decoration:none;transition:all .12s" onmouseover="this.style.borderColor='#1e293b';this.style.color='#1e293b'" onmouseout="this.style.borderColor='#64748b';this.style.color='#64748b'">← Volver al índice</a>
  </div>
  </div>
</div>
<script>
const Q=[{"id": 1, "bl": "T1", "la": "Tema 1", "tx": "La Ley 1/2019, de 30 de enero, de la Actividad Física y el Deporte de Canarias (LDC) define el Censo de Instalaciones Deportivas como:", "op": ["Un registro que otorga carácter oficial a las instalaciones deportivas y les confiere personalidad jurídica propia", "Un recuento descriptivo y sistematizado de espacios deportivos, incluidos espacios naturales, que permite planificar inversiones públicas", "Una herramienta exclusiva de las federaciones deportivas para gestionar las licencias de uso de espacios naturales", "Un inventario de accidentes deportivos que sirve de base para determinar la responsabilidad de la Administración"], "co": "b", "fc": "Correcto. La LDC define el CID en su art. 51.2 como un recuento descriptivo y sistematizado de los espacios deportivos, incluidos los espacios naturales, que permite a las administraciones planificar las inversiones públicas en materia deportiva.", "fw": "Incorrecto. Respuesta correcta: B. El CID es un recuento estadístico para planificar inversiones, no un registro que otorga personalidad jurídica ni un inventario de accidentes."}, {"id": 2, "bl": "T1", "la": "Tema 1", "tx": "El comodato, regulado en el art. 1741 del Código Civil, es un contrato que se caracteriza porque:", "op": ["Obliga a una de las partes a dar a la otra el goce o uso de una cosa por tiempo determinado y precio cierto", "Es un préstamo gratuito de cosa no fungible; el comodante conserva la propiedad y el comodatario adquiere solo el uso", "Transfiere la propiedad del bien al comodatario mientras dure el contrato", "Requiere siempre intervención notarial para ser válido frente a terceros"], "co": "b", "fc": "Correcto. El comodato es un préstamo gratuito de cosa no fungible según el art. 1741 CC: el comodante conserva la propiedad y el comodatario adquiere solo el uso. Si hay contraprestación económica, la convención deja de ser comodato.", "fw": "Incorrecto. Respuesta correcta: B. El comodato es gratuito; si hay precio es arrendamiento. El comodante siempre conserva la propiedad."}, {"id": 3, "bl": "T2", "la": "Tema 2", "tx": "Las calizas son rocas sedimentarias formadas principalmente por:", "op": ["Fragmentos de cuarzo y feldespato transportados por el viento y depositados en capas", "Carbonato de calcio, tanto por procesos orgánicos (restos de conchas) como inorgánicos (precipitación)", "La solidificación de magma basáltico en el fondo oceánico", "Arcillas compactadas sometidas a alta presión tectónica"], "co": "b", "fc": "Correcto. Las calizas son rocas sedimentarias químicas formadas principalmente por carbonato de calcio (CaCO₃), que puede tener origen orgánico (acumulación de conchas y esqueletos de organismos) o inorgánico (precipitación química).", "fw": "Incorrecto. Respuesta correcta: B. Las calizas están formadas por carbonato de calcio, de origen orgánico o inorgánico. No son rocas ígneas ni metamórficas."}, {"id": 4, "bl": "T2", "la": "Tema 2", "tx": "Para instalar anclajes en roca muy frágil (resistencia a compresión < 20 MPa), la recomendación del temario es:", "op": ["Usar anclajes de expansión de mayor diámetro para aumentar la superficie de contacto", "Usar solo anclajes de larga longitud que repartan los esfuerzos a lo largo de toda la fijación", "Desistir de la instalación y optar siempre por anclajes naturales", "Instalar doble número de anclajes de expansión estándar para compensar la baja resistencia"], "co": "b", "fc": "Correcto. En roca muy frágil (< 20 MPa), el Anexo III indica que solo los anclajes de largas longitudes pueden garantizar un buen nivel de seguridad a lo largo del tiempo, al repartir los esfuerzos.", "fw": "Incorrecto. Respuesta correcta: B. En roca muy frágil, los anclajes de expansión están prohibidos; solo los de gran longitud garantizan seguridad."}, {"id": 5, "bl": "T3", "la": "Tema 3", "tx": "El recocido es un tratamiento térmico que persigue principalmente:", "op": ["Aumentar al máximo la dureza y resistencia del acero mediante enfriamiento rápido", "Eliminar tensiones internas y ablandar el material para facilitar su mecanizado posterior", "Conseguir una capa superficial de alta dureza manteniendo un núcleo tenaz", "Refinar la estructura del acero enfriándolo al aire desde temperatura crítica"], "co": "b", "fc": "Correcto. El recocido persigue ablandar el material para poder trabajarlo mejor. Se calienta lentamente y se enfría en el horno, eliminando tensiones internas y mejorando la maquinabilidad.", "fw": "Incorrecto. Respuesta correcta: B. El recocido ablanda el material y elimina tensiones. El temple aumenta la dureza; la cementación endurece la superficie; el normalizado refina la estructura."}, {"id": 6, "bl": "T3", "la": "Tema 3", "tx": "El acero inoxidable austenítico se diferencia del ferrítico principalmente en que:", "op": ["El austenítico contiene más carbono y por eso es más duro y magnético", "El austenítico contiene Cr y Ni, generalmente no es magnético y sí se usa para fabricar anclajes; el ferrítico no contiene Ni y no se usa para anclajes", "El ferrítico tiene mejor resistencia a la corrosión por cloruros que el austenítico", "Ambos tienen la misma composición pero distinta temperatura de fabricación"], "co": "b", "fc": "Correcto. Los austeníticos contienen Cr y Ni, son generalmente no magnéticos y son los más usados en anclajes de escalada y barrancos. Los ferríticos no contienen Ni, son magnéticos y no se usan para fabricar anclajes.", "fw": "Incorrecto. Respuesta correcta: B. La diferencia clave es la presencia de Ni en los austeníticos, su condición no magnética y su uso en anclajes; los ferríticos no se usan para anclajes."}, {"id": 7, "bl": "T4", "la": "Tema 4", "tx": "¿Cuál es la principal ventaja del anclaje químico frente al mecánico de expansión en zonas cercanas al borde del taladro o con mínima distancia entre anclajes?", "op": ["El anclaje químico fragua más rápido y permite carga inmediata", "El anclaje químico no genera fuerza de expansión, siendo apto donde la carga se instala cerca del borde del soporte o con mínima distancia entre ejes", "El anclaje químico es más barato y fácil de instalar en cualquier condición", "El anclaje químico ocupa menos espacio en el taladro al no necesitar expansor"], "co": "b", "fc": "Correcto. La ausencia de fuerza de expansión en los anclajes químicos los hace especialmente aptos para instalaciones cerca del borde del soporte o con mínima distancia entre ejes, donde los expansivos podrían fisurar la roca.", "fw": "Incorrecto. Respuesta correcta: B. La ventaja clave del químico es que no genera fuerza de expansión, siendo adecuado para instalaciones cercanas al borde o entre sí."}, {"id": 8, "bl": "T4", "la": "Tema 4", "tx": "¿Qué ocurre si se instala el sistema de retención directamente en las barras del U-Bolt sin anilla intermedia?", "op": ["La instalación es más resistente al eliminar el eslabón débil de la anilla", "La cuerda desgasta directamente el acero del U-Bolt y existe riesgo de que la cuerda se salga por el gran tamaño de la abertura", "El U-Bolt trabaja mejor a cortante al no haber angulación por la anilla", "No hay diferencia técnica; la anilla es meramente estética"], "co": "b", "fc": "Correcto. Instalar la retención directamente en el U-Bolt sin anilla puede ser peligroso: la cuerda puede salirse por la gran abertura del U, y además produciría desgaste directo sobre el acero sin la protección de la anilla.", "fw": "Incorrecto. Respuesta correcta: B. Sin anilla la cuerda puede salirse del U-Bolt por su gran tamaño y el desgaste recae directamente sobre el acero del anclaje."}, {"id": 9, "bl": "T5", "la": "Tema 5", "tx": "El Esclerómetro o Martillo de Schmidt determina la resistencia a compresión de la roca de forma no destructiva midiendo:", "op": ["La fuerza máxima necesaria para extraer un anclaje de prueba instalado en el soporte", "El rebote de una masa de acero impulsada por un muelle al chocar contra la superficie de la roca", "La velocidad de propagación de ondas sonoras a través del soporte rocoso", "La deformación que sufre la roca al aplicar una presión controlada con un pistón hidráulico"], "co": "b", "fc": "Correcto. El esclerómetro mide el índice de rebote de una masa de acero impulsada por un muelle al golpear la superficie. Este rebote se correlaciona con la dureza superficial y, por extensión, con la resistencia a compresión del soporte.", "fw": "Incorrecto. Respuesta correcta: B. El Martillo Schmidt mide el rebote de una masa contra la superficie, que se correlaciona con la resistencia a compresión."}, {"id": 10, "bl": "T6", "la": "Tema 6", "tx": "En una cabecera de cuerda simple con dos anclajes, el Tema 6 describe la 'situación B' como aquella en la que el anclaje desviador se encuentra por encima del anclaje principal. ¿Por qué esta configuración está desaconsejada?", "op": ["Porque dificulta la recuperación de la cuerda al aumentar el rozamiento sobre el anclaje principal", "Porque el anclaje desviador soporta el 'ángulo crítico de la cuerda', una curva aguda que resta resistencia al material textil de la cuerda", "Porque el anclaje principal queda desplazado lateralmente respecto a la vertical del rápel", "Porque en esa posición el anclaje desviador no puede actuar como reaseguro si falla el principal"], "co": "b", "fc": "Correcto. En la situación B el anclaje desviador soporta el 'ángulo crítico de la cuerda': la cuerda sufre una curva aguda que resta resistencia al material textil, siendo esta configuración desaconsejada por el Tema 6.", "fw": "Incorrecto. Respuesta correcta: B. El problema de la situación B es el 'ángulo crítico de la cuerda' sobre el anclaje desviador: la curva aguda debilita el material textil de la cuerda."}];
const ans={},ver=new Set();
function build(){const c=document.getElementById('quiz');Q.forEach(q=>{const d=document.createElement('div');d.className='qcard';
d.innerHTML=`<div class="qmeta"><span class="qnum">Pregunta ${q.id}</span><span class="qbadge">${q.la}</span></div>`+
`<div class="qtxt">${q.tx}</div><div class="opts" id="o${q.id}">`+
q.op.map((t,i)=>`<button class="opt" data-v="${'abcd'[i]}" onclick="pick(${q.id},'${'abcd'[i]}')"><span class="olet">${'ABCD'[i]}</span>${t}</button>`).join('')+
`</div><div class="fb" id="f${q.id}"></div><button class="chk-btn" id="b${q.id}" onclick="check(${q.id})">▶ Comprobar</button>`;
document.getElementById('quiz').appendChild(d);});}
function pick(id,v){if(ver.has(id))return;document.querySelectorAll(`#o${id} .opt`).forEach(o=>o.classList.remove('sel'));document.querySelector(`#o${id} [data-v="${v}"]`).classList.add('sel');ans[id]=v;prog();}
function check(id){if(ver.has(id))return;if(!ans[id]){document.getElementById('warn').textContent='⚠ Selecciona una opción primero.';return;}document.getElementById('warn').textContent='';
ver.add(id);const q=Q.find(x=>x.id===id);const ok=ans[id]===q.co;
document.querySelectorAll(`#o${id} .opt`).forEach(o=>{o.classList.add('dis');if(o.dataset.v===q.co)o.classList.add('ok');else if(o.dataset.v===ans[id]&&!ok)o.classList.add('ng');});
const f=document.getElementById('f'+id);f.className='fb '+(ok?'ok':'ng');f.textContent=(ok?'✓ ':'✗ ')+(ok?q.fc:q.fw);
const b=document.getElementById('b'+id);b.disabled=true;b.textContent=ok?'✓ Correcto':'✗ Incorrecto';}
function prog(){const d=Object.keys(ans).length,p=Math.round(d/Q.length*100);
document.getElementById('pp').textContent=`${d}/${Q.length} respondidas`;document.getElementById('pf').style.width=p+'%';}
function submit(){const un=Q.filter(q=>!ans[q.id]);document.getElementById('warn').textContent=un.length?`⚠ ${un.length} pregunta(s) sin responder.`:'';
Q.forEach(q=>{if(!ver.has(q.id)&&ans[q.id])check(q.id);});
let tot=0;const bk={};Q.forEach(q=>{const ok=ans[q.id]===q.co;if(ok)tot++;bk[q.la]=bk[q.la]||[0,0];bk[q.la][1]++;if(ok)bk[q.la][0]++;});
const p=Math.round(tot/Q.length*100);document.getElementById('rscore').textContent=`${tot}/${Q.length}`;document.getElementById('rpct').textContent=`${p}% de respuestas correctas`;
const r=['❗ Necesitas repasar','📖 Suficiente','📚 Bien','👍 Notable','🏆 Sobresaliente'];
document.getElementById('rrat').textContent=r[p>=90?4:p>=75?3:p>=60?2:p>=50?1:0];
document.getElementById('rgrid').innerHTML=Object.entries(bk).map(([k,[c,t]])=>`<div class="res-cell"><div class="res-cell-n">${k}</div><div class="res-cell-v">${c}/${t}</div></div>`).join('');
document.getElementById('results').style.display='block';document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});}
function restart(){Object.keys(ans).forEach(k=>delete ans[k]);ver.clear();document.querySelectorAll('.opt').forEach(o=>o.className='opt');document.querySelectorAll('.fb').forEach(f=>{f.className='fb';f.textContent='';});document.querySelectorAll('.chk-btn').forEach(b=>{b.disabled=false;b.textContent='▶ Comprobar';});document.getElementById('warn').textContent='';document.getElementById('results').style.display='none';prog();window.scrollTo({top:0,behavior:'smooth'});}
build();prog();
</script>
</body>
</html>
