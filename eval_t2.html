<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tema 2 — Medioambiente y Geología — Reequipamiento de Barrancos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.topbar{background:#1d4ed8;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.topbar h1{color:#fff;font-size:1.05rem;font-weight:700;line-height:1.2}
.topbar a{color:rgba(255,255,255,.8);font-size:.78rem;text-decoration:none;background:rgba(255,255,255,.15);padding:.35rem .8rem;border-radius:6px;white-space:nowrap}
.topbar a:hover{background:rgba(255,255,255,.25)}
.topbar-sub{color:rgba(255,255,255,.7);font-size:.75rem}
.prog-bar{background:rgba(255,255,255,.25);height:5px}
.prog-fill{height:100%;background:#fff;transition:width .4s;width:0%}
.wrap{max-width:780px;margin:0 auto;padding:1.5rem 1rem 5rem}
.stat-row{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:.65rem 1rem;font-size:.8rem;color:#64748b;flex:1;min-width:110px}
.stat strong{display:block;font-size:1.3rem;font-weight:700;color:#1e293b;line-height:1}
.qcard{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.4rem;margin-bottom:1rem;border-top:3px solid #1d4ed8}
.qmeta{display:flex;align-items:center;gap:.6rem;margin-bottom:.7rem;flex-wrap:wrap}
.qnum{font-size:.72rem;font-weight:600;color:#1d4ed8;background:#eff6ff;padding:.2rem .55rem;border-radius:4px}
.qbadge{font-size:.68rem;color:#64748b;background:#f1f5f9;padding:.2rem .55rem;border-radius:4px}
.qtxt{font-size:.95rem;line-height:1.65;color:#1e293b;margin-bottom:1rem}
.opts{display:flex;flex-direction:column;gap:.4rem}
.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.65rem .9rem;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:.87rem;line-height:1.5;text-align:left;color:#1e293b;width:100%;transition:all .12s}
.opt:hover:not(.dis){background:#eff6ff;border-color:#1d4ed8}
.opt.sel{background:#eff6ff;border-color:#1d4ed8;color:#1e293b}
.opt.ok{background:#dcfce7;border-color:#16a34a;color:#15803d;font-weight:500}
.opt.ng{background:#fee2e2;border-color:#dc2626;color:#b91c1c}
.opt.dis{cursor:default}
.olet{font-weight:700;font-size:.75rem;opacity:.5;flex-shrink:0;padding-top:.05rem;min-width:1rem}
.fb{display:none;margin-top:.75rem;padding:.75rem 1rem;border-radius:8px;font-size:.82rem;line-height:1.6;border-left:3px solid}
.fb.ok{background:#f0fdf4;border-color:#16a34a;color:#15803d;display:block}
.fb.ng{background:#fef2f2;border-color:#dc2626;color:#b91c1c;display:block}
.chk-btn{margin-top:.8rem;display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1.1rem;border:1.5px solid #1d4ed8;color:#1d4ed8;background:transparent;border-radius:7px;font-size:.73rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.chk-btn:hover:not(:disabled){background:#1d4ed8;color:#fff}
.chk-btn:disabled{opacity:.3;cursor:default}
.actions{text-align:center;padding:2rem 0;border-top:1px solid #e2e8f0;margin-top:.5rem}
.warn{font-size:.75rem;color:#d97706;margin-bottom:.75rem;min-height:1em;font-weight:500}
.submit-btn{padding:.8rem 2.2rem;background:#1d4ed8;color:#fff;border:none;border-radius:9px;font-size:.82rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:opacity .12s}
.submit-btn:hover{opacity:.88}
#results{display:none;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:2.5rem 2rem;text-align:center;margin-top:1.5rem}
.res-score{font-size:4.5rem;font-weight:800;color:#1d4ed8;line-height:1}
.res-pct{font-size:.9rem;color:#64748b;margin:.3rem 0 1.2rem}
.res-rat{display:inline-block;padding:.4rem 1.2rem;background:#eff6ff;color:#1d4ed8;border-radius:20px;font-weight:700;font-size:.95rem;margin-bottom:1.5rem}
.res-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.6rem;margin:1rem 0 1.5rem;text-align:left}
.res-cell{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:.65rem}
.res-cell-n{font-size:.58rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem}
.res-cell-v{font-size:1.5rem;font-weight:800;color:#1e293b}
.restart-btn{padding:.7rem 1.8rem;border:1.5px solid #1d4ed8;color:#1d4ed8;background:transparent;border-radius:8px;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.restart-btn:hover{background:#1d4ed8;color:#fff}
@media(max-width:580px){.wrap{padding:1rem .75rem 4rem}.qcard{padding:1.1rem}.res-score{font-size:3.5rem}}
</style>
</head>
<body>
<div class="topbar" style="background:#1d4ed8">
  <div>
    <div class="topbar-sub">Curso de Reequipamiento de Barrancos</div>
    <h1>Tema 2 — Medioambiente y Geología</h1>
  </div>
  <a href="index.html">← Índice</a>
</div>
<div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
<div class="wrap">
  <div class="stat-row">
    <div class="stat"><strong id="pp">0/10</strong>Respondidas</div>
    <div class="stat"><strong>10</strong>Preguntas</div>
    <div class="stat"><strong style="font-size:.9rem;color:#64748b">ENP · Red Natura 2000 · Geología</strong></div>
  </div>
  <div id="quiz"></div>
  <div class="actions">
    <div class="warn" id="warn"></div>
    <button class="submit-btn" onclick="submit()">Finalizar y ver resultados →</button>
  </div>
  <div id="results">
    <div class="res-score" id="rscore"></div>
    <div class="res-pct" id="rpct"></div>
    <div class="res-rat" id="rrat"></div>
    <div class="res-grid" id="rgrid"></div>
    <button class="restart-btn" onclick="restart()">↺ Repetir</button>
  </div>
</div>
<script>
const Q=[{"id": 1, "bl": "T2", "la": "Tema 2", "tx": "La Directiva Hábitats (92/43/CEE) y la Directiva Aves forman el eje de la política europea de biodiversidad y son la base de:", "op": ["El Catálogo Español de Especies Amenazadas", "La Red Natura 2000 (ZEC + ZEPA)", "El Convenio de Ramsar sobre zonas húmedas", "El Inventario Español del Patrimonio Natural"], "co": "b", "fc": "Correcto. La Directiva Hábitats y la Directiva Aves son el pilar fundamental de la biodiversidad en la UE y constituyen la base legal de la Red Natura 2000.", "fw": "Incorrecto. La Directiva Hábitats y la Directiva Aves son la base de la Red Natura 2000, compuesta por ZEC y ZEPA."}, {"id": 2, "bl": "T2", "la": "Tema 2", "tx": "La Red Canaria de Espacios Naturales Protegidos se compone de 146 espacios que representan aproximadamente el _____ de la superficie del Archipiélago:", "op": ["20%", "30%", "40%", "55%"], "co": "c", "fc": "Correcto. La Red Canaria de ENP integra 146 espacios que constituyen aproximadamente el 40% de la superficie del Archipiélago Canario.", "fw": "Incorrecto. La Red Canaria de ENP abarca aproximadamente el 40% de la superficie del Archipiélago."}, {"id": 3, "bl": "T2", "la": "Tema 2", "tx": "Según la Ley 4/2010 del Catálogo Canario de Especies Protegidas, las especies 'de interés para los ecosistemas canarios' reciben protección:", "op": ["En todo el territorio canario sin excepción", "Exclusivamente en el ámbito de la Red Canaria de ENP y la Red Natura 2000", "Solo cuando figuran también como vulnerables en el Catálogo Español", "Solo en los Parques Nacionales de Canarias"], "co": "b", "fc": "Correcto. La Ley 4/2010 restringe la protección de las especies 'de interés para los ecosistemas canarios' al ámbito territorial de la Red Canaria de ENP y la Red Natura 2000.", "fw": "Incorrecto. Su protección se circunscribe exclusivamente a los espacios de la Red Canaria de ENP y Red Natura 2000."}, {"id": 4, "bl": "T2", "la": "Tema 2", "tx": "La meteorización física de la roca se diferencia de la química en que:", "op": ["Altera la composición química de los minerales de la roca", "Solo fragmenta mecánicamente la roca sin cambiar su composición química", "Solo actúa en zonas costeras con alta concentración de sales", "Se produce exclusivamente por la acción de organismos vivos"], "co": "b", "fc": "Correcto. La meteorización física solo disgrega mecánicamente la roca (por ciclos hielo-deshielo, variaciones térmicas, etc.) sin alterar la composición química de sus minerales.", "fw": "Incorrecto. La meteorización física fragmenta la roca mecánicamente sin alterar su composición química; la química sí altera los minerales."}, {"id": 5, "bl": "T2", "la": "Tema 2", "tx": "¿Cuál de los siguientes tipos de roca es magmática intrusiva, de grano grueso y especialmente resistente, siendo idónea para anclajes?", "op": ["Caliza", "Arenisca", "Granito", "Yeso"], "co": "c", "fc": "Correcto. El granito es una roca ígnea intrusiva de grano grueso, muy dura y resistente, y una de las más adecuadas para la instalación de anclajes.", "fw": "Incorrecto. El granito es la roca magmática intrusiva de grano grueso más adecuada para anclajes por su dureza y resistencia."}, {"id": 6, "bl": "T2", "la": "Tema 2", "tx": "Según la clasificación del Tema 2, la caliza, la arenisca y la dolomita son rocas de categoría 'frágil' (20-60 MPa). ¿Qué tipo de anclaje está específicamente desaconsejado en este tipo de roca?", "op": ["Anclajes químicos con resina, porque no adhieren bien a rocas porosas", "Anclajes de fuerte expansión como el W-FA/FAZ, porque pueden fisurar o dañar el soporte", "Anclajes autorroscantes, porque la roca no tiene suficiente dureza para crear la rosca interna", "Anclajes de titanio, porque reaccionan químicamente con el carbonato cálcico de la caliza"], "co": "b", "fc": "Correcto. En rocas frágiles, los anclajes de fuerte expansión (como el W-FA/FAZ) están desaconsejados porque pueden fisurar el soporte. Se recomiendan resinas o tornillos que repartan los esfuerzos a lo largo de toda la fijación.", "fw": "Incorrecto. En roca frágil (caliza, arenisca, dolomita) se desaconsejan los anclajes de fuerte expansión. Las resinas son la mejor opción al no generar fuerza de expansión."}, {"id": 7, "bl": "T2", "la": "Tema 2", "tx": "En Canarias, la gestión y administración de los Parques Rurales corresponde a:", "op": ["La Consejería de Medio Ambiente del Gobierno de Canarias", "El Cabildo Insular de la respectiva isla", "El Ayuntamiento del municipio donde se ubica el parque", "El Ministerio para la Transición Ecológica del Estado"], "co": "b", "fc": "Correcto. Según la Ley 4/2017, la administración y gestión de los Parques Rurales corresponde al Cabildo Insular de cada isla.", "fw": "Incorrecto. La gestión de los Parques Rurales en Canarias corresponde al Cabildo Insular correspondiente."}, {"id": 8, "bl": "T2", "la": "Tema 2", "tx": "Las rocas sedimentarias constituyen el 75% de las rocas existentes en el mundo y se forman principalmente por:", "op": ["El enfriamiento lento del magma en el interior de la Tierra, formando cristales grandes", "La acumulación y posterior compactación y cementación de sedimentos procedentes de otras rocas o restos orgánicos transportados por agua o aire", "La transformación de rocas preexistentes por efecto de altas presiones y temperaturas en el interior de la corteza", "La solidificación rápida de la lava en la superficie terrestre tras una erupción volcánica"], "co": "b", "fc": "Correcto. Las rocas sedimentarias se forman por la acumulación de sedimentos (fragmentos de otras rocas, restos orgánicos) que, durante largos períodos, se compactan y cementan formando roca sólida. Son las más abundantes superficialmente.", "fw": "Incorrecto. Las rocas sedimentarias se forman por acumulación, compactación y cementación de sedimentos. El enfriamiento del magma produce ígneas intrusivas; la lava enfriada produce extrusivas; la presión y temperatura producen metamórficas."}, {"id": 9, "bl": "T2", "la": "Tema 2", "tx": "El basalto es una roca magmática extrusiva muy común en Canarias. ¿Cuál es su categoría de resistencia según el Tema 2 y qué implica para la elección de anclajes?", "op": ["Roca muy frágil (< 20 MPa); solo se recomiendan anclajes de gran longitud con resina", "Roca frágil (20-60 MPa); se desaconsejan los anclajes de expansión fuertes", "Roca dura (> 60 MPa); es adecuada tanto para anclajes mecánicos de expansión como para anclajes químicos", "Roca metamórfica de alta resistencia; requiere brocas de diamante para su perforación"], "co": "c", "fc": "Correcto. El basalto es una roca dura (> 60 MPa), junto con el granito y la caliza dura. En roca dura son adecuados los anclajes mecánicos de expansión (W-FA/FAZ) y también los químicos, siendo la opción preferente estos últimos por sus mejores características.", "fw": "Incorrecto. El basalto se clasifica como roca dura (> 60 MPa), lo que lo hace apto para anclajes de expansión y también para anclajes químicos."}, {"id": 10, "bl": "T2", "la": "Tema 2", "tx": "Las rocas metamórficas se originan a partir de rocas preexistentes transformadas por altas presiones y temperaturas en el interior de la corteza. ¿Cuál de las siguientes es un ejemplo de roca metamórfica y qué característica la hace problemática para instalar anclajes?", "op": ["El granito; su grano grueso dificulta la adhesión de la resina en el agujero", "La caliza; su porosidad hace que absorba la resina antes de que fragüe", "La pizarra; su estructura foliada (en capas paralelas) puede provocar la rotura del soporte al aplicar carga", "El basalto; su dureza extrema impide perforarlo con brocas estándar de widia"], "co": "c", "fc": "Correcto. La pizarra es una roca metamórfica foliada típica. Su estructura en capas paralelas (foliación) es su principal debilidad para el reequipamiento: al aplicar carga sobre el anclaje, la roca puede ceder siguiendo los planos de foliación, haciendo la instalación poco fiable.", "fw": "Incorrecto. La pizarra es el ejemplo de roca metamórfica foliada del temario. Su foliación (estructura en capas) es problemática para los anclajes porque la roca puede desplazarse o romperse siguiendo esos planos al recibir carga."}];
const ans={},ver=new Set();
function build(){const c=document.getElementById('quiz');Q.forEach(q=>{const d=document.createElement('div');d.className='qcard';
d.innerHTML=`<div class="qmeta"><span class="qnum">Pregunta ${q.id}</span><span class="qbadge">${q.la}</span></div>`+
`<div class="qtxt">${q.tx}</div><div class="opts" id="o${q.id}">`+
q.op.map((t,i)=>`<button class="opt" data-v="${'abcd'[i]}" onclick="pick(${q.id},'${'abcd'[i]}')"><span class="olet">${'ABCD'[i]}</span>${t}</button>`).join('')+
`</div><div class="fb" id="f${q.id}"></div><button class="chk-btn" id="b${q.id}" onclick="check(${q.id})">▶ Comprobar</button>`;
document.getElementById('quiz').appendChild(d);});}
function pick(id,v){if(ver.has(id))return;document.querySelectorAll(`#o${id} .opt`).forEach(o=>o.classList.remove('sel'));document.querySelector(`#o${id} [data-v="${v}"]`).classList.add('sel');ans[id]=v;prog();}
function check(id){if(ver.has(id))return;if(!ans[id]){document.getElementById('warn').textContent='⚠ Selecciona una opción primero.';return;}document.getElementById('warn').textContent='';
ver.add(id);const q=Q.find(x=>x.id===id);const ok=ans[id]===q.co;
document.querySelectorAll(`#o${id} .opt`).forEach(o=>{o.classList.add('dis');if(o.dataset.v===q.co)o.classList.add('ok');else if(o.dataset.v===ans[id]&&!ok)o.classList.add('ng');});
const f=document.getElementById('f'+id);f.className='fb '+(ok?'ok':'ng');f.textContent=(ok?'✓ ':'✗ ')+(ok?q.fc:q.fw);
const b=document.getElementById('b'+id);b.disabled=true;b.textContent=ok?'✓ Correcto':'✗ Incorrecto';}
function prog(){const d=Object.keys(ans).length,p=Math.round(d/Q.length*100);
document.getElementById('pp').textContent=`${d}/${Q.length} respondidas`;document.getElementById('pf').style.width=p+'%';}
function submit(){const un=Q.filter(q=>!ans[q.id]);document.getElementById('warn').textContent=un.length?`⚠ ${un.length} pregunta(s) sin responder.`:'';
Q.forEach(q=>{if(!ver.has(q.id)&&ans[q.id])check(q.id);});
let tot=0;const bk={};Q.forEach(q=>{const ok=ans[q.id]===q.co;if(ok)tot++;bk[q.la]=bk[q.la]||[0,0];bk[q.la][1]++;if(ok)bk[q.la][0]++;});
const p=Math.round(tot/Q.length*100);document.getElementById('rscore').textContent=`${tot}/${Q.length}`;document.getElementById('rpct').textContent=`${p}% de respuestas correctas`;
const r=['❗ Necesitas repasar','📖 Suficiente','📚 Bien','👍 Notable','🏆 Sobresaliente'];
document.getElementById('rrat').textContent=r[p>=90?4:p>=75?3:p>=60?2:p>=50?1:0];
document.getElementById('rgrid').innerHTML=Object.entries(bk).map(([k,[c,t]])=>`<div class="res-cell"><div class="res-cell-n">${k}</div><div class="res-cell-v">${c}/${t}</div></div>`).join('');
document.getElementById('results').style.display='block';document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});}
function restart(){Object.keys(ans).forEach(k=>delete ans[k]);ver.clear();document.querySelectorAll('.opt').forEach(o=>o.className='opt');document.querySelectorAll('.fb').forEach(f=>{f.className='fb';f.textContent='';});document.querySelectorAll('.chk-btn').forEach(b=>{b.disabled=false;b.textContent='▶ Comprobar';});document.getElementById('warn').textContent='';document.getElementById('results').style.display='none';prog();window.scrollTo({top:0,behavior:'smooth'});}
build();prog();
</script>
</body>
</html>
