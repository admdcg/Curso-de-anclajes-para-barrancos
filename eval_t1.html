<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tema 1 — Fundamentos Jurídicos — Reequipamiento de Barrancos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.topbar{background:#b91c1c;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.topbar h1{color:#fff;font-size:1.05rem;font-weight:700;line-height:1.2}
.topbar a{color:rgba(255,255,255,.8);font-size:.78rem;text-decoration:none;background:rgba(255,255,255,.15);padding:.35rem .8rem;border-radius:6px;white-space:nowrap}
.topbar a:hover{background:rgba(255,255,255,.25)}
.topbar-sub{color:rgba(255,255,255,.7);font-size:.75rem}
.prog-bar{background:rgba(255,255,255,.25);height:5px}
.prog-fill{height:100%;background:#fff;transition:width .4s;width:0%}
.wrap{max-width:780px;margin:0 auto;padding:1.5rem 1rem 5rem}
.stat-row{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:.65rem 1rem;font-size:.8rem;color:#64748b;flex:1;min-width:110px}
.stat strong{display:block;font-size:1.3rem;font-weight:700;color:#1e293b;line-height:1}
.qcard{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.4rem;margin-bottom:1rem;border-top:3px solid #b91c1c}
.qmeta{display:flex;align-items:center;gap:.6rem;margin-bottom:.7rem;flex-wrap:wrap}
.qnum{font-size:.72rem;font-weight:600;color:#b91c1c;background:#fef2f2;padding:.2rem .55rem;border-radius:4px}
.qbadge{font-size:.68rem;color:#64748b;background:#f1f5f9;padding:.2rem .55rem;border-radius:4px}
.qtxt{font-size:.95rem;line-height:1.65;color:#1e293b;margin-bottom:1rem}
.opts{display:flex;flex-direction:column;gap:.4rem}
.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.65rem .9rem;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:.87rem;line-height:1.5;text-align:left;color:#1e293b;width:100%;transition:all .12s}
.opt:hover:not(.dis){background:#fef2f2;border-color:#b91c1c}
.opt.sel{background:#fef2f2;border-color:#b91c1c;color:#1e293b}
.opt.ok{background:#dcfce7;border-color:#16a34a;color:#15803d;font-weight:500}
.opt.ng{background:#fee2e2;border-color:#dc2626;color:#b91c1c}
.opt.dis{cursor:default}
.olet{font-weight:700;font-size:.75rem;opacity:.5;flex-shrink:0;padding-top:.05rem;min-width:1rem}
.fb{display:none;margin-top:.75rem;padding:.75rem 1rem;border-radius:8px;font-size:.82rem;line-height:1.6;border-left:3px solid}
.fb.ok{background:#f0fdf4;border-color:#16a34a;color:#15803d;display:block}
.fb.ng{background:#fef2f2;border-color:#dc2626;color:#b91c1c;display:block}
.chk-btn{margin-top:.8rem;display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1.1rem;border:1.5px solid #b91c1c;color:#b91c1c;background:transparent;border-radius:7px;font-size:.73rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.chk-btn:hover:not(:disabled){background:#b91c1c;color:#fff}
.chk-btn:disabled{opacity:.3;cursor:default}
.actions{text-align:center;padding:2rem 0;border-top:1px solid #e2e8f0;margin-top:.5rem}
.warn{font-size:.75rem;color:#d97706;margin-bottom:.75rem;min-height:1em;font-weight:500}
.submit-btn{padding:.8rem 2.2rem;background:#b91c1c;color:#fff;border:none;border-radius:9px;font-size:.82rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:opacity .12s}
.submit-btn:hover{opacity:.88}
#results{display:none;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:2.5rem 2rem;text-align:center;margin-top:1.5rem}
.res-score{font-size:4.5rem;font-weight:800;color:#b91c1c;line-height:1}
.res-pct{font-size:.9rem;color:#64748b;margin:.3rem 0 1.2rem}
.res-rat{display:inline-block;padding:.4rem 1.2rem;background:#fef2f2;color:#b91c1c;border-radius:20px;font-weight:700;font-size:.95rem;margin-bottom:1.5rem}
.res-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.6rem;margin:1rem 0 1.5rem;text-align:left}
.res-cell{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:.65rem}
.res-cell-n{font-size:.58rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem}
.res-cell-v{font-size:1.5rem;font-weight:800;color:#1e293b}
.restart-btn{padding:.7rem 1.8rem;border:1.5px solid #b91c1c;color:#b91c1c;background:transparent;border-radius:8px;font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.restart-btn:hover{background:#b91c1c;color:#fff}
@media(max-width:580px){.wrap{padding:1rem .75rem 4rem}.qcard{padding:1.1rem}.res-score{font-size:3.5rem}}
</style>
</head>
<body>
<div class="topbar" style="background:#b91c1c">
  <div>
    <div class="topbar-sub">Curso de Reequipamiento de Barrancos</div>
    <h1>Tema 1 — Fundamentos Jurídicos</h1>
  </div>
  <a href="index.html">← Índice</a>
</div>
<div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
<div class="wrap">
  <div class="stat-row">
    <div class="stat"><strong id="pp">0/10</strong>Respondidas</div>
    <div class="stat"><strong>10</strong>Preguntas</div>
    <div class="stat"><strong style="font-size:.9rem;color:#64748b">Responsabilidad · Normativa · TD Barrancos</strong></div>
  </div>
  <div id="quiz"></div>
  <div class="actions">
    <div class="warn" id="warn"></div>
    <button class="submit-btn" onclick="submit()">Finalizar y ver resultados →</button>
  </div>
  <div id="results">
    <div class="res-score" id="rscore"></div>
    <div class="res-pct" id="rpct"></div>
    <div class="res-rat" id="rrat"></div>
    <div class="res-grid" id="rgrid"></div>
    <button class="restart-btn" onclick="restart()">↺ Repetir</button>
  </div>
</div>
<script>
const Q=[{"id": 1, "bl": "T1", "la": "Tema 1", "tx": "Un barranquista cede un anclaje durante el descenso y sufre una lesión grave. El anclaje había sido instalado hace dos años por un reequipador particular sin formación acreditada. ¿Qué tipo de responsabilidad puede recaer sobre ese reequipador?", "op": ["Ninguna, ya que el barranquista asume el riesgo al practicar la actividad", "Solo responsabilidad moral ante la comunidad barranquista local", "Responsabilidad civil por los daños causados y potencialmente responsabilidad penal por imprudencia", "Exclusivamente responsabilidad administrativa ante la federación deportiva"], "co": "c", "fc": "Correcto. Una instalación defectuosa que cause lesiones puede generar responsabilidad civil (indemnización de daños y perjuicios) y responsabilidad penal si se aprecia imprudencia grave en la conducta del reequipador.", "fw": "Incorrecto. La instalación defectuosa con resultado lesivo expone al reequipador a responsabilidad civil y potencialmente penal por imprudencia, independientemente de su condición de particular."}, {"id": 2, "bl": "T1", "la": "Tema 1", "tx": "Según el art. 51.1 de la Constitución Española, los poderes públicos garantizarán la defensa de:", "op": ["Las federaciones deportivas en el uso del medio natural", "Los propietarios de terrenos colindantes con barrancos", "Los consumidores y usuarios, protegiendo su seguridad, salud e intereses económicos legítimos", "Los funcionarios que supervisan instalaciones deportivas"], "co": "c", "fc": "Correcto. El art. 51.1 CE obliga a los poderes públicos a proteger la seguridad, salud y legítimos intereses económicos de los consumidores y usuarios.", "fw": "Incorrecto. El art. 51.1 CE protege específicamente a los consumidores y usuarios, no a otros colectivos."}, {"id": 3, "bl": "T1", "la": "Tema 1", "tx": "El Censo de Instalaciones Deportivas es principalmente:", "op": ["Un documento que otorga el carácter de instalación deportiva al barranco", "Un registro administrativo con fines estadísticos, cuya inclusión no determina el carácter de instalación deportiva", "Una homologación técnica de seguridad emitida por la FEDME", "Un requisito previo indispensable para iniciar cualquier reequipamiento"], "co": "b", "fc": "Correcto. El Censo es un registro estadístico. Son las propias zonas de barrancos, por ser susceptibles de censarse, las que tienen carácter de instalación deportiva, con independencia de su registro.", "fw": "Incorrecto. El Censo tiene fines estadísticos y no es lo que otorga el carácter de instalación deportiva."}, {"id": 4, "bl": "T1", "la": "Tema 1", "tx": "Las normas UNE elaboradas por la Asociación Española de Normalización tienen carácter:", "op": ["Obligatorio en todo el territorio nacional desde su publicación", "Voluntario, salvo que una disposición legal las declare de obligado cumplimiento", "Obligatorio solo para fabricantes nacionales, no para importadores", "Orientativo exclusivamente para las Administraciones Públicas"], "co": "b", "fc": "Correcto. Las normas UNE son de aplicación voluntaria salvo que una ley o reglamento las haga obligatorias expresamente.", "fw": "Incorrecto. Las normas UNE son voluntarias salvo remisión legal expresa que las haga obligatorias."}, {"id": 5, "bl": "T1", "la": "Tema 1", "tx": "ENAC (Entidad Nacional de Acreditación) es el organismo que:", "op": ["Elabora las normas UNE a nivel nacional", "Acredita la competencia técnica de laboratorios, entidades de certificación e inspección", "Homologa individualmente cada anclaje fabricado en España", "Gestiona el Registro de Instalaciones Deportivas de Canarias"], "co": "b", "fc": "Correcto. ENAC acredita la competencia técnica de organismos como laboratorios y entidades de certificación, garantizando la fiabilidad de sus resultados.", "fw": "Incorrecto. ENAC acredita la competencia técnica de laboratorios y entidades certificadoras; no elabora normas ni homologa productos."}, {"id": 6, "bl": "T1", "la": "Tema 1", "tx": "Las normas UIAA en el ámbito del reequipamiento actúan principalmente como:", "op": ["Normas de obligado cumplimiento por ley europea desde 2020", "Parámetros de referencia sobre la diligencia exigible al reequipador", "Requisitos exclusivos para fabricantes europeos de anclajes", "Normas que reemplazan completamente a las UNE en territorio español"], "co": "b", "fc": "Correcto. Las normas UIAA son parámetros de referencia de diligencia; en algunos casos establecen estándares más estrictos que el CEN pero no son obligatorias por ley.", "fw": "Incorrecto. Las normas UIAA son parámetros de referencia sobre diligencia, no normas de obligado cumplimiento por ley."}, {"id": 7, "bl": "T1", "la": "Tema 1", "tx": "Antes de iniciar un proyecto de reequipamiento en un barranco situado dentro de un Espacio Natural Protegido, ¿cuál es el trámite administrativo imprescindible que debe realizar el reequipador?", "op": ["Comunicarlo por redes sociales para recabar voluntarios y financiación", "Notificarlo al club de barranquismo más cercano a la zona", "Solicitar la autorización previa a la Administración competente (Cabildo Insular en Canarias)", "Registrar el proyecto en el Censo de Instalaciones Deportivas antes de comenzar"], "co": "c", "fc": "Correcto. Actuar en un ENP sin la preceptiva autorización del Cabildo Insular expone al reequipador a responsabilidad administrativa y puede invalidar legalmente los trabajos realizados. Solicitar el permiso es el primer paso obligatorio.", "fw": "Incorrecto. El trámite imprescindible es solicitar la autorización previa a la Administración competente (el Cabildo Insular en Canarias), sin la cual la actuación en un ENP es ilegal."}, {"id": 8, "bl": "T1", "la": "Tema 1", "tx": "Según el Tema 1, ¿cuál de las siguientes afirmaciones sobre la Administración Pública y los barrancos deportivos es CORRECTA?", "op": ["La Administración solo responde si el barranco figura en el Censo de Instalaciones Deportivas", "La Administración queda exonerada si el accidente ocurre fuera del horario de supervisión oficial", "La Administración tiene obligación de velar por la seguridad de las instalaciones de uso público con independencia del Censo", "La responsabilidad recae exclusivamente sobre quien instaló los anclajes defectuosos"], "co": "c", "fc": "Correcto. La obligación de la Administración de garantizar la seguridad de instalaciones de uso público (art. 51.1 CE) no depende de si el barranco figura o no en el Censo.", "fw": "Incorrecto. La obligación de seguridad de la Administración existe independientemente del registro censal."}, {"id": 9, "bl": "T1", "la": "Tema 1", "tx": "El Real Decreto 702/2019 establece las titulaciones de Técnico Deportivo (TD). ¿Cuál de las siguientes competencias corresponde al TD en Barrancos?", "op": ["Homologar anclajes para su comercialización en España", "Diseñar e instalar equipamientos en itinerarios de acceso y descenso de barrancos", "Otorgar licencias de reequipamiento en espacios naturales protegidos", "Certificar la resistencia estructural de los anclajes instalados"], "co": "b", "fc": "Correcto. El RD 702/2019 atribuye al TD en Barrancos la competencia de diseñar e instalar equipamientos en itinerarios de barrancos respetando la normativa medioambiental.", "fw": "Incorrecto. El TD en Barrancos diseña e instala equipamientos; la homologación y certificación de anclajes corresponde a otros organismos."}, {"id": 10, "bl": "T1", "la": "Tema 1", "tx": "Los bienes de dominio público (como los cauces de barrancos) tienen las siguientes características jurídicas:", "op": ["Son alienables, prescriptibles y pueden ser embargados por deudas de la Administración", "Son inalienables, imprescriptibles e inembargables", "Son de propiedad privada pero de uso público obligatorio", "Pueden privatizarse mediante concesión administrativa permanente"], "co": "b", "fc": "Correcto. Los bienes de dominio público son inalienables (no se pueden vender), imprescriptibles (no se adquieren por prescripción) e inembargables.", "fw": "Incorrecto. Los bienes demaniales son inalienables, imprescriptibles e inembargables; son características esenciales del dominio público."}];
const ans={},ver=new Set();
function build(){const c=document.getElementById('quiz');Q.forEach(q=>{const d=document.createElement('div');d.className='qcard';
d.innerHTML=`<div class="qmeta"><span class="qnum">Pregunta ${q.id}</span><span class="qbadge">${q.la}</span></div>`+
`<div class="qtxt">${q.tx}</div><div class="opts" id="o${q.id}">`+
q.op.map((t,i)=>`<button class="opt" data-v="${'abcd'[i]}" onclick="pick(${q.id},'${'abcd'[i]}')"><span class="olet">${'ABCD'[i]}</span>${t}</button>`).join('')+
`</div><div class="fb" id="f${q.id}"></div><button class="chk-btn" id="b${q.id}" onclick="check(${q.id})">▶ Comprobar</button>`;
document.getElementById('quiz').appendChild(d);});}
function pick(id,v){if(ver.has(id))return;document.querySelectorAll(`#o${id} .opt`).forEach(o=>o.classList.remove('sel'));document.querySelector(`#o${id} [data-v="${v}"]`).classList.add('sel');ans[id]=v;prog();}
function check(id){if(ver.has(id))return;if(!ans[id]){document.getElementById('warn').textContent='⚠ Selecciona una opción primero.';return;}document.getElementById('warn').textContent='';
ver.add(id);const q=Q.find(x=>x.id===id);const ok=ans[id]===q.co;
document.querySelectorAll(`#o${id} .opt`).forEach(o=>{o.classList.add('dis');if(o.dataset.v===q.co)o.classList.add('ok');else if(o.dataset.v===ans[id]&&!ok)o.classList.add('ng');});
const f=document.getElementById('f'+id);f.className='fb '+(ok?'ok':'ng');f.textContent=(ok?'✓ ':'✗ ')+(ok?q.fc:q.fw);
const b=document.getElementById('b'+id);b.disabled=true;b.textContent=ok?'✓ Correcto':'✗ Incorrecto';}
function prog(){const d=Object.keys(ans).length,p=Math.round(d/Q.length*100);
document.getElementById('pp').textContent=`${d}/${Q.length} respondidas`;document.getElementById('pf').style.width=p+'%';}
function submit(){const un=Q.filter(q=>!ans[q.id]);document.getElementById('warn').textContent=un.length?`⚠ ${un.length} pregunta(s) sin responder.`:'';
Q.forEach(q=>{if(!ver.has(q.id)&&ans[q.id])check(q.id);});
let tot=0;const bk={};Q.forEach(q=>{const ok=ans[q.id]===q.co;if(ok)tot++;bk[q.la]=bk[q.la]||[0,0];bk[q.la][1]++;if(ok)bk[q.la][0]++;});
const p=Math.round(tot/Q.length*100);document.getElementById('rscore').textContent=`${tot}/${Q.length}`;document.getElementById('rpct').textContent=`${p}% de respuestas correctas`;
const r=['❗ Necesitas repasar','📖 Suficiente','📚 Bien','👍 Notable','🏆 Sobresaliente'];
document.getElementById('rrat').textContent=r[p>=90?4:p>=75?3:p>=60?2:p>=50?1:0];
document.getElementById('rgrid').innerHTML=Object.entries(bk).map(([k,[c,t]])=>`<div class="res-cell"><div class="res-cell-n">${k}</div><div class="res-cell-v">${c}/${t}</div></div>`).join('');
document.getElementById('results').style.display='block';document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});}
function restart(){Object.keys(ans).forEach(k=>delete ans[k]);ver.clear();document.querySelectorAll('.opt').forEach(o=>o.className='opt');document.querySelectorAll('.fb').forEach(f=>{f.className='fb';f.textContent='';});document.querySelectorAll('.chk-btn').forEach(b=>{b.disabled=false;b.textContent='▶ Comprobar';});document.getElementById('warn').textContent='';document.getElementById('results').style.display='none';prog();window.scrollTo({top:0,behavior:'smooth'});}
build();prog();
</script>
</body>
</html>
